<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sirkulasi | Perpustakaan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg-page: #000000;
        /* Menggunakan warna solid (tanpa transparansi) untuk performa maksimal */
        --bg-surface: #1e1f20; 
        --text-main: #e3e3e3;
        --text-sub: #9aa0a6;
        --brand: #8ab4f8;
        --border: #3c4043;
        --input-bg: #202124;
        --item-hover: #2d2e30;
        --danger: #f28b82;
        --tag-bg: #1a273a;
    }

    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
    }
    
    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-page);
        /* Background GIF tetap ada di paling belakang */
        background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                          url('https://i.pinimg.com/originals/c6/a1/c9/c6a1c9f91f82c3fe5af6c5d83cc0bf7e.gif');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        
        color: var(--text-main);
        display: flex;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }

    .app-container { 
        width: 100%; 
        max-width: 500px; 
        display: flex; 
        flex-direction: column; 
        position: relative;
        /* Menghilangkan backdrop-filter untuk performa */
    }
    
    .scroll-area {
        flex: 1;
        overflow-y: auto;
        padding: 24px 20px 180px 20px;
        scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    .selected-member-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--brand);
        color: #000;
        padding: 8px 16px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 800;
        margin-bottom: 12px;
        margin-left: 16px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 500px;
        padding: 20px 0;
        /* Gradasi hitam solid tanpa efek blur */
        background: linear-gradient(transparent, #000 70%);
        z-index: 100;
    }

    .input-wrapper {
        margin: 0 16px;
        display: flex;
        align-items: center;
        background: var(--input-bg); /* Warna solid */
        border-radius: 24px;
        padding: 0 20px;
        height: 56px;
        border: 1px solid var(--border);
        transition: border-color 0.2s;
        box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    .input-wrapper:focus-within { 
        border-color: var(--brand); 
    }

    .input-gemini {
        flex: 1;
        background: transparent;
        border: none;
        font-family: inherit;
        font-size: 15px;
        color: var(--text-main);
        outline: none;
    }

    .results-list {
        position: absolute;
        bottom: 100%;
        left: 16px;
        right: 16px;
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
        margin-bottom: 12px;
        max-height: 60vh;
        overflow-y: auto;
        scrollbar-width: none;
    }
    .results-list::-webkit-scrollbar { display: none; }

    .result-item {
        padding: 16px;
        cursor: pointer;
        background: var(--bg-surface); /* Warna solid pekat */
        border: 1px solid var(--border);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        /* Dihapus: backdrop-filter dan transisi berat */
    }
    .result-item.selected { 
        border-color: var(--brand); 
        background: var(--item-hover);
    }

    .res-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .res-title { font-size: 14px; font-weight: 700; color: var(--text-main); }
    .res-sub { font-size: 11px; font-weight: 600; color: var(--brand); }
    
    .tag {
        padding: 4px 10px;
        background: var(--tag-bg);
        color: var(--brand);
        font-size: 10px;
        font-weight: 800;
        border-radius: 8px;
        text-transform: uppercase;
    }

    .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app-container">
    <div class="scroll-area">
        <div id="status-msg" style="text-align: center; font-size: 13px; opacity: 0.4; margin-top: 60px;">
            Masukkan Nama, NIS, atau Judul Buku...
        </div>
    </div>

    <div class="bottom-nav">
        <div id="mainResults" class="results-list"></div>
        
        <div id="memberTag" class="selected-member-tag hidden">
            <span id="tagName"></span>
            <span onclick="resetUI()" style="cursor:pointer; opacity:0.6; padding-left:8px">✕</span>
        </div>

        <div class="input-wrapper">
            <input type="text" id="mainInput" class="input-gemini" placeholder="Cari Siswa..." autocomplete="off" autofocus>
        </div>
    </div>
</div>

<script type="module">
    import { supabase as client } from './supa/supa.js';

    let state = { 
        member: null, 
        mode: 'MEMBER', 
        selectedIdx: -1, 
        lastQuery: '' 
    };

    const mainInput = document.getElementById('mainInput');
    const mainResults = document.getElementById('mainResults');

    mainInput.addEventListener('input', async () => {
        const q = mainInput.value.trim();
        if (q === state.lastQuery) return;
        state.lastQuery = q;
        state.selectedIdx = -1;

        if (q.length < 2) {
            mainResults.innerHTML = '';
            return;
        }

        const { data, error } = await client.rpc('sirkulasi_search_handler', {
            p_mode: state.mode,
            p_query: q
        });

        if (error) {
            console.error("Search Error:", error.message);
            return;
        }

        renderResults(data);

        if (data && data.length === 1) {
            state.selectedIdx = 0;
            updateSelection();
        }
    });

    function renderResults(data) {
        mainResults.innerHTML = '';
        if(!data) return;

        data.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.dataset.index = idx;

            const hasLoan = state.mode === 'MEMBER' && item.active_loan_code;
            const q = mainInput.value.toLowerCase();
            
            // Deteksi jika muncul karena pencarian buku yang dibawa
            const isMatchByBook = hasLoan && (
                item.active_loan_title?.toLowerCase().includes(q) || 
                item.active_loan_code?.toLowerCase().includes(q)
            );

            div.innerHTML = `
                <div class="res-row">
                    <span class="res-title" style="color:${hasLoan ? 'var(--danger)' : 'inherit'}">${item.title}</span>
                    <span class="res-sub">${item.subtitle}</span>
                </div>
                ${item.active_loan_title ? `
                    <div style="font-size:11px; color:${isMatchByBook ? 'var(--brand)' : 'var(--danger)'}; font-weight:700; margin-top:2px;">
                        ${isMatchByBook ? '🔍 Cocok Buku: ' : 'Sedang Pinjam: '} ${item.active_loan_title}
                    </div>
                    <div style="font-size:10px; color:var(--text-sub);">Kode: ${item.active_loan_code}</div>
                ` : ''}
                <div style="display:flex; gap:6px; margin-top:4px; overflow:hidden;">
                    <span class="tag">${item.tag1 || '-'}</span>
                    <span class="tag">${item.tag2 || '-'}</span>
                    ${item.status_label ? `<span class="tag" style="color:var(--brand)">${item.status_label}</span>` : ''}
                </div>
            `;

            div.onclick = () => {
                if (state.mode === 'MEMBER') {
                    if (item.active_loan_code) {
                        // KIRIM sirkulasi_id agar halaman detail memunculkan tombol kembalikan/perpanjang
                        sessionStorage.setItem('pending_loan', JSON.stringify({ 
                            member: { id: item.id, subtitle: item.subtitle, title: item.title }, 
                            book: { subtitle: item.active_loan_code, title: item.active_loan_title }, 
                            sirkulasi_id: item.active_loan_id, 
                            type: 'RETURN' 
                        }));
                        window.location.href = 'detail_sirkulasi.html';
                    } else {
                        selectMember(item);
                    }
                } else {
                    if (item.status_label?.toLowerCase() !== 'tersedia') {
                        alert('Maaf, buku sedang dipinjam atau tidak tersedia.');
                        return;
                    }
                    selectBuku(item);
                }
            };
            mainResults.appendChild(div);
        });
    }

    function selectMember(m) {
        state.member = m;
        state.mode = 'BOOK';
        state.lastQuery = '';
        mainInput.value = '';
        mainInput.placeholder = 'Cari Judul atau Scan Kode Buku...';
        mainResults.innerHTML = '';
        document.getElementById('memberTag').classList.remove('hidden');
        document.getElementById('tagName').innerText = m.title;
        mainInput.focus();
    }

    function selectBuku(b) {
        sessionStorage.setItem('pending_loan', JSON.stringify({
            member: { id: state.member.id, subtitle: state.member.subtitle, title: state.member.title },
            book: { id: b.id, subtitle: b.subtitle, title: b.title },
            type: 'LOAN'
        }));
        window.location.href = 'detail_sirkulasi.html';
    }

    mainInput.addEventListener('keydown', (e) => {
        const items = mainResults.querySelectorAll('.result-item');
        if (e.key === 'Enter') {
            if (state.selectedIdx > -1 && items[state.selectedIdx]) {
                items[state.selectedIdx].click();
            } else if (items.length === 1) {
                items[0].click();
            }
            return;
        }
        if (!items.length) return;
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            state.selectedIdx = Math.min(state.selectedIdx + 1, items.length - 1);
            updateSelection();
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            state.selectedIdx = Math.max(state.selectedIdx - 1, 0);
            updateSelection();
        }
    });

    function updateSelection() {
        const items = mainResults.querySelectorAll('.result-item');
        items.forEach((item, idx) => {
            item.classList.toggle('selected', idx === state.selectedIdx);
            if (idx === state.selectedIdx) item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        });
    }

    window.resetUI = () => {
        sessionStorage.removeItem('pending_loan');
        location.reload();
    };

    mainInput.focus();
</script>
</body>
</html>
