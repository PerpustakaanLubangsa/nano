<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Center • Lubangsa Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #f1f5f9; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        h1 { font-family: 'Cinzel', serif; }
        
        .side-panel { 
            background: white; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
            z-index: 10;
        }

        .main-board { 
            overflow-y: auto; 
            scroll-behavior: smooth;
        }

        .day-card {
            background: white;
            border-radius: 2.5rem;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .name-tag {
            background: #f0f7ff;
            color: #1e40af;
            font-size: 10px;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .custom-modal {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
        }

        #loadingOverlay {
            position: fixed; top: 20px; right: 20px;
            background: white; padding: 10px 20px;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; align-items: center; gap: 10px; z-index: 100;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <div id="loadingOverlay">
        <div class="w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <span class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Sinkronisasi Data...</span>
    </div>

    <aside class="w-80 side-panel flex flex-col p-8 h-screen overflow-y-auto shrink-0">
        <header class="mb-10">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-user-shield text-sm"></i>
                </div>
                <h1 class="text-xl font-black text-slate-800 uppercase tracking-tighter">L-Library</h1>
            </div>
            <p class="text-[9px] font-bold text-slate-400 tracking-[0.3em] uppercase">Control Center</p>
        </header>

        <section class="mb-10">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Pustakawan Aktif</h2>
                <span id="countPetugas" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full text-[10px] font-black">0</span>
            </div>
            
            <div class="bg-blue-50 p-4 rounded-2xl mb-4 border border-blue-100">
                <p class="text-[9px] font-bold text-blue-700 leading-relaxed uppercase">
                    <i class="fas fa-sync-alt mr-1"></i> 
                    Data diambil otomatis dari tabel anggota (Role: Admin/Pustakawan).
                </p>
            </div>

            <div class="space-y-2 max-h-60 overflow-y-auto pr-2" id="listNamaMaster">
                </div>
        </section>

        <section>
            <h2 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-4">Referensi Jam</h2>
            <div class="space-y-2 mb-4">
                <input type="text" id="labelShift" placeholder="Label (Pagi/Sore)" class="w-full p-3 bg-slate-50 rounded-xl text-xs font-semibold outline-none border border-slate-100">
                <div class="flex gap-2">
                    <input type="text" id="waktuShift" placeholder="Jam (08:00 - 12:00)" class="flex-1 p-3 bg-slate-50 rounded-xl text-xs font-semibold outline-none border border-slate-100">
                    <button onclick="tambahMasterShift()" class="bg-slate-800 text-white w-10 h-10 rounded-xl flex items-center justify-center">
                        <i class="fas fa-plus text-xs"></i>
                    </button>
                </div>
            </div>
            <div class="bg-slate-50 rounded-2xl p-2" id="listShiftMaster"></div>
        </section>
    </aside>

    <main class="flex-1 main-board p-10">
        <div class="max-w-3xl mx-auto">
            <header class="mb-10 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tighter uppercase">Plotting Jadwal</h2>
                    <p class="text-xs font-bold text-slate-400 mt-1 uppercase tracking-widest">Periode Operasional 2026</p>
                </div>
                <button onclick="init()" class="text-[10px] font-black text-blue-600 uppercase tracking-widest hover:text-slate-900 transition-colors">
                    <i class="fas fa-redo-alt mr-1"></i> Refresh Board
                </button>
            </header>

            <div id="boardVertical" class="space-y-8"></div>
        </div>
    </main>

    <div id="modalConfirm" class="fixed inset-0 custom-modal z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl border border-slate-100">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-xl">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 class="text-lg font-black text-slate-800 uppercase tracking-tighter">Hapus Shift?</h3>
            <p id="confirmMessage" class="text-[10px] font-bold text-slate-400 my-4 leading-relaxed uppercase"></p>
            <div class="flex gap-2">
                <button onclick="closeConfirm()" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl text-[10px] font-black uppercase">Batal</button>
                <button id="btnConfirmAction" class="flex-1 py-3 bg-red-500 text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-red-100">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);

        const HARI = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'];
        let masterNama = [];
        let masterShift = [];

        async function init() {
            showLoading(true);
            await Promise.all([loadMasterNama(), loadMasterShift()]);
            renderBoard();
            await loadJadwalExisting();
            showLoading(false);
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        async function loadMasterNama() {
            // MENGAMBIL DATA DARI TABEL ANGGOTA
            let { data, error } = await client
                .from('anggota')
                .select('nama, role')
                .or('role.eq.Pustakawan,role.eq.Admin')
                .order('nama');

            masterNama = data || [];
            document.getElementById('countPetugas').innerText = masterNama.length;
            document.getElementById('listNamaMaster').innerHTML = masterNama.map(n => `
                <div class="p-3 bg-white rounded-xl border border-slate-100 flex justify-between items-center group">
                    <div>
                        <p class="text-xs font-bold text-slate-700">${n.nama}</p>
                        <p class="text-[8px] font-black text-blue-500 uppercase">${n.role}</p>
                    </div>
                    <i class="fas fa-check-circle text-slate-100 group-hover:text-emerald-400 transition-colors"></i>
                </div>
            `).join('');
        }

        async function loadMasterShift() {
            let { data } = await client.from('jam_master').select('*').order('waktu');
            masterShift = data || [];
            document.getElementById('listShiftMaster').innerHTML = masterShift.map(s => `
                <div class="p-3 mb-1 bg-white rounded-xl border border-slate-100 flex justify-between items-center">
                    <div>
                        <span class="text-[10px] font-black text-slate-800 uppercase">${s.label}</span>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">${s.waktu}</p>
                    </div>
                    <button onclick="showConfirm('Hapus referensi jam ${s.label}?', () => executeHapusMasterShift(${s.id}))" class="text-slate-200 hover:text-red-500">
                        <i class="fas fa-trash-alt text-[10px]"></i>
                    </button>
                </div>
            `).join('');
        }

        function renderBoard() {
            const board = document.getElementById('boardVertical');
            board.innerHTML = HARI.map(hari => `
                <div class="day-card p-8">
                    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-6 flex items-center gap-3">
                        <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>
                        ${hari}
                    </h2>
                    <div class="grid md:grid-cols-2 gap-4">
                        ${masterShift.map(s => `
                            <div class="bg-slate-50/50 p-5 rounded-3xl border border-slate-100">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">${s.label}</p>
                                        <p class="text-[9px] font-bold text-slate-900 uppercase mt-0.5">${s.waktu}</p>
                                    </div>
                                    <select onchange="addPetugas('${hari}', '${s.waktu}', this)" class="bg-white shadow-sm text-[9px] font-black px-3 py-2 rounded-xl border-none outline-none text-blue-600 cursor-pointer">
                                        <option value="">+ Tambah</option>
                                        ${masterNama.map(n => `<option value="${n.nama}">${n.nama}</option>`).join('')}
                                    </select>
                                </div>
                                <div id="list-${hari}-${s.waktu.replace(/[:\s-]/g, '')}" class="flex flex-wrap gap-2"></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function addPetugas(hari, shift, el) {
            const nama = el.value;
            if(!nama) return;
            showLoading(true);
            await client.from('jadwal_detail').insert([{ hari, shift, nama }]);
            el.value = "";
            await loadJadwalExisting();
            showLoading(false);
        }

        async function loadJadwalExisting() {
            let { data } = await client.from('jadwal_detail').select('*');
            HARI.forEach(hari => {
                masterShift.forEach(s => {
                    const cleanId = `list-${hari}-${s.waktu.replace(/[:\s-]/g, '')}`;
                    const container = document.getElementById(cleanId);
                    if(container) {
                        const filtered = (data || []).filter(j => j.hari === hari && j.shift === s.waktu);
                        container.innerHTML = filtered.map(j => `
                            <div class="name-tag shadow-sm animate-in fade-in zoom-in duration-300">
                                ${j.nama}
                                <button onclick="hapusJadwalEntry(${j.id})" class="text-blue-300 hover:text-red-500 ml-2">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        `).join('');
                    }
                });
            });
        }

        async function hapusJadwalEntry(id) {
            showLoading(true);
            await client.from('jadwal_detail').delete().eq('id', id);
            await loadJadwalExisting();
            showLoading(false);
        }

        async function tambahMasterShift() {
            const label = document.getElementById('labelShift').value;
            const waktu = document.getElementById('waktuShift').value;
            if(!label || !waktu) return;
            showLoading(true);
            await client.from('jam_master').insert([{ label, waktu }]);
            document.getElementById('labelShift').value = '';
            document.getElementById('waktuShift').value = '';
            await loadMasterShift();
            renderBoard();
            await loadJadwalExisting();
            showLoading(false);
        }

        function showConfirm(msg, action) {
            document.getElementById('confirmMessage').innerText = msg;
            document.getElementById('modalConfirm').classList.remove('hidden');
            document.getElementById('btnConfirmAction').onclick = async () => {
                await action();
                closeConfirm();
            };
        }

        function closeConfirm() {
            document.getElementById('modalConfirm').classList.add('hidden');
        }

        async function executeHapusMasterShift(id) {
            showLoading(true);
            await client.from('jam_master').delete().eq('id', id);
            await loadMasterShift();
            renderBoard();
            await loadJadwalExisting();
            showLoading(false);
        }

        window.onload = init;
    </script>
</body>
</html>
