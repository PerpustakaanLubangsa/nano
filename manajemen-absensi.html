<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel - Lubangsa Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-snow: #f8fafc; }
        body { 
            background-color: var(--bg-snow); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        h1 { font-family: 'Cinzel', serif; }
        .side-panel { border-right: 1px solid #e2e8f0; background: white; }
        .main-board { overflow-y: auto; background: #f1f5f9; }
        .day-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .name-tag {
            background: #eff6ff;
            color: #1e40af;
            font-size: 11px;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .custom-modal {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="w-1/3 side-panel flex flex-col p-8 h-screen overflow-y-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-black text-blue-600 uppercase leading-none">Lubangsa</h1>
            <p class="text-[9px] font-bold text-slate-400 tracking-[0.3em] uppercase">Control Center</p>
        </header>

        <div class="mb-10">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-xs font-black uppercase text-slate-800 tracking-widest">Data Pustakawan</h2>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="text" id="namaBaru" placeholder="Nama Baru..." class="flex-1 p-3 bg-slate-50 rounded-xl text-xs outline-none border border-slate-100 focus:border-blue-400">
                <button onclick="tambahMasterNama()" class="bg-blue-600 text-white px-4 rounded-xl font-bold text-[10px] uppercase">Add</button>
            </div>
            <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-bottom border-slate-100">
                        <tr><th class="p-4 text-[9px] font-bold text-slate-400 uppercase">Nama</th><th class="p-4 w-10"></th></tr>
                    </thead>
                    <tbody id="tableNama" class="text-xs font-bold text-slate-600"></tbody>
                </table>
            </div>
        </div>

        <div>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-xs font-black uppercase text-slate-800 tracking-widest">Referensi Jam</h2>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="text" id="labelShift" placeholder="Label (Pagi)" class="p-3 bg-slate-50 rounded-xl text-xs outline-none border border-slate-100">
                <input type="text" id="waktuShift" placeholder="Jam (08-12)" class="p-3 bg-slate-50 rounded-xl text-xs outline-none border border-slate-100">
                <button onclick="tambahMasterShift()" class="col-span-2 bg-slate-800 text-white py-3 rounded-xl font-bold text-[10px] uppercase">Daftarkan Shift</button>
            </div>
            <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
                <table class="w-full text-left">
                    <thead class="bg-slate-50">
                        <tr><th class="p-4 text-[9px] font-bold text-slate-400 uppercase">Shift</th><th class="p-4 text-[9px] font-bold text-slate-400 uppercase">Waktu</th><th class="p-4 w-10"></th></tr>
                    </thead>
                    <tbody id="tableShift" class="text-xs font-bold text-slate-600"></tbody>
                </table>
            </div>
        </div>
    </aside>

    <main class="w-2/3 main-board p-12 h-screen">
        <div class="max-w-2xl mx-auto" id="boardVertical"></div>
    </main>

    <div id="modalConfirm" class="fixed inset-0 custom-modal z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">!</div>
            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tighter mb-2">Konfirmasi Hapus</h3>
            <p id="confirmMessage" class="text-xs font-bold text-slate-400 mb-8 leading-relaxed px-4">Apakah Anda yakin ingin menghapus data ini secara permanen?</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl text-[10px] font-black uppercase tracking-widest">Batal</button>
                <button id="btnConfirmAction" class="flex-1 py-4 bg-red-500 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-red-200">Hapus</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);

        const HARI = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'];
        let masterNama = [];
        let masterShift = [];

        async function init() {
            await Promise.all([loadMasterNama(), loadMasterShift()]);
            renderBoard();
            await loadJadwalExisting();
        }

        async function loadMasterNama() {
            let { data } = await client.from('petugas_master').select('*').order('nama');
            masterNama = data || [];
            document.getElementById('tableNama').innerHTML = masterNama.map(n => `
                <tr class="border-t border-slate-50">
                    <td class="p-4">${n.nama}</td>
                    <td class="p-4 text-right"><button onclick="showConfirm('Hapus petugas ${n.nama}?', () => executeHapusMasterNama(${n.id}))" class="text-red-300 hover:text-red-500">×</button></td>
                </tr>
            `).join('');
        }

        async function loadMasterShift() {
            let { data } = await client.from('jam_master').select('*');
            masterShift = data || [];
            document.getElementById('tableShift').innerHTML = masterShift.map(s => `
                <tr class="border-t border-slate-50">
                    <td class="p-4 text-blue-600 uppercase">${s.label}</td>
                    <td class="p-4 text-slate-400 font-normal">${s.waktu}</td>
                    <td class="p-4 text-right"><button onclick="showConfirm('Hapus shift ${s.label}?', () => executeHapusMasterShift(${s.id}))" class="text-red-300 hover:text-red-500">×</button></td>
                </tr>
            `).join('');
        }

        function renderBoard() {
            const board = document.getElementById('boardVertical');
            board.innerHTML = HARI.map(hari => `
                <div class="day-card p-10">
                    <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tighter mb-8 pb-4 border-b border-slate-100 flex justify-between items-center">
                        ${hari}
                        <span class="text-[10px] text-slate-300 tracking-[0.5em]">2026</span>
                    </h2>
                    <div class="space-y-6">
                        ${masterShift.map(s => `
                            <div>
                                <div class="flex justify-between items-center mb-4">
                                    <div>
                                        <p class="text-[11px] font-black text-blue-600 uppercase tracking-widest">${s.label}</p>
                                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${s.waktu}</p>
                                    </div>
                                    <select onchange="addPetugas('${hari}', '${s.waktu}', this)" class="bg-slate-50 text-[10px] font-bold p-2 rounded-lg border-none outline-none text-slate-500">
                                        <option value="">+ Tambah Petugas</option>
                                        ${masterNama.map(n => `<option value="${n.nama}">${n.nama}</option>`).join('')}
                                    </select>
                                </div>
                                <div id="list-${hari}-${s.waktu.replace(/\s+/g, '')}" class="grid grid-cols-2 gap-2"></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function addPetugas(hari, shift, el) {
            const nama = el.value;
            if(!nama) return;
            await client.from('jadwal_detail').insert([{ hari, shift, nama }]);
            el.value = "";
            await loadJadwalExisting();
        }

        async function loadJadwalExisting() {
            let { data } = await client.from('jadwal_detail').select('*');
            HARI.forEach(hari => {
                masterShift.forEach(s => {
                    const id = `list-${hari}-${s.waktu.replace(/\s+/g, '')}`;
                    const container = document.getElementById(id);
                    if(container) {
                        const filtered = (data || []).filter(j => j.hari === hari && j.shift === s.waktu);
                        container.innerHTML = filtered.map(j => `
                            <div class="name-tag">
                                ${j.nama}
                                <button onclick="hapusJadwalEntry(${j.id})" class="hover:text-red-500 ml-2">×</button>
                            </div>
                        `).join('');
                    }
                });
            });
        }

        async function hapusJadwalEntry(id) {
            await client.from('jadwal_detail').delete().eq('id', id);
            await loadJadwalExisting();
        }

        async function tambahMasterNama() {
            const nama = document.getElementById('namaBaru').value;
            if(!nama) return;
            await client.from('petugas_master').insert([{ nama }]);
            document.getElementById('namaBaru').value = '';
            await loadMasterNama();
            renderBoard();
            await loadJadwalExisting();
        }

        async function tambahMasterShift() {
            const label = document.getElementById('labelShift').value;
            const waktu = document.getElementById('waktuShift').value;
            if(!label || !waktu) return;
            await client.from('jam_master').insert([{ label, waktu }]);
            document.getElementById('labelShift').value = '';
            document.getElementById('waktuShift').value = '';
            await loadMasterShift();
            renderBoard();
            await loadJadwalExisting();
        }

        function showConfirm(msg, action) {
            document.getElementById('confirmMessage').innerText = msg;
            document.getElementById('modalConfirm').classList.remove('hidden');
            document.getElementById('btnConfirmAction').onclick = async () => {
                await action();
                closeConfirm();
            };
        }

        function closeConfirm() {
            document.getElementById('modalConfirm').classList.add('hidden');
        }

        async function executeHapusMasterNama(id) {
            await client.from('petugas_master').delete().eq('id', id);
            await loadMasterNama();
            renderBoard();
            await loadJadwalExisting();
        }

        async function executeHapusMasterShift(id) {
            await client.from('jam_master').delete().eq('id', id);
            await loadMasterShift();
            renderBoard();
            await loadJadwalExisting();
        }

        window.onload = init;
    </script>
</body>
</html>
