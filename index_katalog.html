<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafd;
            --bg-card: #ffffff;
            --text-main: #1f1f1f;
            --text-muted: #70757a;
            --accent: #0b57d0;
            --border-color: #dee2e6;
            --google-gray: #f1f3f4;
            --skeleton-base: #e0e0e0;
            --radius-sharp: 4px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #131314;
                --bg-card: #1e1f20;
                --text-main: #e3e3e3;
                --text-muted: #9aa0a6;
                --border-color: #444746;
                --google-gray: #2b2b2b;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; border: none !important; }
        body { 
            background: transparent; 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 0 24px 20px;
        }

        /* --- FILTER BAR (NON-FLOATING) --- */
        .filter-wrapper {
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .filter-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            max-width: 1300px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .filter-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 300px; }
        .filter-right { flex: 1; display: flex; justify-content: flex-end; min-width: 300px; }

        select, .search-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-color) !important;
            border-radius: var(--radius-sharp);
            height: 42px;
            font-family: inherit;
            color: var(--text-main);
            font-size: 14px;
        }

        select { padding: 0 10px; cursor: pointer; min-width: 150px; }

        .btn-refresh {
            background: var(--accent);
            color: white;
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sharp);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .btn-refresh:hover { opacity: 0.8; }

        .search-wrapper {
            display: flex; align-items: center; padding: 0 4px 0 15px;
            width: 100%; max-width: 400px;
        }
        .search-input { background: transparent; width: 100%; color: var(--text-main); font-size: 14px; }
        .search-btn {
            background: var(--accent); color: white; width: 34px; height: 34px;
            border-radius: calc(var(--radius-sharp) - 2px); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- GRID CATALOG --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
            max-width: 1300px; 
            margin: 0 auto; 
        }
        @media (min-width: 640px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 850px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1100px) { .grid { grid-template-columns: repeat(6, 1fr); } }

        .book-card { text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: 0.3s; }
        .book-card:hover { transform: translateY(-5px); }
        .book-img-container { position: relative; width: 100%; aspect-ratio: 3/4.5; margin-bottom: 12px; }
        .book-img { 
            width: 100%; height: 100%; object-fit: cover; 
            border-radius: var(--radius-sharp); background: var(--google-gray); 
            opacity: 0; transition: opacity 0.5s;
            border: 1px solid var(--border-color) !important;
        }

        .book-info { display: flex; flex-direction: column; gap: 4px; }
        .book-title { 
            font-size: 12px; font-weight: 700; text-transform: uppercase; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
            overflow: hidden; line-height: 1.3; height: 2.6em;
        }
        
        .meta-tag { font-size: 10px; font-weight: 600; text-transform: uppercase; display: block; }
        .tag-author { color: var(--text-muted); }
        .tag-kategori { color: var(--accent); }
        .tag-rak { color: #15803d; }
        .tag-status { 
            margin-top: 4px; padding: 2px 6px; 
            background: var(--google-gray); width: fit-content; 
            border-radius: 4px; font-size: 9px; font-weight: 700;
        }

        #sentinel { height: 50px; width: 100%; }
        .hidden { display: none !important; }
        .skeleton-card { width:100%; aspect-ratio:3/4.5; border-radius:var(--radius-sharp); background:var(--skeleton-base); animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="filter-wrapper">
    <div class="filter-container">
        <div class="filter-left">
            <select id="catSelect" onchange="window.resetAndFetch()">
                <option value="">Semua Kategori</option>
            </select>
            <select id="rakSelect" onchange="window.resetAndFetch()">
                <option value="">Semua Rak</option>
            </select>
            <div class="btn-refresh" onclick="window.location.reload()" title="Refresh">
                <i class="fa-solid fa-rotate"></i>
            </div>
        </div>
        <div class="filter-right">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Cari judul atau penulis..." autocomplete="off">
                <button onclick="window.resetAndFetch()" class="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="catalogGrid" class="grid"></div>

<div id="skeletonContainer" class="grid hidden">
    <script>
        for(let i=0; i<6; i++) {
            document.write('<div class="book-card"><div class="skeleton-card"></div></div>');
        }
    </script>
</div>

<div id="sentinel"></div>

<script type="module">
    import { supabase } from './supa/supa.js';

    let currentPage = 0, perPage = 18, isFetching = false, hasMore = true;
    const SVG_DATA = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='300' height='450' viewBox='0 0 300 450'%3E%3Crect width='300' height='450' fill='%23f1f3f4'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='14' fill='%239aa0a6'%3ENo Cover%3C/text%3E%3C/svg%3E";

    // --- LOAD FILTERS ---
    async function loadFilters() {
        // Ambil kategori & rak unik langsung dari biblio & eksemplar agar sinkron dengan data yang ada
        const { data: cats } = await supabase.from('biblio').select('kategori').not('kategori', 'is', null);
        const { data: raks } = await supabase.from('eksemplar').select('lokasi_rak').not('lokasi_rak', 'is', null);

        if (cats) {
            const uniqueCats = [...new Set(cats.map(item => item.kategori))].sort();
            uniqueCats.forEach(c => document.getElementById('catSelect').add(new Option(c, c)));
        }
        if (raks) {
            const uniqueRaks = [...new Set(raks.map(item => item.lokasi_rak))].sort();
            uniqueRaks.forEach(r => document.getElementById('rakSelect').add(new Option(r, r)));
        }
    }

    // --- FETCH DATA ---
    async function fetchBooks() {
        if (isFetching || !hasMore) return;
        isFetching = true;
        document.getElementById('skeletonContainer').classList.remove('hidden');

        const queryText = document.getElementById('searchInput').value.trim();
        const selectedCat = document.getElementById('catSelect').value;
        const selectedRak = document.getElementById('rakSelect').value;

        try {
            let query = supabase
                .from('biblio')
                .select(`
                    id, judul, penulis, sampul_url, kategori,
                    eksemplar(lokasi_rak, status)
                `)
                .order('created_at', { ascending: false })
                .range(currentPage * perPage, (currentPage + 1) * perPage - 1);

            if (queryText) query = query.or(`judul.ilike.%${queryText}%,penulis.ilike.%${queryText}%`);
            if (selectedCat) query = query.eq('kategori', selectedCat);
            
            // Filter rak via join eksemplar
            if (selectedRak) query = query.eq('eksemplar.lokasi_rak', selectedRak);

            const { data, error } = await query;
            if (error) throw error;

            if (data) {
                if (data.length < perPage) hasMore = false;
                renderBooks(data);
                currentPage++;
            }
        } catch (err) {
            console.error("Error:", err.message);
        } finally {
            isFetching = false;
            document.getElementById('skeletonContainer').classList.add('hidden');
        }
    }

    function renderBooks(data) {
        const grid = document.getElementById('catalogGrid');
        data.forEach(item => {
            const card = document.createElement('a');
            card.href = `detail.html?id=${item.id}`;
            card.target = "_parent";
            card.className = 'book-card';
            
            // Mengambil data dari eksemplar pertama
            const ex = item.eksemplar && item.eksemplar.length > 0 ? item.eksemplar[0] : null;
            const lokasiRak = ex ? ex.lokasi_rak : '-';
            const statusBuku = ex ? ex.status : 'Tersedia';

            const imgUrl = item.sampul_url || SVG_DATA;
            card.innerHTML = `
                <div class="book-img-container">
                    <img data-src="${imgUrl}" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="book-img lazy" alt="${item.judul}">
                </div>
                <div class="book-info">
                    <span class="meta-tag tag-kategori">${item.kategori || 'Umum'}</span>
                    <h3 class="book-title">${item.judul}</h3>
                    <span class="meta-tag tag-author">${item.penulis || 'Anonim'}</span>
                    <span class="meta-tag tag-rak"><i class="fa-solid fa-location-dot"></i> ${lokasiRak}</span>
                    <span class="meta-tag tag-status" style="color: ${statusBuku === 'Tersedia' ? '#15803d' : '#d93025'}">${statusBuku}</span>
                </div>
            `;
            grid.appendChild(card);
        });
        initLazy();
    }

    function initLazy() {
        const obs = new IntersectionObserver((es) => {
            es.forEach(e => {
                if(e.isIntersecting) {
                    const img = e.target;
                    img.src = img.dataset.src;
                    img.onload = () => img.style.opacity = '1';
                    obs.unobserve(img);
                }
            });
        });
        document.querySelectorAll('.lazy').forEach(i => obs.observe(i));
    }

    window.resetAndFetch = () => {
        document.getElementById('catalogGrid').innerHTML = '';
        currentPage = 0; hasMore = true;
        fetchBooks();
    };

    document.getElementById('searchInput').onkeydown = (e) => { if(e.key === 'Enter') window.resetAndFetch(); };

    // Start
    loadFilters();
    fetchBooks();

    // Infinite Scroll
    const scrollObs = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) fetchBooks();
    }, { rootMargin: '400px' });
    scrollObs.observe(document.getElementById('sentinel'));
</script>

<script>
    // Auto resize untuk iframe
    function sendHeight() {
        const height = document.documentElement.scrollHeight;
        window.parent.postMessage({ type: 'resize', height: height }, '*');
    }
    const resizeObserver = new ResizeObserver(sendHeight);
    resizeObserver.observe(document.body);
    window.onload = sendHeight;
</script>

</body>
</html>
