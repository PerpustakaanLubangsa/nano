<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Label - Dark Google UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #000000;
            --bg-card: #131314;
            --bg-hover: #1e1f20;
            --accent: #8ab4f8;
            --text-main: #e3e3e3;
            --text-dim: #c4c7c5;
            --border: #2c2c2e;
        }

        body { 
            background-color: var(--bg-page); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        /* Label Spine Style (Tetap Putih untuk Cetak) */
        .label-spine {
            width: 100%;
            height: 3.5cm;
            border: 1px solid #000;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
            color: #000;
        }

        .label-header {
            background-color: #f1f5f9;
            border-bottom: 0.5pt solid #000;
            font-size: 8px;
            text-align: center;
            font-weight: 800;
            padding: 3px;
            text-transform: uppercase;
            color: #000;
        }

        .label-content {
            padding: 4px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .label-title-top {
            font-size: 7px;
            font-weight: 700;
            line-height: 1.1;
            text-transform: uppercase;
            border-bottom: 0.2pt solid #eee;
            padding-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #000;
        }

        .call-number-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .call-number-line {
            font-size: 13px;
            font-weight: 800;
            line-height: 1.1;
            text-transform: uppercase;
            color: #000;
        }

        .label-code-bottom {
            font-size: 9px;
            font-weight: 600;
            border-top: 0.2pt solid #eee;
            padding-top: 2px;
            color: #000;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            #printArea { 
                display: grid !important;
                grid-template-columns: repeat(4, 1fr);
                gap: 5mm; 
                padding: 10mm;
            }
            .label-spine { page-break-inside: avoid; border: 0.5pt solid #000 !important; }
        }

        .custom-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .custom-card:hover {
            border-color: #444746;
            background: var(--bg-hover);
        }

        .exemplar-badge {
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: #202124;
            color: var(--text-dim);
            font-weight: 700;
        }

        .exemplar-badge.selected {
            background-color: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(138, 180, 248, 0.3);
        }

        .search-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 100px;
            transition: all 0.2s;
        }

        .search-container:focus-within {
            background: var(--bg-hover);
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .loader {
            width: 20px; height: 20px;
            border: 2px solid #3c4043;
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-primary {
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-primary:disabled { background: #3c4043; color: #80868b; cursor: not-allowed; }
        .btn-primary:not(:disabled):hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-6xl mx-auto no-print">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 text-center md:text-left">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Label Punggung</h1>
                <p class="text-dim text-xs mt-1 font-medium tracking-wide">Lubangsa Library • Spine Label Edition</p>
            </div>
            <div class="flex items-center gap-6">
                <div id="statusLoader" class="loader"></div>
                <button id="printBtn" onclick="window.print()" disabled class="btn-primary">
                    Cetak (<span id="selectedCount">0</span>) Label
                </button>
            </div>
        </header>

        <div class="search-container p-1 px-5 mb-10 flex items-center">
            <div class="text-dim">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <input type="text" id="searchInput" placeholder="Cari judul buku..." class="w-full p-3 bg-transparent outline-none font-medium text-white placeholder:text-neutral-600">
        </div>

        <div id="biblioList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 min-h-[300px]"></div>

        <div class="mt-16 flex flex-col items-center gap-6 pb-32">
            <div id="paginationContainer" class="flex gap-2"></div>
            <p id="resultInfo" class="text-[11px] font-bold text-neutral-600 uppercase tracking-widest"></p>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);

        let localData = [];
        let selectedItems = [];
        let currentPage = 1;
        const itemsPerPage = 12;
        let searchQuery = '';

        async function loadData(page = 1) {
            currentPage = page;
            const loader = document.getElementById('statusLoader');
            loader.style.display = 'block';

            const from = (currentPage - 1) * itemsPerPage;
            const to = from + itemsPerPage - 1;

            let query = client.from('biblio').select('*, eksemplar(*)', { count: 'exact' });
            if (searchQuery) query = query.ilike('judul', `%${searchQuery}%`);
            query = query.order('updated_at', { ascending: false }).range(from, to);

            const { data, count, error } = await query;
            loader.style.display = 'none';

            if (!error) {
                localData = data;
                renderUI(count);
            }
        }

        function renderUI(totalCount) {
            const container = document.getElementById('biblioList');
            if (localData.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-neutral-700 uppercase font-black tracking-widest">Tidak ada hasil</div>`;
                return;
            }

            container.innerHTML = localData.map(b => {
                const eks = b.eksemplar || [];
                return `
                    <div class="custom-card p-5 flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-white leading-tight line-clamp-2 text-sm mb-4">${b.judul}</h3>
                            <div class="flex flex-wrap gap-2 mb-6">
                                ${eks.length > 0 ? eks.map(e => {
                                    const isSelected = selectedItems.some(item => item.id === e.id);
                                    return `<div id="badge-${e.id}" onclick="toggleLabel('${e.id}', '${b.id}')" 
                                            class="exemplar-badge px-3 py-1.5 rounded-lg text-[10px] ${isSelected ? 'selected' : ''}">${e.kode}</div>`;
                                }).join('') : '<p class="text-[10px] text-neutral-700 font-bold italic">KOSONG</p>'}
                            </div>
                        </div>
                        <div class="pt-4 border-t border-neutral-800 flex justify-between items-center">
                            <span class="text-[10px] font-bold text-accent uppercase tracking-wider">${eks.length} Unit</span>
                            <button onclick="selectAllInBiblio('${b.id}')" class="text-[10px] font-bold text-neutral-500 hover:text-accent transition-colors">PILIH SEMUA</button>
                        </div>
                    </div>
                `;
            }).join('');
            renderPagination(totalCount);
        }

        function toggleLabel(eksId, bibId) {
            const bib = localData.find(x => x.id === bibId);
            const eks = bib.eksemplar.find(e => e.id === eksId);
            const index = selectedItems.findIndex(item => item.id === eksId);
            const badge = document.getElementById(`badge-${eksId}`);

            if (index > -1) {
                selectedItems.splice(index, 1);
                if(badge) badge.classList.remove('selected');
            } else {
                selectedItems.push({ 
                    id: eks.id, kode: eks.kode, judul: bib.judul, 
                    nomer: (eks.nomor_panggil || '000').toUpperCase() 
                });
                if(badge) badge.classList.add('selected');
            }
            updateStats();
        }

        function selectAllInBiblio(bibId) {
            const bib = localData.find(x => x.id === bibId);
            bib.eksemplar.forEach(eks => {
                if (!selectedItems.some(item => item.id === eks.id)) {
                    selectedItems.push({ 
                        id: eks.id, kode: eks.kode, judul: bib.judul, 
                        nomer: (eks.nomor_panggil || '000').toUpperCase() 
                    });
                    const badge = document.getElementById(`badge-${eks.id}`);
                    if(badge) badge.classList.add('selected');
                }
            });
            updateStats();
        }

        function updateStats() {
            document.getElementById('selectedCount').innerText = selectedItems.length;
            document.getElementById('printBtn').disabled = selectedItems.length === 0;
            renderPrintArea();
        }

        function renderPrintArea() {
            const area = document.getElementById('printArea');
            area.innerHTML = selectedItems.map(item => {
                const callNumParts = item.nomer.split(' ');
                return `
                <div class="label-spine">
                    <div class="label-header">PERPUSTAKAAN LUBANGSA</div>
                    <div class="label-content">
                        <div class="label-title-top">${item.judul}</div>
                        <div class="call-number-group">
                            ${callNumParts.map(n => `<div class="call-number-line">${n}</div>`).join('')}
                        </div>
                        <div class="label-code-bottom">${item.kode}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderPagination(total) {
            const totalPages = Math.ceil(total / itemsPerPage);
            const container = document.getElementById('paginationContainer');
            document.getElementById('resultInfo').innerText = `Menampilkan ${localData.length} dari ${total} Buku`;
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                if (i == 1 || i == totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `
                        <button onclick="loadData(${i})" 
                                class="w-9 h-9 rounded-lg border font-bold text-xs transition-all 
                                ${i === currentPage ? 'bg-accent text-black border-accent' : 'bg-transparent text-neutral-500 border-neutral-800 hover:border-neutral-600'}">
                            ${i}
                        </button>`;
                } else if (i == currentPage - 3 || i == currentPage + 3) {
                    html += `<span class="px-1 text-neutral-800">...</span>`;
                }
            }
            container.innerHTML = html;
        }

        let debounceTimer;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => { 
                searchQuery = e.target.value; 
                loadData(1); 
            }, 600);
        });

        window.onload = () => loadData();
    </script>
</body>
</html>
