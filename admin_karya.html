<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Berita & Karya | Perpustakaan Lubangsa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-card: #111112;
            --text-primary: #f5f5f7;
            --text-secondary: #7e8280;
            --border-color: rgba(255, 255, 255, 0.06);
            --accent-color: #0a84ff;
            --card-inner: #161618;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif;
            outline: none !important;
        }

        h1, h2, h3, button, a, label, select, .font-heading {
            font-family: 'Outfit', sans-serif !important;
        }

        body {
            background: transparent;
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .modern-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
        }
        
        .modern-input {
            background: var(--card-inner); 
            border: 1px solid var(--border-color); 
            border-radius: 8px;
            color: var(--text-primary); 
            transition: all 0.2s ease;
        }
        .modern-input:focus { 
            border-color: var(--accent-color); 
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
        }

        .msn-grid {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 14px;
        }
        @media (min-width: 640px) { .msn-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (min-width: 1024px) { .msn-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pb-4 mb-5 border-b border-[var(--border-color)]">
        <div>
            <div class="flex items-center gap-1.5 text-[9px] font-extrabold text-[var(--accent-color)] tracking-widest uppercase mb-0.5">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-[var(--accent-color)]"></span> Hub Kreatif Santri
            </div>
            <h1 class="text-xl font-extrabold tracking-tight text-white uppercase">
                Arsip & Karya Berkala
            </h1>
        </div>
        
        <a href="form-karya.html" class="inline-flex items-center justify-center gap-2 bg-white text-black hover:bg-gray-200 font-bold text-xs px-4 py-2.5 rounded-lg tracking-wide uppercase transition-colors">
            <i class="fa-solid fa-plus text-xs"></i> Tulis Karya Baru
        </a>
    </header>

    <div class="modern-card p-2.5 mb-5 flex flex-col sm:flex-row gap-2">
        <div class="relative flex-1">
            <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
            <input type="text" id="searchInp" placeholder="Cari naskah, judul, rubrik..." class="w-full modern-input font-semibold text-xs pl-10 pr-3 py-3 uppercase tracking-wide placeholder-gray-600">
        </div>
        <select id="filterKategori" class="modern-input font-bold text-xs px-3 py-3 cursor-pointer min-w-[160px] uppercase tracking-wide text-gray-400">
            <option value="">Semua Rubrik</option>
            <option value="ESAI">ESAI</option>
            <option value="OPINI">OPINI</option>
            <option value="JURNAL">JURNAL</option>
            <option value="PUISI">PUISI</option>
            <option value="CERPEN">CERPEN</option>
        </select>
    </div>

    <div id="karyaContainer" class="msn-grid"></div>

    <div id="loadingIndicator" class="py-12 text-center text-[var(--text-secondary)] modern-card mt-4 hidden">
        <i class="fa-solid fa-circle-notch animate-spin text-[var(--accent-color)] text-sm mb-1"></i>
        <p class="font-bold tracking-widest uppercase text-[8px]">Memuat Arsip...</p>
    </div>
    
    <div id="emptyState" class="py-20 text-center text-[var(--text-secondary)] modern-card mt-4 hidden">
        <i class="fa-solid fa-newspaper text-2xl mb-2 text-neutral-800"></i>
        <p class="text-xs font-bold tracking-wider uppercase text-neutral-500">Tidak ada naskah ditemukan</p>
    </div>

    <div id="deleteModal" class="fixed inset-0 bg-black/85 hidden items-center justify-center z-50 p-4">
        <div class="bg-[#111112] w-full max-w-xs rounded-xl p-5 border border-neutral-800 text-center">
            <h3 class="text-white font-bold text-xs uppercase tracking-wider mb-1">Hapus Arsip Media?</h3>
            <p class="text-[10px] text-[var(--text-secondary)] mb-4 uppercase tracking-tight">Data dan gambar sampel akan dihapus permanen.</p>
            <div class="flex flex-col gap-1">
                <button id="btnConfirmDelete" class="w-full py-2.5 bg-red-600 hover:bg-red-500 text-white font-bold text-[10px] rounded-lg tracking-wider uppercase">HAPUS</button>
                <button onclick="closeDeleteModal()" class="w-full py-2.5 bg-neutral-900 text-gray-400 font-bold text-[10px] rounded-lg border border-neutral-800 tracking-wider uppercase">BATAL</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supa/supa.js';

        const LIMIT = 9; 
        let currentPage = 0;
        let isLoading = false;
        let hasMore = true;
        let selectedKaryaId = null;
        let searchTimeout = null;

        const karyaContainer = document.getElementById('karyaContainer');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const emptyState = document.getElementById('emptyState');
        const searchInp = document.getElementById('searchInp');
        const filterKategori = document.getElementById('filterKategori');

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            const localLogin = sessionStorage.getItem('isLoggedIn');
            if (!session || localLogin !== 'true') {
                sessionStorage.clear();
                window.location.replace('login.html');
            }
        }

        async function fetchKarya(reset = false) {
            if (isLoading || (!hasMore && !reset)) return;
            isLoading = true;
            loadingIndicator.classList.remove('hidden');
            
            if (reset) {
                currentPage = 0;
                hasMore = true;
                karyaContainer.innerHTML = '';
                emptyState.classList.add('hidden');
            }

            try {
                const from = currentPage * LIMIT;
                const to = from + LIMIT - 1;

                // Memperbaiki pemanggilan relasi kolom dari 'organelles' menjadi 'organisasi'
                let query = supabase
                    .from('karya')
                    .select(`
                        id, kategori, judul, isi, foto_url, dibuat_pada, anggota_id,
                        anggota (id, nis, nama, kamar, organisasi)
                    `, { count: 'exact' })
                    .order('dibuat_pada', { ascending: false })
                    .range(from, to);

                const kategoriVal = filterKategori.value;
                if (kategoriVal) query = query.eq('kategori', kategoriVal);

                const searchVal = searchInp.value.trim();
                if (searchVal) {
                    query = query.or(`judul.ilike.%${searchVal}%,kategori.ilike.%${searchVal}%`);
                }

                const { data, error } = await query;
                if (error) throw error;

                if (!data || data.length === 0) {
                    hasMore = false;
                    if (reset) emptyState.classList.remove('hidden');
                } else {
                    if (data.length < LIMIT) hasMore = false;
                    renderMsnCards(data);
                    currentPage++;
                }
            } catch (err) {
                console.error("Gagal sinkronisasi data:", err.message);
            } finally {
                isLoading = false;
                loadingIndicator.classList.add('hidden');
            }
        }

        function renderMsnCards(karyaItems) {
            const fragment = document.createDocumentFragment();

            karyaItems.forEach(item => {
                const profile = item.anggota || {}; 
                
                const div = document.createElement('div');
                div.className = 'modern-card p-4 flex flex-col justify-between hover:bg-[#151517] border-neutral-900 cursor-pointer group transition-colors duration-150';
                
                div.onclick = (e) => {
                    if(!e.target.closest('.action-btn')) {
                        localStorage.setItem('selectedKaryaId', item.id);
                        window.location.href = 'detail_karya.html';
                    }
                };

                const tglPublish = item.dibuat_pada ? new Date(item.dibuat_pada).toLocaleDateString('id-ID', {
                    day: 'numeric', month: 'short', year: 'numeric'
                }) : '-';

                let sampulHTML = '';
                if (item.foto_url) {
                    sampulHTML = `
                        <div class="w-full h-36 mb-3 rounded-lg overflow-hidden bg-neutral-950 border border-neutral-900/50 relative">
                            <img src="${item.foto_url}" alt="Sampul Naskah" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                        </div>
                    `;
                }

                const avatarHTML = `<div class="w-full h-full flex items-center justify-center bg-neutral-900 text-neutral-400 text-[10px] font-bold uppercase">${profile.nama ? profile.nama.charAt(0) : 'S'}</div>`;
                const plainTextIsi = item.isi ? item.isi.replace(/<[^>]*>/g, '') : '';

                div.innerHTML = `
                    <div>
                        ${sampulHTML}

                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[9px] font-bold text-[var(--accent-color)] tracking-wider uppercase bg-blue-500/10 px-2 py-0.5 rounded-md">${item.kategori || 'UMUM'}</span>
                            <span class="text-[9px] font-semibold text-neutral-600 uppercase tracking-tight">${tglPublish}</span>
                        </div>

                        <h3 class="text-xs font-bold text-white uppercase tracking-wide group-hover:text-[var(--accent-color)] mb-1.5 line-clamp-2 leading-snug transition-colors">
                            ${item.judul || 'Tanpa Judul'}
                        </h3>

                        <p class="text-[10px] text-[var(--text-secondary)] font-normal leading-relaxed mb-3 line-clamp-3 uppercase tracking-tight">
                            ${plainTextIsi || 'Tidak ada deskripsi naskah.'}
                        </p>
                    </div>

                    <div class="pt-3 border-t border-neutral-900/40 flex items-center justify-between mt-auto">
                        <div class="flex items-center gap-2 min-w-0">
                            <div class="w-6 h-6 bg-neutral-950 border border-neutral-800 overflow-hidden shrink-0 rounded-md">
                                ${avatarHTML}
                            </div>
                            <div class="min-w-0">
                                <h4 class="text-[9px] font-bold text-gray-300 truncate uppercase tracking-wider">${profile.nama || 'ANONIM'}</h4>
                                <p class="text-[8px] font-semibold text-neutral-600 uppercase tracking-tight truncate mt-0.5">
                                    ${profile.kamar || '-'} • ${profile.organisasi || '-'}
                                </p>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 shrink-0 pl-1">
                            <div class="flex items-center gap-1 border-l border-neutral-900 pl-1.5">
                                <button onclick="event.stopPropagation(); localStorage.setItem('selectedKaryaId', '${item.id}'); window.location.href='form-karya.html'" class="action-btn w-6 h-6 flex items-center justify-center bg-neutral-900 border border-neutral-800 text-gray-400 hover:text-white rounded-md transition-colors">
                                    <i class="fa-solid fa-pen text-[8px]"></i>
                                </button>
                                <button onclick="event.stopPropagation(); openDeleteModal('${item.id}')" class="action-btn w-6 h-6 flex items-center justify-center bg-neutral-900 border border-neutral-800 text-neutral-500 hover:text-red-400 rounded-md transition-colors">
                                    <i class="fa-solid fa-trash text-[8px]"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                fragment.appendChild(div);
            });
            karyaContainer.appendChild(fragment);
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 150) {
                fetchKarya();
            }
        }, { passive: true });

        searchInp.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => fetchKarya(true), 350);
        });

        filterKategori.addEventListener('change', () => fetchKarya(true));

        window.openDeleteModal = (id) => {
            selectedKaryaId = id;
            document.getElementById('deleteModal').style.display = 'flex';
        };

        window.closeDeleteModal = () => {
            selectedKaryaId = null;
            document.getElementById('deleteModal').style.display = 'none';
        };

        document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
            if (!selectedKaryaId) return;
            
            const btnDelete = document.getElementById('btnConfirmDelete');
            btnDelete.disabled = true;
            btnDelete.innerText = "MENGHAPUS...";

            try {
                // 1. Ambil data karya lama terlebih dahulu untuk mengecek apakah ada file foto_url
                const { data: naskah, error: getError } = await supabase
                    .from('karya')
                    .select('foto_url')
                    .eq('id', selectedKaryaId)
                    .single();

                if (getError) throw getError;

                // 2. Jika ada foto_url, hapus file fisiknya dari Storage Bucket 'sampul_karya'
                if (naskah && naskah.foto_url) {
                    const namaFile = naskah.foto_url.split('/').pop();
                    
                    if (namaFile) {
                        const { error: storageError } = await supabase.storage
                            .from('sampul_karya')
                            .remove([namaFile]);
                        
                        if (storageError) {
                            console.warn("Gagal membersihkan file di bucket storage:", storageError.message);
                        }
                    }
                }

                // 3. Hapus baris data dokumen dari database utama
                const { error: dbError } = await supabase
                    .from('karya')
                    .delete()
                    .eq('id', selectedKaryaId);

                if (dbError) throw dbError;

                closeDeleteModal();
                fetchKarya(true);
            } catch (err) {
                alert("Gagal menghapus arsip: " + err.message);
            } finally {
                btnDelete.disabled = false;
                btnDelete.innerText = "HAPUS";
            }
        });

        (async () => {
            await checkAuth();
            fetchKarya(true);
        })();
    </script>
</body>
</html>
