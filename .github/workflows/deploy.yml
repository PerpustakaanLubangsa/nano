name: Deploy Edge Function Otomatis

on:
  push:
    branches:
      - main # Pastikan ini nama branch Anda (main/master)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode dari Repo
        uses: actions/checkout@v3

      - name: Pasang Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Kirim ke Supabase
        run: supabase functions deploy delete-user --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify --use-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
