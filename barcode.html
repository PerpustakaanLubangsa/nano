<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Barcode - Dark Google UI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #000000;
            --bg-card: #131314;
            --bg-hover: #1e1f20;
            --accent: #8ab4f8;
            --text-main: #e3e3e3;
            --text-dim: #c4c7c5;
            --border: #2c2c2e;
        }

        body { 
            background-color: var(--bg-page); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        /* Label Barcode Style (Tetap Putih agar terbaca Scanner saat diprint) */
        .label-preview {
            width: 4cm;
            height: 2.5cm;
            border: 0.5pt solid #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            color: black;
            overflow: hidden;
            box-sizing: border-box;
        }

        .label-library-header {
            background-color: #f1f5f9;
            font-size: 7pt;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            border-bottom: 0.5pt solid #000;
            width: 100%;
            padding: 1.5mm 0;
            color: black;
        }

        .label-title-tiny {
            font-size: 4.5pt;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
            margin: 1mm 1mm 0.5mm 1mm;
            color: #475569;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-transform: uppercase;
        }

        .barcode-svg {
            width: 90%;
            max-height: 1.1cm;
        }

        .label-code-bottom {
            font-size: 9pt;
            font-weight: 800;
            margin-top: 0.5mm;
            letter-spacing: 1px;
            color: black;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            #printArea { 
                display: grid !important;
                grid-template-columns: repeat(4, 1fr);
                gap: 5mm; 
                padding: 10mm;
            }
        }

        .custom-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .custom-card:hover {
            background: var(--bg-hover);
            border-color: #444746;
        }

        .custom-card.selected {
            border-color: var(--accent);
            background-color: rgba(138, 180, 248, 0.08);
        }

        .loader {
            width: 20px; height: 20px;
            border: 2px solid #3c4043;
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-primary {
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s;
        }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-primary:disabled { background: #3c4043; color: #80868b; cursor: not-allowed; transform: none; }

        .search-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 100px;
        }
        
        .search-container:focus-within {
            background: var(--bg-hover);
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-6xl mx-auto no-print">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 text-center md:text-left">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Cetak Barcode</h1>
                <p class="text-dim text-xs mt-1 font-medium">Lubangsa Library • Management System</p>
            </div>
            <div class="flex items-center gap-6">
                <div id="statusLoader" class="loader"></div>
                <button id="printBtn" onclick="window.print()" disabled class="btn-primary">
                    Cetak <span id="selectedCount" class="mx-1">0</span> Label
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2">
                <div class="search-container p-1 px-5 mb-8 flex items-center">
                    <div class="text-dim">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                    <input type="text" id="searchInput" placeholder="Cari judul buku atau kode barcode..." class="w-full p-3 bg-transparent outline-none font-medium text-white placeholder:text-neutral-600">
                </div>

                <div id="dataList" class="grid grid-cols-1 md:grid-cols-2 gap-3 min-h-[400px]"></div>
                
                <div class="mt-12 flex flex-col items-center gap-6 pb-20">
                    <div id="pagination" class="flex gap-2"></div>
                </div>
            </div>

            <div class="relative">
                <div class="sticky top-10 space-y-6">
                    <div class="bg-[#1e1f20] p-8 rounded-[2rem] border border-neutral-800 flex flex-col items-center">
                        <h2 class="text-[11px] font-bold text-dim uppercase tracking-widest mb-6">Preview Label</h2>
                        <div id="previewBox" class="bg-black/20 p-6 rounded-2xl w-full flex justify-center border border-neutral-800/50">
                            <div id="singlePreview" class="label-preview shadow-2xl">
                                <span class="text-[9px] text-slate-300 p-10 font-bold uppercase">Pilih Item</span>
                            </div>
                        </div>
                        <button onclick="clearSelection()" class="mt-8 text-xs font-bold text-red-400 hover:text-red-300 transition-colors">Reset Pilihan</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);

        let allData = [];
        let selectedItems = new Map();
        let currentPage = 1;
        const itemsPerPage = 10;
        let queryStr = '';

        async function loadData() {
            document.getElementById('statusLoader').style.display = 'block';
            let { data, error } = await client.from('eksemplar').select(`id, kode, biblio ( judul )`).order('created_at', { ascending: false });
            document.getElementById('statusLoader').style.display = 'none';

            if (!error) {
                allData = data.map(item => ({
                    id: item.id,
                    kode: item.kode,
                    judul: item.biblio ? item.biblio.judul : 'Tanpa Judul'
                }));
                renderUI();
            }
        }

        function renderUI() {
            const container = document.getElementById('dataList');
            const filtered = allData.filter(i => 
                i.judul.toLowerCase().includes(queryStr.toLowerCase()) || 
                i.kode.toLowerCase().includes(queryStr.toLowerCase())
            );
            
            const start = (currentPage - 1) * itemsPerPage;
            const paginated = filtered.slice(start, start + itemsPerPage);

            container.innerHTML = paginated.map(item => `
                <div onclick="toggleItem('${item.id}')" class="custom-card p-4 rounded-xl cursor-pointer flex items-center justify-between group ${selectedItems.has(item.id) ? 'selected' : ''}">
                    <div class="pr-4">
                        <div class="text-[10px] font-bold text-accent uppercase tracking-wider mb-0.5">${item.kode}</div>
                        <div class="text-sm font-medium text-white line-clamp-1">${item.judul}</div>
                    </div>
                    <div class="flex-shrink-0 w-5 h-5 rounded-full border flex items-center justify-center transition-all ${selectedItems.has(item.id) ? 'bg-accent border-accent' : 'border-neutral-700 group-hover:border-neutral-500'}">
                        ${selectedItems.has(item.id) ? '<svg class="w-3 h-3 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M5 13l4 4L19 7"/></svg>' : ''}
                    </div>
                </div>
            `).join('');
            renderPagination(filtered.length);
            updatePrintArea();
        }

        function toggleItem(id) {
            const item = allData.find(i => i.id === id);
            if (selectedItems.has(id)) {
                selectedItems.delete(id);
            } else {
                selectedItems.set(id, item);
                showPreview(item);
            }
            renderUI();
            updateStats();
        }

        function showPreview(item) {
            const preview = document.getElementById('singlePreview');
            preview.innerHTML = `
                <div class="label-library-header">PERPUSTAKAAN LUBANGSA</div>
                <div class="label-title-tiny">${item.judul}</div>
                <svg id="prevBarcode" class="barcode-svg"></svg>
                <div class="label-code-bottom">${item.kode}</div>
            `;
            JsBarcode("#prevBarcode", item.kode, { 
                format: "CODE128", 
                width: 2, 
                height: 40, 
                displayValue: false, 
                margin: 0 
            });
        }

        function updateStats() {
            const count = selectedItems.size;
            document.getElementById('selectedCount').innerText = count;
            document.getElementById('printBtn').disabled = count === 0;
        }

        function updatePrintArea() {
            const area = document.getElementById('printArea');
            area.innerHTML = '';
            const grid = document.createElement('div');
            grid.id = "printGrid";
            selectedItems.forEach(item => {
                const label = document.createElement('div');
                label.className = 'label-preview';
                label.innerHTML = `
                    <div class="label-library-header">PERPUSTAKAAN LUBANGSA</div>
                    <div class="label-title-tiny">${item.judul}</div>
                    <svg class="barcode-render" data-code="${item.kode}"></svg>
                    <div class="label-code-bottom">${item.kode}</div>
                `;
                grid.appendChild(label);
            });
            area.appendChild(grid);
            document.querySelectorAll('.barcode-render').forEach(el => {
                JsBarcode(el, el.getAttribute('data-code'), { format: "CODE128", width: 2.2, height: 45, displayValue: false, margin: 0 });
            });
        }

        function renderPagination(total) {
            const pages = Math.ceil(total / itemsPerPage);
            const container = document.getElementById('pagination');
            let html = '';
            for(let i=1; i<=pages; i++) {
                if(i==1 || i==pages || (i >= currentPage-1 && i <= currentPage+1)) {
                    html += `
                        <button onclick="currentPage=${i}; renderUI();" 
                                class="w-9 h-9 rounded-lg border font-bold text-xs transition-all 
                                ${i==currentPage ? 'bg-accent text-black border-accent' : 'bg-transparent text-dim border-neutral-800 hover:border-neutral-600'}">
                            ${i}
                        </button>`;
                }
            }
            container.innerHTML = html;
        }

        function clearSelection() {
            selectedItems.clear();
            document.getElementById('singlePreview').innerHTML = '<span class="text-[9px] text-slate-300 p-10 font-bold uppercase">Pilih Item</span>';
            renderUI();
            updateStats();
        }

        let debounceTimer;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                queryStr = e.target.value;
                currentPage = 1;
                renderUI();
            }, 500);
        });

        window.onload = loadData;
    </script>
</body>
</html>
