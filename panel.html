<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Manajemen | Perpustakaan Lubangsa</title>
    <link rel="icon" type="image/png" href="image/logo/logo.png">
    
    <link rel="stylesheet" href="colors.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Menyimpan variabel layout non-warna agar tetap teratur */
            --sidebar-collapsed-width: 60px;
            --sidebar-expanded-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; border: none !important; outline: none !important; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-global); 
            color: var(--text-main); 
            overflow: hidden; 
            position: relative;
            height: 100vh; 
            width: 100vw; 
        }

        /* SIDEBAR TETAP SOLID SAAT CIUT DAN HOVER */
        #sidebar { 
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-collapsed-width); 
            /* Diubah ke warna solid agar wallpaper tidak menerawang ke area sidebar */
            background: var(--bg-sidebar-solid); 
            display: flex; 
            flex-direction: column; 
            z-index: 100; 
            transition: width 0.15s ease-out, background-color 0.15s ease-out;
            overflow: hidden;
        }

        #sidebar:hover {
            width: var(--sidebar-expanded-width);
            background: var(--bg-sidebar-solid); 
        }

        .sidebar-header { 
            padding: 20px 14px; 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            overflow: hidden;
            width: var(--sidebar-expanded-width);
        }
        .lib-logo { height: 32px; width: 32px; object-fit: contain; flex-shrink: 0; }
        
        .hide-on-collapsed {
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.1s ease-out;
            pointer-events: none;
        }
        #sidebar:hover .hide-on-collapsed {
            opacity: 1;
            pointer-events: auto;
            transition-delay: 0.05s;
        }

        .lib-brand-text { font-size: 13px; font-weight: 800; color: white; letter-spacing: 0.5px; line-height: 1.2; }
        
        nav { 
            flex: 1; 
            overflow-y: auto; 
            padding: 0 8px; 
            overflow-x: hidden;
            scrollbar-width: none; 
            will-change: scroll-position; /* Optimasi GPU browser agar rendering text saat di-scroll tidak pecah/blur */
        }
        nav::-webkit-scrollbar { display: none; }

        .nav-label { 
            padding: 16px 6px 6px; 
            font-size: 9px; 
            font-weight: 800; 
            color: var(--text-label); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            transition: opacity 0.1s;
            opacity: 0;
            white-space: nowrap;
        }
        #sidebar:hover .nav-label {
            opacity: 1;
        }

        .sidebar-item { 
            margin: 3px 0; 
            padding: 11px 12px; 
            border-radius: 10px; 
            color: var(--text-muted); 
            font-size: 13px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: background-color 0.15s, color 0.15s; 
            display: flex; 
            align-items: center; 
            position: relative; 
            width: 100%; 
            overflow: hidden;
        }
        .sidebar-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
            margin-right: 18px;
            flex-shrink: 0;
        }
        .sidebar-item:hover { background-color: var(--item-hover); color: white; }
        
        .sidebar-item.active { 
            background-color: var(--active-box) !important; 
            color: var(--primary); 
            font-weight: 600; 
        }

        .dot-notif { 
            width: 6px; 
            height: 6px; 
            background: #34c759; 
            border-radius: 50%; 
            display: none; 
            box-shadow: 0 0 6px #34c759; 
            animation: pulse-dot 1.5s infinite; 
            position: absolute;
            left: 24px;
            top: 10px;
            z-index: 10;
        }
        #sidebar:hover .dot-notif {
            position: absolute;
            left: auto;
            right: 14px;
            top: 18px;
        }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }

        .sidebar-footer { 
            margin: 8px;
            padding: 8px; 
            background: rgba(255,255,255,0.01);
            border-radius: 10px;
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            transition: background-color 0.15s; 
            overflow: hidden;
        }
        .sidebar-footer:hover { background: var(--item-hover); }
        .profile-img-mini { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .user-name-mini { font-size: 12px; font-weight: 700; color: white; display: block; }
        .user-role-mini { font-size: 9px; font-weight: 700; color: var(--primary); text-transform: uppercase; opacity: 0.8; }

        /* MAIN KONTEN - WALLPAPER HANYA BERLAKU DI SEBELAH KANAN SIDEBAR */
        main { 
            width: 100%;
            height: 100%;
            /* Jarak disesuaikan dengan lebar sidebar agar background main tidak masuk ke area bawah sidebar */
            padding-left: var(--sidebar-collapsed-width); 
            background: url('wallpaper.png') no-repeat center center;
            background-size: cover;
            overflow: hidden; 
        }
        #contentArea { width: 100%; height: 100%; }
        /* iframe dibuat transparan sempurna agar wallpaper di belakangnya terlihat */
        iframe { width: 100%; height: 100%; border: none; background: transparent; transition: opacity 0.2s; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #1c1c1e; width: 90%; max-width: 300px; border-radius: 20px; padding: 24px; text-align: center; }
        .m3-btn { width: 100%; height: 46px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: 0.15s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-tonal { background: var(--error); color: white; }
        .btn-text { background: transparent; color: #8e918f; }
    </style>
</head>
<body>

<div id="logoutModal" class="modal-overlay" onclick="closeModal('logoutModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="modalAvatar" src="" class="w-16 h-16 rounded-2xl mx-auto mb-4 border border-white/10 !important">
        <h2 id="modalName" class="text-base font-bold uppercase mb-1">User</h2>
        <p id="modalRole" class="text-[9px] font-bold text-blue-500 uppercase mb-5">Role</p>
        <button onclick="confirmLogout()" class="m3-btn btn-tonal">LOGOUT</button>
        <button onclick="closeModal('logoutModal')" class="m3-btn btn-text">BATAL</button>
    </div>
</div>

<div id="absensiModal" class="modal-overlay">
    <div class="modal-content">
        <div class="w-14 h-14 bg-blue-500/10 text-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4 text-xl">
            <i class="fa-solid fa-user-clock"></i>
        </div>
        <h2 class="text-base font-bold uppercase mb-1">Peringatan Absen</h2>
        <p class="text-[11px] leading-relaxed text-gray-400 mb-6">Shift saat ini belum lengkap. Silakan lakukan absensi petugas segera.</p>
        <button onclick="goToAbsensi()" class="m3-btn btn-primary">ABSEN SEKARANG</button>
        <button onclick="closeModal('absensiModal')" class="m3-btn btn-text">NANTI SAJA</button>
    </div>
</div>

<aside id="sidebar">
    <div class="sidebar-header">
        <img src="image/logo/logo.png" alt="Logo" class="lib-logo">
        <span class="lib-brand-text hide-on-collapsed">LUBANGSA<br><span style="opacity: 0.5; font-weight: 500;">LIBRARY</span></span>
    </div>
    
    <nav id="dynamicNavContainer"></nav>

    <div class="sidebar-footer" onclick="openLogoutModal()">
        <img id="userAvatar" src="" class="profile-img-mini">
        <div class="user-meta overflow-hidden hide-on-collapsed">
            <span id="footerUserName" class="user-name-mini truncate">USER</span>
            <span id="footerUserRole" class="user-role-mini">ROLE</span>
        </div>
    </div>
</aside>

<main>
    <div id="contentArea">
        <iframe id="contentFrame" src="beranda.html" allowtransparency="true"></iframe>
    </div>
</main>

<script type="module">
    import { supabase } from './supa/supa.js';

    window.loadPage = (page, el) => {
        const f = document.getElementById('contentFrame');
        const currentPath = f.src.split('/').pop();
        if (currentPath === page) return;

        f.style.opacity = '0';
        setTimeout(() => {
            f.src = page;
            f.onload = () => f.style.opacity = '1';
        }, 120);

        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        if (el) el.classList.add('active');
        if (window.event) window.event.stopPropagation();
    };

    let isAbsensiLengkap = true;
    async function checkAbsensiStatus() {
        try {
            const HARI_MAP = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const now = new Date();
            const hariIni = HARI_MAP[now.getDay()];
            const jamMenit = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const tgl = now.toISOString().split('T')[0];

            const { data: shifts } = await supabase.from('jam_master').select('*');
            const currentShift = shifts?.find(s => {
                const [m, sl] = s.waktu.split(' - ');
                return jamMenit >= m && jamMenit <= sl;
            });

            if (!currentShift) { updateAbsenUI(true); return; }

            const [p, r] = await Promise.all([
                supabase.from('jadwal_detail').select('nama').eq('hari', hariIni).eq('shift', currentShift.waktu),
                supabase.from('rekap_absensi').select('nama').eq('tanggal', tgl).eq('shift', currentShift.label)
            ]);

            const totalPetugas = p.data?.length || 0;
            const totalAbsen = r.data?.length || 0;
            isAbsensiLengkap = (totalPetugas > 0 && totalAbsen >= totalPetugas) || totalPetugas === 0;
            updateAbsenUI(isAbsensiLengkap);
        } catch (err) { console.error(err); }
    }

    function updateAbsenUI(isLengkap) {
        const dot = document.getElementById('absensiDot');
        if(dot) dot.style.display = isLengkap ? 'none' : 'block';
    }

    function triggerReminder() {
        if (!isAbsensiLengkap) {
            const f = document.getElementById('contentFrame');
            if (!f.src.includes('absensi.html')) {
                document.getElementById('absensiModal').classList.add('show');
            }
        }
    }

    window.goToAbsensi = () => {
        closeModal('absensiModal');
        const targetEl = document.getElementById('nav-item-absensi.html');
        loadPage('absensi.html', targetEl);
    };

    setInterval(checkAbsensiStatus, 15000);
    setInterval(triggerReminder, 60000);

    async function checkProtection() {
        const { data: { session }, error } = await supabase.auth.getSession();
        
        const localIsLoggedIn = sessionStorage.getItem('isLoggedIn');
        const cachedUser = sessionStorage.getItem('adminUser');
        const cachedRole = sessionStorage.getItem('adminRole');

        if (error || !session || localIsLoggedIn !== 'true' || !cachedUser) {
            sessionStorage.clear();
            await supabase.auth.signOut();
            window.location.replace('login.html');
            return;
        }

        const normalizedRole = cachedRole ? cachedRole.toLowerCase() : '';
        const displayRole = normalizedRole === 'admin' ? 'Administrator' : 'Pustakawan';
        const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(cachedUser)}&background=0a84ff&color=ffffff&bold=true`;

        document.getElementById('footerUserName').textContent = cachedUser;
        document.getElementById('footerUserRole').textContent = displayRole;
        document.getElementById('userAvatar').src = avatar;
        document.getElementById('modalAvatar').src = avatar;
        document.getElementById('modalName').textContent = cachedUser;
        document.getElementById('modalRole').textContent = displayRole;

        try {
            const { data: menuData, error: menuErr } = await supabase
                .from('navigasi_menu')
                .select('*')
                .eq('is_active', true)
                .order('urutan', { ascending: true });

            if (menuErr) throw menuErr;

            const menuTerotorisasi = menuData.filter(m => m.role_akses.includes(normalizedRole));
            const navContainer = document.getElementById('dynamicNavContainer');
            navContainer.innerHTML = '';

            let grupSaatIni = '__NONE__';

            menuTerotorisasi.forEach(menu => {
                const grupMenu = menu.grup || '';

                if (grupMenu !== grupSaatIni) {
                    if (grupMenu !== '') {
                        const labelGrup = document.createElement('p');
                        labelGrup.className = 'nav-label';
                        labelGrup.textContent = grupMenu;
                        navContainer.appendChild(labelGrup);
                    }
                    grupSaatIni = grupMenu;
                }

                const itemMenu = document.createElement('div');
                itemMenu.id = `nav-item-${menu.page_url}`;
                itemMenu.className = `sidebar-item ${menu.page_url === 'beranda.html' ? 'active' : ''}`;
                
                let isiKombinasi = `<i class="${menu.icon || 'fa-solid fa-link'} opacity-70"></i>`;
                isiKombinasi += `<span class="hide-on-collapsed">${menu.label}</span>`;
                
                if (menu.page_url === 'absensi.html') {
                    isiKombinasi += `<div id="absensiDot" class="dot-notif"></div>`;
                }
                
                itemMenu.innerHTML = isiKombinasi;
                itemMenu.onclick = () => loadPage(menu.page_url, itemMenu);
                
                navContainer.appendChild(itemMenu);
            });

            initInertialScroll(navContainer);

        } catch (err) {
            console.error('Gagal memuat sistem navigasi:', err.message);
        }
        
        checkAbsensiStatus();
    }

    function initInertialScroll(targetNav) {
        let currentScroll = targetNav.scrollTop;
        let targetScroll = targetNav.scrollTop;
        let isMoving = false;

        const speedMultiplier = 0.25; 
        const smoothness = 0.05;      

        targetNav.addEventListener('wheel', (e) => {
            e.preventDefault(); 
            
            targetScroll += e.deltaY * speedMultiplier;
            
            const maxScroll = targetNav.scrollHeight - targetNav.clientHeight;
            targetScroll = Math.max(0, Math.min(targetScroll, maxScroll));

            if (!isMoving) {
                isMoving = true;
                requestAnimationFrame(updateScroll);
            }
        }, { passive: false });

        function updateScroll() {
            currentScroll += (targetScroll - currentScroll) * smoothness;
            targetNav.scrollTop = currentScroll;

            if (Math.abs(targetScroll - currentScroll) > 0.1) {
                requestAnimationFrame(updateScroll);
            } else {
                targetNav.scrollTop = targetScroll;
                currentScroll = targetScroll;
                isMoving = false;
            }
        }
    }

    window.openLogoutModal = () => document.getElementById('logoutModal').classList.add('show');
    window.closeModal = (id) => document.getElementById(id).classList.remove('show');
    
    window.confirmLogout = async () => { 
        sessionStorage.clear(); 
        await supabase.auth.signOut(); 
        window.location.replace('login.html'); 
    };

    checkProtection();
</script>

</body>
</html>
