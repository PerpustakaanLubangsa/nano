<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Panel | Perpustakaan Lubangsa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; overflow: hidden; }
        
        .sidebar-gradient { 
            background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .sidebar-item {
            color: #94a3b8; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; gap: 0.85rem;
            padding: 0.75rem 1.25rem; border-radius: 0.75rem;
            font-weight: 600; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        .sidebar-item:hover { background-color: rgba(255, 255, 255, 0.03); color: #38bdf8; }
        .sidebar-item.active {
            background: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
            box-shadow: 0 4px 12px -2px rgba(37, 99, 235, 0.4);
        }

        .nav-label { 
            font-size: 0.65rem; font-weight: 800; color: #475569; 
            margin: 1.5rem 0 0.5rem 1rem; text-transform: uppercase; letter-spacing: 0.15em; 
        }

        #contentFrame { 
            width: 100%; height: 100vh; border: none; 
            background-color: #f8fafc; 
            border-radius: 2.5rem 0 0 2.5rem;
            box-shadow: -20px 0 25px -5px rgba(0, 0, 0, 0.4);
            transition: opacity 0.3s ease;
        }

        .rank-box {
            width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
        .rank-img { width: 100%; height: 100%; object-fit: contain; }

        .countdown-container {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            width: 50px; height: 50px; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
        }
        .countdown-svg { width: 40px; height: 40px; transform: rotate(-90deg); }
        .countdown-bg { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 3; }
        .countdown-bar {
            fill: none; stroke: #38bdf8; stroke-width: 3;
            stroke-linecap: round; stroke-dasharray: 113;
            stroke-dashoffset: 113; transition: stroke-dashoffset 1s linear;
        }
        .countdown-text { position: absolute; font-size: 9px; font-weight: 700; color: #38bdf8; }

        @keyframes ring {
            0% { transform: rotate(0); }
            10% { transform: rotate(15deg); }
            20% { transform: rotate(-15deg); }
            30% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
            50% { transform: rotate(0); }
        }
        .animate-ring { animation: ring 1.5s infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 h-full sidebar-gradient flex flex-col z-50">
        <nav class="flex-1 overflow-y-auto custom-scrollbar px-5 py-8">
            
            <div class="mb-10 flex flex-col items-center text-center px-4">
                <div id="rankContainer" class="rank-box">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-slate-600"></i>
                </div>
                
                <div class="w-full">
                    <p id="staffNameDisplay" class="text-sm font-extrabold text-slate-100 truncate uppercase tracking-tight">Loading...</p>
                    <p id="rankNameDisplay" class="text-[10px] font-bold uppercase tracking-[0.15em] mt-1 text-slate-500">Scanning...</p>
                    <p id="roleDisplay" class="text-[8px] font-bold uppercase tracking-[0.25em] text-slate-600 mt-2">Role</p>
                </div>
            </div>

            <div onclick="loadPage('beranda.html', this)" class="sidebar-item active">
                <i class="fa-solid fa-grip-vertical w-5 text-center"></i> Beranda
            </div>
            
            <p class="nav-label">Absensi & SDM</p>
            <div onclick="loadPage('absensi.html', this)" class="sidebar-item">
                <i class="fa-solid fa-fingerprint w-5 text-center"></i> Buka Absensi
            </div>
            <div id="menuManajemenAbsen" onclick="loadPage('manajemen-absensi.html', this)" class="sidebar-item hidden">
                <i class="fa-solid fa-calendar-check w-5 text-center"></i> Manajemen Absen
            </div>
            <div onclick="loadPage('rekap.html', this)" class="sidebar-item">
                <i class="fa-solid fa-chart-line w-5 text-center"></i> Rekapitulasi
            </div>

            <p class="nav-label">Sirkulasi</p>
            <div onclick="loadPage('sirkulasi.html', this)" class="sidebar-item">
                <i class="fa-solid fa-right-left w-5 text-center"></i> Transaksi
            </div>
            <div onclick="loadPage('daftar-peminjam.html', this)" class="sidebar-item">
                <i class="fa-solid fa-user-clock w-5 text-center"></i> Peminjam
            </div>
            <div onclick="loadPage('daftar-keterlambatan.html', this)" class="sidebar-item text-rose-300">
                <i class="fa-solid fa-clock-rotate-left w-5 text-center"></i> Keterlambatan
            </div>

            <p class="nav-label">Katalog & Data</p>
            <div onclick="loadPage('bibliografi.html', this)" class="sidebar-item">
                <i class="fa-solid fa-box-archive w-5 text-center"></i> Bibliografi
            </div>
            <div onclick="loadPage('keanggotaan.html', this)" class="sidebar-item">
                <i class="fa-solid fa-users-gear w-5 text-center"></i> Keanggotaan
            </div>
            <div onclick="loadPage('log-pengunjung.html', this)" class="sidebar-item">
                <i class="fa-solid fa-user-check w-5 text-center"></i> Log Pengunjung
            </div>

            <p class="nav-label">Atribut</p>
            <div onclick="loadPage('label.html', this)" class="sidebar-item">
                <i class="fa-solid fa-tags w-5 text-center"></i> Label Buku
            </div>
            <div onclick="loadPage('barcode.html', this)" class="sidebar-item">
                <i class="fa-solid fa-barcode w-5 text-center"></i> Barcode
            </div>

            <div class="mt-12 mb-6">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-xl text-rose-400 hover:bg-rose-500/10 transition-all font-bold text-[9px] uppercase tracking-[0.2em] border border-rose-500/20">
                    <i class="fa-solid fa-power-off"></i> Keluar Sistem
                </button>
            </div>
        </nav>
    </aside>

    <main class="flex-1 relative bg-[#020617]">
        <iframe id="contentFrame" src="beranda.html" name="contentFrame"></iframe>
    </main>

    <div id="alertModal" class="fixed inset-0 z-[999] hidden flex items-center justify-center p-6">
        <div class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[3rem] p-10 text-center shadow-2xl">
            <div class="w-24 h-24 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-bell text-rose-500 text-4xl animate-ring"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter mb-2">Belum Absen!</h2>
            <p id="alertMessage" class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.15em] mb-8 leading-relaxed"></p>
            <button onclick="closeAlert()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-blue-600 transition-all">Saya Mengerti</button>
        </div>
    </div>

    <div class="countdown-container" id="countdownCircle">
        <svg class="countdown-svg">
            <circle class="countdown-bg" cx="20" cy="20" r="18"></circle>
            <circle id="progressProgress" class="countdown-bar" cx="20" cy="20" r="18"></circle>
        </svg>
        <div id="countdownNumber" class="countdown-text">30</div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'sb_publishable_4A_4200ZVZVVH6hFgo_jsw_PpV7uGlC'; // Gunakan Key Anda
        const client = supabase.createClient(SB_URL, SB_KEY);

        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const userRole = (sessionStorage.getItem('userRole') || '').toLowerCase();
        const userName = sessionStorage.getItem('userName');

        if (isLoggedIn !== 'true') window.location.replace('login.html');

        async function initDashboard() {
            if (!userName) return;
            document.getElementById('staffNameDisplay').textContent = userName;
            document.getElementById('roleDisplay').textContent = userRole;

            if (userRole === 'admin') {
                const menu = document.getElementById('menuManajemenAbsen');
                if(menu) menu.classList.remove('hidden');
            }

            await calculateRanking();
            startCountdown();
        }

        async function calculateRanking() {
            try {
                const now = new Date();
                const startOfYear = `${now.getFullYear()}-01-01`;

                const { data: jadwal } = await client.from('jadwal_detail').select('*');
                const { data: rekap } = await client.from('rekap_absensi').select('*').eq('nama', userName).gte('tanggal', startOfYear);

                const diff = now - new Date(startOfYear);
                const weeksElapsed = Math.max(1, Math.ceil(diff / (7 * 24 * 60 * 60 * 1000)));

                const shiftPerMinggu = jadwal.filter(j => j.nama === userName).length;
                const totalTarget = shiftPerMinggu * weeksElapsed;
                const hadir = rekap ? rekap.filter(l => l.status === 'Hadir').length : 0;
                
                const score = totalTarget > 0 ? (hadir / totalTarget) * 100 : 0;

                const container = document.getElementById('rankContainer');
                const rankText = document.getElementById('rankNameDisplay');

                let rankImg, rankLabel, rankColor;

                // LOGIKA RANK TERBARU (Sesuai Threshold yang diminta)
                if (score > 70) { 
                    rankImg = "Mythic.jpg"; rankLabel = "Mythic"; rankColor = "#f43f5e"; 
                } 
                else if (score >= 50) { 
                    rankImg = "Legend.jpg"; rankLabel = "Legend"; rankColor = "#f59e0b"; 
                } 
                else if (score >= 20) { 
                    rankImg = "Epic.jpg"; rankLabel = "Epic"; rankColor = "#a855f7"; 
                } 
                else if (score >= 10) { 
                    rankImg = "Grandmaster.jpg"; rankLabel = "Grandmaster"; rankColor = "#38bdf8"; 
                } 
                else { 
                    rankImg = "Warrior.jpg"; rankLabel = "Warrior"; rankColor = "#94a3b8"; 
                }

                container.innerHTML = `<img src="${rankImg}" class="rank-img" alt="${rankLabel}">`;
                rankText.textContent = rankLabel;
                rankText.style.color = rankColor;
                
            } catch (e) { 
                console.error(e);
                document.getElementById('rankContainer').innerHTML = `<i class="fa-solid fa-user text-4xl text-slate-600"></i>`;
            }
        }

        // NAVIGATION & MONITORING LOGIC (Sama seperti sebelumnya)
        const HARI_MAP = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        let timeLeft = 30;
        let monitorInterval;

        function loadPage(page, element) {
            const frame = document.getElementById('contentFrame');
            frame.style.opacity = '0';
            setTimeout(() => {
                frame.src = page;
                frame.onload = () => frame.style.opacity = '1';
            }, 250);
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        function startCountdown() {
            timeLeft = 30;
            const fullDash = 113;
            if (monitorInterval) clearInterval(monitorInterval);
            monitorInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('countdownNumber').innerText = timeLeft;
                let offset = (timeLeft / 30) * fullDash;
                const bar = document.getElementById('progressProgress');
                if(bar) bar.style.strokeDashoffset = offset;
                if (timeLeft <= 0) {
                    clearInterval(monitorInterval);
                    monitorAttendance();
                }
            }, 1000);
        }

        async function monitorAttendance() {
            try {
                const now = new Date();
                const hariIni = HARI_MAP[now.getDay()];
                const jamMenit = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                const tglSekarang = now.toISOString().split('T')[0];
                const { data: allShifts } = await client.from('jam_master').select('*');
                
                const currentShift = allShifts?.find(s => {
                    const [mulai, selesai] = s.waktu.split(' - ');
                    return jamMenit >= mulai && jamMenit <= selesai;
                });

                if (!currentShift) { resumeMonitoring(); return; }

                const { data: jadwal } = await client.from('jadwal_detail').select('nama').eq('hari', hariIni).eq('shift', currentShift.waktu);
                const { data: rekap } = await client.from('rekap_absensi').select('nama').eq('tanggal', tglSekarang).eq('shift', currentShift.label);
                
                if (jadwal && rekap && rekap.length < jadwal.length) {
                    document.getElementById('alertMessage').innerText = `${jadwal.length - rekap.length} PETUGAS BELUM ABSEN SHIFT ${currentShift.label}`;
                    document.getElementById('alertModal').classList.remove('hidden');
                    document.getElementById('countdownCircle').classList.add('hidden');
                } else { resumeMonitoring(); }
            } catch (e) { resumeMonitoring(); }
        }

        function closeAlert() {
            document.getElementById('alertModal').classList.add('hidden');
            resumeMonitoring();
        }

        function resumeMonitoring() {
            document.getElementById('countdownCircle').classList.remove('hidden');
            startCountdown();
        }

        function logout() {
            if(confirm('Keluar sistem?')) { sessionStorage.clear(); window.location.replace('login.html'); }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
