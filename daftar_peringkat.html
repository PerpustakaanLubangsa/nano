<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Leaderboard - Gamer Sync</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-bg: #020617;
            --cyber-blue: #0ea5e9;
            --cyber-pink: #d946ef;
        }

        /* Sembunyikan Scrollbar */
        html, body {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        body::-webkit-scrollbar { display: none; }

        body { 
            background-color: var(--dark-bg);
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 25px 20px;
            background-image: radial-gradient(circle at 50% -20%, rgba(14, 165, 233, 0.1) 0%, transparent 60%);
            min-height: 100vh;
        }

        .game-font { font-family: 'Orbitron', sans-serif; }

        /* Row Layout Baru: Gambar - Nama - Rank */
        .rank-row {
            display: grid;
            grid-template-columns: 80px 1fr 60px; /* Fokus pada gambar dan nama */
            align-items: center;
            padding: 15px 0;
            margin-bottom: 5px;
            cursor: pointer;
            border: none; /* Menghilangkan border kotak */
            transition: opacity 0.2s;
        }

        .rank-row:active { opacity: 0.6; }

        .rank-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 18px; /* Sudut gambar lebih halus */
        }

        /* Nama dengan pemotongan otomatis */
        .player-name {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Potong nama jika kepanjangan */
            padding-left: 15px;
        }

        .rank-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            text-align: right;
        }

        /* Modal Detail */
        #playerModal {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #0f172a;
            width: 100%; max-width: 360px;
            padding: 40px 24px; border-radius: 35px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rank-tag {
            font-size: 10px; font-weight: 800; padding: 5px 12px;
            border-radius: 6px; color: white;
        }
        .rank-Mythic { background: linear-gradient(135deg, #a855f7, #db2777); }
        .rank-Legend { background: #f97316; }
        .rank-Epic { background: #3b82f6; }
        .rank-Grandmaster { background: #10b981; }
        .rank-Warrior { background: #64748b; }

        .search-bar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 16px 20px; width: 100%; outline: none;
            font-size: 14px; border-radius: 20px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <header class="mb-8 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-black tracking-tighter">PERINGKAT</h1>
            <p class="text-[10px] font-bold text-cyber-pink tracking-[0.3em] uppercase">Bulan Ini</p>
        </div>
        <a href="form.html" class="text-xs font-bold text-white/30 hover:text-white transition">KEMBALI</a>
    </header>

    <input type="text" id="searchInput" class="search-bar" placeholder="Cari pemain..." onkeyup="debounceSearch()">

    <div id="leaderboardList">
        </div>
    
    <div id="loader" class="p-20 text-center hidden">
        <i class="fa-solid fa-spinner fa-spin text-3xl text-cyber-blue"></i>
    </div>

    <div class="flex items-center justify-between mt-10 px-2">
        <button id="prevBtn" onclick="changePage(-1)" class="text-[10px] font-extrabold text-white/40 disabled:opacity-0 uppercase tracking-widest">Sebelumnya</button>
        <span id="pageInfo" class="text-sm font-black text-cyber-blue game-font">01</span>
        <button id="nextBtn" onclick="changePage(1)" class="text-[10px] font-extrabold text-white/40 disabled:opacity-0 uppercase tracking-widest">Berikutnya</button>
    </div>

    <div id="playerModal" onclick="closeModal(event)">
        <div class="modal-content">
            <div id="modalData"></div>
            <button onclick="document.getElementById('playerModal').style.display='none'" 
                class="mt-10 w-full py-5 bg-white text-black font-black rounded-2xl uppercase text-xs tracking-widest">
                Tutup Data
            </button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);

        let currentPage = 1;
        const perPage = 10;
        let searchTimeout;
        let masterData = []; 
        let filteredData = [];

        async function fetchLeaderboard() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            
            try {
                const now = new Date();
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();

                const { data, error } = await client
                    .from('data_pengunjung')
                    .select('nama, aktivitas')
                    .gte('created_at', firstDay);

                if (error) throw error;

                const stats = {};
                data.forEach(item => {
                    if(!item.nama) return;
                    const n = item.nama.trim();
                    if(!stats[n]) stats[n] = { baca: 0, pinjam: 0, total: 0 };
                    if(item.aktivitas === 'Baca') stats[n].baca++;
                    else if(item.aktivitas === 'Pinjam') stats[n].pinjam++;
                    stats[n].total++;
                });

                masterData = Object.entries(stats)
                    .map(([nama, val]) => ({ nama, ...val }))
                    .sort((a, b) => b.total - a.total)
                    .map((p, idx) => ({ ...p, rank: idx + 1 }));

                applyFilter();
            } catch (err) { console.error(err); } 
            finally { loader.classList.add('hidden'); }
        }

        function applyFilter() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            filteredData = masterData.filter(p => p.nama.toLowerCase().includes(query));
            currentPage = 1;
            render();
        }

        function getTier(rank) {
            if (rank <= 3) return { n: 'Mythic', c: 'rank-Mythic', i: 'Mythic.jpg' };
            if (rank <= 10) return { n: 'Legend', c: 'rank-Legend', i: 'Legend.jpg' };
            if (rank <= 25) return { n: 'Epic', c: 'rank-Epic', i: 'Epic.jpg' };
            if (rank <= 50) return { n: 'G-Master', c: 'rank-Grandmaster', i: 'Grandmaster.jpg' };
            return { n: 'Warrior', c: 'rank-Warrior', i: 'Warrior.jpg' };
        }

        function render() {
            const list = document.getElementById('leaderboardList');
            const start = (currentPage - 1) * perPage;
            const items = filteredData.slice(start, start + perPage);

            list.innerHTML = items.map(item => {
                const tier = getTier(item.rank);
                const isTop3 = item.rank <= 3;
                return `
                <div class="rank-row" onclick="showDetail('${encodeURIComponent(item.nama)}', ${item.baca}, ${item.pinjam}, ${item.total}, ${item.rank})">
                    <img src="${tier.i}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(item.nama)}&background=1e293b&color=0ea5e9'" class="rank-img">
                    <div class="player-name">
                        ${item.nama}
                        <div class="text-[9px] font-bold text-white/20 mt-1 tracking-widest">${tier.n}</div>
                    </div>
                    <div class="rank-number ${isTop3 ? 'text-cyber-blue' : 'text-white/20'}">
                        ${item.rank}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('pageInfo').innerText = currentPage < 10 ? '0' + currentPage : currentPage;
            document.getElementById('nextBtn').disabled = (start + perPage) >= filteredData.length;
            document.getElementById('prevBtn').disabled = currentPage === 1;
        }

        function showDetail(namaEnc, baca, pinjam, total, rank) {
            const nama = decodeURIComponent(namaEnc);
            const tier = getTier(rank);
            document.getElementById('modalData').innerHTML = `
                <img src="${tier.i}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(nama)}&background=030712&color=0ea5e9'" 
                    class="w-32 h-32 mx-auto mb-6 rounded-3xl">
                <div class="text-[10px] font-black text-cyber-blue uppercase tracking-widest mb-2">Profil Pemain</div>
                <div class="text-2xl font-black text-white uppercase mb-8">${nama}</div>
                
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <div class="text-[9px] text-white/30 font-bold mb-1 uppercase">Posisi</div>
                        <div class="text-xl font-black text-white">#${rank}</div>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl flex flex-col items-center justify-center">
                        <div class="text-[9px] text-white/30 font-bold mb-1 uppercase">Tier</div>
                        <div class="rank-tag ${tier.c}">${tier.n}</div>
                    </div>
                </div>

                <div class="space-y-4 text-left bg-black/40 p-6 rounded-3xl">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-white/40">Total Baca</span>
                        <span class="font-bold text-white">${baca} Pts</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-white/40">Total Pinjam</span>
                        <span class="font-bold text-white">${pinjam} Pts</span>
                    </div>
                    <div class="h-px bg-white/5 my-2"></div>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-white uppercase text-xs">Total XP</span>
                        <span class="text-2xl font-black text-cyber-blue">${total}</span>
                    </div>
                </div>
            `;
            document.getElementById('playerModal').style.display = 'flex';
        }

        function closeModal(e) { if(e.target.id === 'playerModal') e.target.style.display = 'none'; }
        function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => applyFilter(), 400); }
        function changePage(step) { currentPage += step; render(); window.scrollTo(0,0); }

        window.onload = fetchLeaderboard;
    </script>
</body>
</html>
