<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Perpustakaan Lubangsa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f12;
            --surface: #16181d;
            --text-primary: #f5f5f7;
            --text-secondary: #9aa0a6;
            --border-color: #2a2d33;
            /* Aksen Biru Muda */
            --primary: #7ec2ff; 
            --on-primary: #003366;
            --error: #f2b8b5;
            /* Radius Tajam tapi Melengkung Sedikit */
            --radius-sharp: 6px;
            --radius-field: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Navigasi Header */
        header { 
            padding: 30px 40px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 8px 16px;
            border-radius: var(--radius-sharp);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color) !important;
        }

        .btn-back:hover {
            color: var(--primary);
            background: rgba(126, 194, 255, 0.1);
            border-color: var(--primary) !important;
            transform: translateX(-4px);
        }

        .logo-box img { 
            height: 48px; 
            width: auto; 
            filter: drop-shadow(0 0 12px rgba(126, 194, 255, 0.3)); 
        }

        /* Animasi Card */
        @keyframes revealUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        main { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 24px;
            margin-top: -40px;
        }
        
        .login-card { 
            width: 100%; 
            max-width: 380px; 
            animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        
        .login-header { text-align: center; margin-bottom: 35px; }
        .login-header h1 { 
            font-size: 28px; 
            font-weight: 800; 
            margin-bottom: 8px; 
            letter-spacing: -0.5px; 
            color: #fff;
        }
        .login-header p { color: var(--text-secondary); font-size: 14px; font-weight: 400; }

        form { display: flex; flex-direction: column; gap: 18px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 2px; }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius-field);
            border: 1px solid var(--border-color);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus { 
            border-color: var(--primary); 
            background: rgba(126, 194, 255, 0.02);
            box-shadow: 0 0 0 3px rgba(126, 194, 255, 0.1); 
        }

        .pass-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            padding: 5px;
        }

        .btn-login {
            margin-top: 10px;
            width: 100%;
            background-color: var(--primary);
            color: var(--on-primary);
            border: none;
            padding: 16px;
            border-radius: var(--radius-field);
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover { 
            background-color: #a3d4ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(126, 194, 255, 0.2);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Success Animation Area */
        .success-screen {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
            animation: fadeIn 0.4s ease forwards;
        }
        
        .success-logo-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-screen img { 
            height: 100px; 
            width: auto; 
            z-index: 2;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .success-ring {
            position: absolute;
            width: 80px; height: 80px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            animation: ripple 1.2s ease-out infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        /* Toast & Misc */
        #toast-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast {
            padding: 12px 24px;
            border-radius: var(--radius-sharp);
            background-color: #ff5252;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(255,82,82,0.2);
            animation: revealUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .footer-copyright { margin-top: 40px; text-align: center; font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; opacity: 0.4; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<header>
    <a href="index.html" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i>
        <span>KEMBALI</span>
    </a>
    <div class="logo-box">
        <img src="image/logo/logo.png" alt="Logo">
    </div>
</header>

<main>
    <div class="login-card">
        <div class="login-header">
            <h1>Admin Panel</h1>
            <p>Perpustakaan Lubangsa</p>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="username">Identitas</label>
                <input type="text" id="username" placeholder="Username" required autofocus autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">Akses sandi</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="off">
                    <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" id="btnLogin" class="btn-login">Masuk Sekarang</button>
        </form>

        <div class="footer-copyright"><p>&copy; 2026 LUBANGSA DEV</p></div>
    </div>
</main>

<script type="module">
    import { supabase } from './supa/supa.js';

    const loginForm = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const toastContainer = document.getElementById('toast-container');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const usernameInput = document.getElementById('username');

    togglePassword.addEventListener('click', () => {
        const isPass = passwordInput.type === 'password';
        passwordInput.type = isPass ? 'text' : 'password';
        togglePassword.classList.toggle('fa-eye', !isPass);
        togglePassword.classList.toggle('fa-eye-slash', isPass);
    });

    function showToast(message) {
        toastContainer.innerHTML = '';
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        toastContainer.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnLogin.disabled = true;
        btnLogin.innerText = "MENGECEK...";

        const user = usernameInput.value.trim();
        const pass = passwordInput.value;

        try {
            const { data, error } = await supabase.rpc('verify_admin_login', {
                input_user: user,
                input_pass: pass
            });

            if (error || !data || data.length === 0) {
                showToast("Akses Ditolak: Identitas salah.");
                btnLogin.disabled = false;
                btnLogin.innerText = "Masuk Sekarang";
            } else {
                const adminData = data[0];
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('adminUser', adminData.res_username);
                
                // Menyenangkan: Tampilkan layar sukses dengan animasi logo
                document.body.innerHTML = `
                    <div class="success-screen">
                        <div class="success-logo-wrapper">
                            <div class="success-ring"></div>
                            <div class="success-ring" style="animation-delay: 0.4s"></div>
                            <img src="image/logo/logo.png" alt="Success">
                        </div>
                        <p style="margin-top: 30px; font-weight: 700; color: var(--primary); letter-spacing: 2px;">BERHASIL MASUK</p>
                    </div>
                `;
                
                setTimeout(() => {
                    document.querySelector('.success-screen').style.opacity = '0';
                    document.querySelector('.success-screen').style.transition = '0.5s';
                    setTimeout(() => window.location.replace('panel.html'), 500);
                }, 1500);
            }
        } catch (err) {
            showToast("Server tidak merespon.");
            btnLogin.disabled = false;
            btnLogin.innerText = "Masuk Sekarang";
        }
    });

    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        window.location.replace('panel.html');
    }
</script>

</body>
</html>
