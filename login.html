<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Perpustakaan Lubangsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .brand-font { font-family: 'Cinzel', serif; }
        
        /* Glassmorphism Card Enhanced */
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            animation: fadeInScale 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Toast Notification System */
        #toast-container {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 9999;
        }
        .toast {
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }

        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: rgba(15, 23, 42, 0.6);
        }

        .bg-glow {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, #1e40af 0%, transparent 70%);
            filter: blur(100px);
            border-radius: 50%; z-index: -1; opacity: 0.2;
            pointer-events: none;
        }
        
        .home-link {
            position: absolute; top: 25px; left: 25px;
            color: rgba(255,255,255,0.3); transition: all 0.3s;
            z-index: 10;
        }
        .home-link:hover { color: #3b82f6; transform: translateX(-5px); }

        /* Custom Scrollbar for form if needed */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="bg-glow" style="top: -15%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -15%; right: -10%;"></div>

    <div class="w-full max-w-md px-6">
        <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl overflow-hidden" id="loginCard">
            
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/5 rounded-full -mr-16 -mt-16 blur-2xl"></div>

            <a href="index.html" class="home-link" title="Kembali ke Beranda">
                <i class="fa-solid fa-arrow-left-long text-xl"></i>
            </a>

            <div class="text-center mb-10">
                <div class="relative w-20 h-20 mx-auto mb-6">
                    <div class="absolute inset-0 bg-blue-600 blur-xl opacity-40 animate-pulse"></div>
                    <div class="relative w-20 h-20 bg-gradient-to-tr from-blue-700 to-blue-400 rounded-2xl flex items-center justify-center text-white text-3xl shadow-xl">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                </div>
                <h1 class="brand-font text-[11px] tracking-[0.6em] text-blue-400 font-bold leading-none uppercase mb-2">Perpustakaan</h1>
                <h2 class="brand-font text-4xl text-white font-bold uppercase tracking-tighter">Lubangsa</h2>
                <div class="h-1.5 w-14 bg-gradient-to-r from-blue-600 to-transparent mx-auto mt-4 rounded-full"></div>
            </div>

            <form id="loginForm" class="space-y-6" autocomplete="off">
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Username (NIS)</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 transition-colors group-focus-within:text-blue-500">
                            <i class="fa-solid fa-id-card text-sm"></i>
                        </span>
                        <input type="text" id="username" required autofocus
                            class="w-full bg-slate-900/40 border border-slate-700/50 text-white text-sm rounded-2xl pl-11 pr-4 py-4 outline-none transition-all input-focus"
                            placeholder="Masukkan nomor NIS">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 transition-colors group-focus-within:text-blue-500">
                            <i class="fa-solid fa-key text-sm"></i>
                        </span>
                        <input type="password" id="password" required
                            class="w-full bg-slate-900/40 border border-slate-700/50 text-white text-sm rounded-2xl pl-11 pr-4 py-4 outline-none transition-all input-focus"
                            placeholder="••••••••">
                    </div>
                </div>

                <div id="errorMessage" class="hidden text-red-400 text-[10px] font-bold uppercase text-center bg-red-950/20 py-3 rounded-xl border border-red-900/30 px-2 animate-pulse">
                    Akses Ditolak!
                </div>

                <button type="submit" id="btnSubmit"
                    class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold text-xs uppercase tracking-[0.2em] py-5 rounded-2xl transition-all shadow-lg shadow-blue-900/40 active:scale-[0.98] flex items-center justify-center overflow-hidden">
                    <span id="btnText">Masuk Ke Panel</span>
                </button>
            </form>
            
            <p class="text-center text-slate-600 text-[10px] mt-8 uppercase tracking-[0.3em]">
                &copy; 2024 <span class="text-slate-500">Perpustakaan Lubangsa</span>
            </p>
        </div>
    </div>

    <script>
        // Konfigurasi Supabase
        const S_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const S_KEY = 'sb_publishable_4A_4200ZVZVVH6hFgo_jsw_PpV7uGlC';
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        const loginForm = document.getElementById('loginForm');
        const loginCard = document.getElementById('loginCard');
        const errorMsg = document.getElementById('errorMessage');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnText = document.getElementById('btnText');
        const toastContainer = document.getElementById('toast-container');

        // Fungsi Toast Kustom
        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
            
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                toast.style.transition = 'all 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            
            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value.trim();

            // UI State: Loading
            btnSubmit.disabled = true;
            btnText.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-3"></i> Memvalidasi...`;
            btnSubmit.classList.add('opacity-80', 'cursor-not-allowed');

            try {
                const { data, error } = await supabaseClient.rpc('verify_user_login', {
                    p_nis: userVal,
                    p_pass: passVal
                });

                if (error) throw error;

                if (data && data.success) {
                    const user = data.user_profile;
                    const userRole = user.role ? user.role.toLowerCase() : 'anggota';
                    
                    if (userRole !== 'admin' && userRole !== 'pustakawan') {
                        throw new Error("Akses terbatas untuk Staff saja!");
                    }

                    // Keberhasilan: Simpan Session
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userName', user.nama);
                    sessionStorage.setItem('userRole', userRole);
                    sessionStorage.setItem('userNis', user.nis);
                    sessionStorage.setItem('userId', user.id);

                    // UI State: Success
                    btnSubmit.classList.replace('bg-blue-600', 'bg-green-600');
                    btnText.innerHTML = `<i class="fa-solid fa-check-double mr-2 animate-bounce"></i> Akses Diterima`;
                    showToast(`Selamat datang, ${user.nama}`, 'success');

                    setTimeout(() => {
                        window.location.replace('panel.html');
                    }, 1000);

                } else {
                    throw new Error("NIS atau Password tidak ditemukan!");
                }
            } catch (err) {
                // UI State: Error
                showToast(err.message, 'error');
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
                
                // Efek Goncang (Shake)
                loginCard.classList.add('shake');
                setTimeout(() => loginCard.classList.remove('shake'), 500);

                // Reset Button
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.innerHTML = `Masuk Ke Panel`;
            }
        });
    </script>
</body>
</html>
