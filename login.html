<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Perpustakaan Lubangsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .brand-font { font-family: 'Cinzel', serif; }
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }
        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .bg-glow {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, #2563eb 0%, transparent 70%);
            z-index: -1; opacity: 0.15;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        .home-link {
            position: absolute; top: 25px; left: 25px;
            color: rgba(255,255,255,0.4); transition: all 0.3s;
        }
        .home-link:hover { color: #3b82f6; transform: scale(1.1); }
        
        /* Loading Spinner */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 18px; height: 18px;
            animation: spin 0.8s linear infinite;
            display: inline-block; margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%;"></div>

    <div class="w-full max-w-md px-6">
        <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl border-white/5" id="loginCard">
            
            <a href="index.html" class="home-link" title="Kembali ke Beranda">
                <i class="fa-solid fa-arrow-left-long text-xl"></i>
            </a>

            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl flex items-center justify-center text-white text-3xl shadow-2xl shadow-blue-500/20 mx-auto mb-6">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1 class="brand-font text-[11px] tracking-[0.5em] text-blue-400 font-bold leading-none uppercase mb-2">Perpustakaan</h1>
                <h2 class="brand-font text-3xl text-white font-bold uppercase tracking-tight">Lubangsa</h2>
                <div class="h-1 w-12 bg-blue-600 mx-auto mt-4 rounded-full"></div>
            </div>

            <form id="loginForm" class="space-y-6" autocomplete="off">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2.5 ml-1">Username (NIS)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-id-badge text-sm"></i>
                        </span>
                        <input type="text" id="username" required 
                            class="w-full bg-slate-800/40 border border-slate-700/50 text-white text-sm rounded-2xl pl-12 pr-4 py-4 outline-none transition-all input-focus"
                            placeholder="Masukkan NIS">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2.5 ml-1">Kata Sandi</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-key text-sm"></i>
                        </span>
                        <input type="password" id="password" required
                            class="w-full bg-slate-800/40 border border-slate-700/50 text-white text-sm rounded-2xl pl-12 pr-4 py-4 outline-none transition-all input-focus"
                            placeholder="••••••••">
                    </div>
                </div>

                <div id="errorMessage" class="hidden text-red-400 text-[10px] font-bold uppercase text-center bg-red-950/20 py-4 rounded-2xl border border-red-900/30 px-2 animate-pulse">
                    <i class="fa-solid fa-circle-exclamation mr-1"></i> Akses Ditolak!
                </div>

                <button type="submit" id="btnSubmit"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-extrabold text-[11px] uppercase tracking-[0.2em] py-5 rounded-2xl transition-all shadow-xl shadow-blue-900/40 active:scale-[0.98] flex justify-center items-center">
                    Masuk Ke Panel
                </button>
            </form>
        </div>
        
        <p class="text-center text-slate-600 text-[10px] mt-8 font-bold uppercase tracking-widest">
            &copy; 2026 Perpustakaan Pusat Lubangsa
        </p>
    </div>

    <script>
        // CONFIG
        const S_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3mJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        const loginForm = document.getElementById('loginForm');
        const loginCard = document.getElementById('loginCard');
        const errorMsg = document.getElementById('errorMessage');
        const btnSubmit = document.getElementById('btnSubmit');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            
            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value.trim();

            btnSubmit.innerHTML = '<span class="spinner"></span> MEMVERIFIKASI...';
            btnSubmit.disabled = true;

            try {
                const { data, error } = await supabaseClient.rpc('verify_user_login', {
                    p_nis: userVal,
                    p_pass: passVal
                });

                if (error) throw error;

                if (data && data.success) {
                    const user = data.user_profile;
                    const userRole = (user.role || 'anggota').toLowerCase();
                    
                    // Filter akses: Hanya admin dan pustakawan yang bisa masuk panel
                    if (userRole !== 'admin' && userRole !== 'pustakawan') {
                        throw new Error("Akses Ditolak: Khusus Staf!");
                    }

                    // Save Session
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userName', user.nama);
                    sessionStorage.setItem('userRole', userRole);
                    sessionStorage.setItem('userNis', user.nis);

                    btnSubmit.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i> BERHASIL';
                    btnSubmit.classList.replace('bg-blue-600', 'bg-green-600');

                    // Routing Logic
                    setTimeout(() => {
                        if (userRole === 'admin') {
                            window.location.replace('admin-panel.html');
                        } else {
                            window.location.replace('panel.html');
                        }
                    }, 800);

                } else {
                    throw new Error("NIS atau Password salah!");
                }
            } catch (err) {
                errorMsg.innerHTML = `<i class="fa-solid fa-circle-exclamation mr-1"></i> ${err.message}`;
                errorMsg.classList.remove('hidden');
                loginCard.classList.add('shake');
                setTimeout(() => loginCard.classList.remove('shake'), 500);

                btnSubmit.innerHTML = 'MASUK KE PANEL';
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
