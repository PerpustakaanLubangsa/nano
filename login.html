<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Perpustakaan Lubangsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .brand-font { font-family: 'Cinzel', serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #2563eb;
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: 10%; left: 20%;"></div>
    <div class="bg-glow" style="bottom: 10%; right: 20%;"></div>

    <div class="w-full max-w-md px-6">
        <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-900/50 mx-auto mb-6">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1 class="brand-font text-[12px] tracking-[0.4em] text-blue-400 font-bold leading-none uppercase mb-2">Perpustakaan</h1>
                <h2 class="brand-font text-3xl text-white font-bold uppercase tracking-tighter">Lubangsa</h2>
                <p class="text-slate-400 text-xs mt-4 font-semibold uppercase tracking-widest">Sistem Manajemen Akses</p>
            </div>

            <form id="loginForm" class="space-y-5" autocomplete="off">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-user text-sm"></i>
                        </span>
                        <input type="text" id="username" required autocomplete="off"
                            class="w-full bg-slate-900/50 border border-slate-700 text-white text-sm rounded-2xl pl-11 pr-4 py-4 outline-none transition-all input-focus"
                            placeholder="Username">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </span>
                        <input type="password" id="password" required autocomplete="current-password"
                            class="w-full bg-slate-900/50 border border-slate-700 text-white text-sm rounded-2xl pl-11 pr-4 py-4 outline-none transition-all input-focus"
                            placeholder="Password">
                    </div>
                </div>

                <div id="errorMessage" class="hidden text-red-400 text-[10px] font-bold uppercase text-center bg-red-950/30 py-3 rounded-xl border border-red-900/50">
                    Akses Ditolak! Cek kembali data Anda.
                </div>

                <button type="submit" id="btnSubmit"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs uppercase tracking-[0.2em] py-5 rounded-2xl transition-all shadow-lg shadow-blue-900/30 active:scale-[0.98]">
                    Masuk Ke Panel
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="index.html" class="text-slate-500 hover:text-blue-400 text-[10px] font-bold uppercase tracking-widest transition-colors">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Kembali ke Katalog
                </a>
            </div>
        </div>
        
        <p class="text-center text-slate-600 text-[9px] mt-8 uppercase tracking-[0.3em] font-bold">
            &copy; 2024 Perpustakaan Lubangsa
        </p>
    </div>

    <script>
        const S_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMessage');
        const btnSubmit = document.getElementById('btnSubmit');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;

            btnSubmit.innerText = 'MEMVERIFIKASI...';
            btnSubmit.disabled = true;

            try {
                // Query langsung ke tabel users
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('username, role')
                    .eq('username', userVal)
                    .eq('password', passVal)
                    .maybeSingle();

                if (error) throw error;

                if (data) {
                    // Logika Pengalihan Berdasarkan Role
                    let targetPage = 'panel.html'; // Default untuk Staf
                    
                    if (data.role === 'Admin') {
                        targetPage = 'admin-panel.html';
                    }

                    btnSubmit.innerText = 'BERHASIL! MENGALIHKAN...';
                    
                    // Simpan identitas sementara untuk menyapa di halaman tujuan (opsional)
                    localStorage.setItem('currentUser', data.username);
                    localStorage.setItem('currentRole', data.role);

                    setTimeout(() => {
                        window.location.replace(targetPage);
                    }, 800);
                } else {
                    throw new Error("Akses Ditolak! Username atau Password salah.");
                }
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
                btnSubmit.innerText = 'MASUK KE PANEL';
                btnSubmit.disabled = false;
                
                loginForm.classList.add('animate-pulse');
                setTimeout(() => loginForm.classList.remove('animate-pulse'), 500);
            }
        });
    </script>
</body>
</html>
