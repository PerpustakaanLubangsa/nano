<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #0b0e14;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden;
            color: #ffffff;
            position: relative;
        }

        /* ----- Animasi Salju Ringan ----- */
        .snowflake {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: fall linear infinite;
        }
        .snowflake:nth-child(even) { width: 2px; height: 2px; }
        .snowflake:nth-child(odd) { width: 3px; height: 3px; }
        
        /* Pengaturan posisi & kecepatan salju */
        .snowflake:nth-child(1) { left: 10%; animation-duration: 10s; }
        .snowflake:nth-child(2) { left: 20%; animation-duration: 12s; animation-delay: 2s; }
        .snowflake:nth-child(3) { left: 30%; animation-duration: 8s; }
        .snowflake:nth-child(4) { left: 40%; animation-duration: 11s; animation-delay: 1s; }
        .snowflake:nth-child(5) { left: 50%; animation-duration: 9s; }
        .snowflake:nth-child(6) { left: 60%; animation-duration: 13s; animation-delay: 3s; }
        .snowflake:nth-child(7) { left: 70%; animation-duration: 7s; }
        .snowflake:nth-child(8) { left: 80%; animation-duration: 10s; animation-delay: 1.5s; }
        .snowflake:nth-child(9) { left: 90%; animation-duration: 14s; }

        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh); opacity: 0.2; }
        }

        /* ----- Konten Teks ----- */
        .container {
            text-align: center;
            z-index: 2;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            margin: 0;
            letter-spacing: 2px;
        }

        h1 span {
            color: #a5f3fc; /* Biru Es */
            text-shadow: 0 0 15px rgba(165, 243, 252, 0.4);
        }

        .beta-text {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 3px;
            color: #2d3748; /* Sangat samar */
            text-transform: uppercase;
            margin-top: 5px;
        }

        .status-loading {
            color: #4a5568;
            font-size: 11px;
            margin-top: 30px;
            letter-spacing: 2px;
        }

        /* ----- Loading Bar Sinkron ----- */
        .loader-container {
            width: 100%;
            height: 5px;
            background-color: #161b22;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 3;
        }

        .loader-bar {
            width: 0%; /* Diatur via JS */
            height: 100%;
            background: linear-gradient(90deg, #3182ce, #a5f3fc);
            box-shadow: 0 0 10px rgba(165, 243, 252, 0.5);
            transition: width 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);
        }
    </style>
</head>
<body>
    <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
    <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>
    <div class="snowflake"></div><div class="snowflake"></div><div class="snowflake"></div>

    <div class="container">
        <h1>PERPUSTAKAAN <span>LUBANGSA</span></h1>
        <div class="beta-text">Beta Version</div>
        <div class="status-loading" id="status">INITIALIZING SYSTEM</div>
    </div>

    <div class="loader-container">
        <div id="progress-bar" class="loader-bar"></div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const bar = document.getElementById('progress-bar');
        const status = document.getElementById('status');

        ipcRenderer.on('loading-progress', (event, value) => {
            bar.style.width = value + '%';
            if (value >= 100) {
                status.innerText = "READY TO START";
            }
        });
    </script>
</body>
</html>
