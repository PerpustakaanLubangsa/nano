<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Audit | Perpustakaan Lubangsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #000000; --bg-card: #0a0a0a; --border-color: #1a1a1a; --google-blue: #0a84ff; --text-main: #e3e3e3; --text-muted: #9aa0a6; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; }
        .shelf-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; margin-bottom: 2rem; overflow: hidden; }
        .shelf-header { background: #161618; padding: 20px 24px; border-bottom: 1px solid var(--border-color); }
        .audit-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .audit-table th { background: #0d0d0d; color: var(--text-muted); text-align: left; padding: 12px 16px; font-size: 10px; text-transform: uppercase; }
        .audit-table td { padding: 12px 16px; border-bottom: 1px solid #111; }
        .row-missing { opacity: 0.5; filter: grayscale(1); }
        .status-badge { font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 6px; border: 1px solid currentColor; }
        .badge-ada { color: var(--google-blue); background: rgba(10, 132, 255, 0.1); }
        .badge-belum { color: #ff453a; background: rgba(255, 69, 58, 0.1); }
        .progress-bar { height: 4px; background: #222; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--google-blue); transition: width 0.5s ease; }
        
        /* Tombol Hapus Custom Style */
        .btn-danger-outline {
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            transition: all 0.3s ease;
        }
        .btn-danger-outline:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body class="p-6">

<div class="max-w-5xl mx-auto">
    <header class="flex justify-between items-center mb-10 no-print">
        <h1 class="text-2xl font-black tracking-tight uppercase">Laporan Audit</h1>
        <div class="flex gap-3">
            <button onclick="deleteAllData()" class="btn-danger-outline px-5 py-2 rounded-xl text-[10px] font-bold uppercase flex items-center gap-2">
                <i class="fa-solid fa-trash-can"></i> Hapus Semua
            </button>
            
            <button onclick="loadReport()" class="bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-bold text-white uppercase hover:bg-blue-700 transition-all flex items-center gap-2">
                <i class="fa-solid fa-rotate"></i> Refresh Data
            </button>
        </div>
    </header>

    <div id="reportContainer" class="space-y-8">
        <div class="text-center p-20 text-zinc-700 font-bold uppercase tracking-widest text-xs animate-pulse">Memuat Data via RPC...</div>
    </div>
</div>

<script type="module">
    import { supabase } from './supa/supa.js';

    let rekapData = {};

    // FUNGSI LOAD DATA
    async function loadReport() {
        const container = document.getElementById('reportContainer');
        
        const { data, error } = await supabase.rpc('get_rekap_audit');

        if (error) {
            container.innerHTML = `<div class="text-red-500 text-center p-20">Error: ${error.message}</div>`;
            return;
        }

        rekapData = data || {};
        const shelves = Object.keys(rekapData).sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));

        if (shelves.length === 0) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center p-20 border-2 border-dashed border-zinc-900 rounded-3xl">
                    <i class="fa-solid fa-folder-open text-zinc-800 text-4xl mb-4"></i>
                    <div class="text-zinc-600 font-bold uppercase tracking-widest text-xs">Tidak ada data audit ditemukan</div>
                </div>`;
            return;
        }

        container.innerHTML = shelves.map(shelf => {
            const items = rekapData[shelf];
            const found = items.filter(i => i.status).length;
            const percent = Math.round((found / items.length) * 100);

            return `
                <div class="shelf-card">
                    <div class="shelf-header flex justify-between items-end">
                        <div>
                            <h2 class="text-sm font-black text-blue-500 uppercase">RAK ${shelf}</h2>
                            <p class="text-[10px] text-zinc-500 font-bold uppercase mt-1">${found} / ${items.length} DITEMUKAN</p>
                        </div>
                        <div class="text-right">
                            <span class="text-lg font-black font-mono">${percent}%</span>
                            <div class="w-32 progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
                        </div>
                    </div>
                    <table class="audit-table">
                        <thead>
                            <tr>
                                <th width="50">#</th>
                                <th>Judul Buku</th>
                                <th width="150">Barcode</th>
                                <th width="100" class="text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${items.map((item, index) => `
                                <tr class="${item.status ? '' : 'row-missing'}">
                                    <td class="text-zinc-700 font-mono text-[10px]">${index + 1}</td>
                                    <td>
                                        <div class="font-bold text-[11px] uppercase">${item.judul_buku || item.judul}</div>
                                        <div class="text-[9px] text-zinc-500 italic">${item.penulis || '-'}</div>
                                    </td>
                                    <td class="font-mono text-[10px] ${item.status ? 'text-blue-500' : 'text-zinc-600'}">${item.kode_barcode || item.barcode}</td>
                                    <td class="text-center">
                                        <span class="status-badge ${item.status ? 'badge-ada' : 'badge-belum'}">
                                            ${item.status ? 'ADA' : 'BELUM'}
                                        </span>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }).join('');
    }

    // FUNGSI HAPUS SEMUA DATA (DENGAN VERIFIKASI LOGIN)
    async function deleteAllData() {
        // Ambil data identitas dari sessionStorage (Login Kustom)
        const currentUser = sessionStorage.getItem('adminUser');
        const currentRole = sessionStorage.getItem('adminRole');

        // Proteksi awal di Frontend
        if (!currentUser || currentRole !== 'admin') {
            alert("Akses Ditolak: Hanya akun Administrator yang diizinkan menghapus seluruh data.");
            return;
        }

        const confirmFirst = confirm("PERINGATAN KRITIS!\n\nAnda akan menghapus SELURUH data log audit secara permanen. Tindakan ini akan dicatat oleh sistem.\n\nLanjutkan?");
        
        if (confirmFirst) {
            const confirmSecond = prompt("Ketik 'HAPUS' (huruf kapital) untuk mengonfirmasi penghapusan:");
            
            if (confirmSecond === "HAPUS") {
                try {
                    // Panggil RPC dengan parameter keamanan sesuai SQL terbaru
                    const { error } = await supabase.rpc('delete_all_audit', {
                        admin_user: currentUser,
                        admin_role: currentRole
                    });
                    
                    if (error) {
                        alert("Gagal menghapus: " + error.message);
                        console.error("Detail Error:", error);
                    } else {
                        alert("Berhasil! Semua data log audit telah dibersihkan.");
                        loadReport(); // Refresh tampilan
                    }
                } catch (err) {
                    alert("Terjadi kesalahan sistem saat menghubungi database.");
                    console.error(err);
                }
            } else if (confirmSecond !== null) {
                alert("Konfirmasi gagal. Kata kunci salah.");
            }
        }
    }

    // Ekspos fungsi ke window agar bisa diakses onclick
    window.loadReport = loadReport;
    window.deleteAllData = deleteAllData;
    
    // Jalankan saat pertama kali dibuka
    window.onload = loadReport;
</script>
</body>
</html>
