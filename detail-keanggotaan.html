<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Detail Anggota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #000; --bg-card: #0c0c0c; --text-main: #e3e3e3; --text-muted: #777; --accent: #8ab4f8; --border: #1a1a1a; --danger: #f28b82; --input-bg: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); padding-bottom: 40px; }
        
        .app-wrapper { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 10; padding: 10px 0; }
        .btn-back { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); }

        /* Profile Photo Section */
        .photo-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .profile-wrapper { width: 100px; height: 100px; border-radius: 30px; background: var(--bg-card); border: 1px solid var(--border); overflow: hidden; position: relative; margin-bottom: 12px; }
        .profile-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .btn-upload { font-size: 12px; font-weight: 700; color: var(--accent); cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Form Styling */
        .field-group { margin-bottom: 18px; }
        .field-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .field-input { width: 100%; background: var(--input-bg); padding: 14px 16px; border-radius: 12px; color: #fff; font-size: 14px; border: 1px solid var(--border); outline: none; transition: 0.2s; }
        .field-input:focus { border-color: var(--accent); background: #161616; }
        .field-input:disabled { color: var(--text-muted); opacity: 0.7; border-style: dashed; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Read Only Stats Section */
        .stats-container { background: var(--bg-card); padding: 16px; border-radius: 20px; border: 1px solid var(--border); margin: 10px 0 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item span:first-child { display: block; font-size: 9px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .stat-item span:last-child { font-size: 15px; font-weight: 700; color: var(--accent); }
        
        /* Rank Badge Style */
        .rank-badge { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; display: block; }

        .btn-save { width: 100%; background: var(--accent); color: #000; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; margin-top: 10px; transition: 0.2s; }
        .btn-save:active { transform: scale(0.98); }
        .btn-del { text-align: center; color: var(--danger); font-size: 11px; font-weight: 700; margin-top: 25px; cursor: pointer; text-transform: uppercase; opacity: 0.6; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; display: none; z-index: 1000; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="app-wrapper">
    <div class="nav-header">
        <div class="btn-back" onclick="window.location.href='keanggotaan.html'"><i class="fa-solid fa-arrow-left"></i></div>
        <h2 id="pageTitle" style="font-weight: 800; font-size: 18px; letter-spacing: -0.5px;">Edit Profil</h2>
        <div style="width: 40px;"></div>
    </div>

    <!-- Foto Profile -->
    <div class="photo-section">
        <div class="profile-wrapper">
            <img id="prevFoto" src="https://ui-avatars.com/api/?name=User&background=111&color=555" alt="Profile">
        </div>
        <label for="fileFoto" class="btn-upload">Ubah Foto</label>
        <input type="file" id="fileFoto" accept="image/*">
    </div>

    <!-- Statistik (Read Only) -->
    <div class="stats-container">
        <div class="stat-item">
            <span>Rank</span>
            <!-- Gambar Rank Ditambahkan di Sini -->
            <img id="img_rank" src="image/rank/Warrior.png" class="rank-badge" onerror="this.style.display='none'">
            <span id="txt_rank">Warrior</span>
        </div>
        <div class="stat-item"><span>Poin</span><br><span id="txt_poin">0</span></div>
        <div class="stat-item"><span>Karya</span><br><span id="txt_karya">0</span></div>
        <div class="stat-item"><span>Ikut Program</span><br><span id="txt_program">0</span></div>
    </div>

    <form id="detailForm">
        <input type="hidden" id="m_id">
        <input type="hidden" id="m_foto_url">
        
        <div class="field-group">
            <label class="field-label">Nama Lengkap</label>
            <input type="text" id="m_nama" class="field-input" required placeholder="Nama sesuai KTP/Kartu Pelajar">
        </div>

        <div class="grid-2">
            <div class="field-group">
                <label class="field-label">NIS (ID)</label>
                <input type="text" id="m_nis" class="field-input" required placeholder="Nomor Induk">
            </div>
            <div class="field-group">
                <label class="field-label">Kamar</label>
                <input type="text" id="m_kamar" class="field-input" style="text-transform: uppercase;" placeholder="Cth: A-01">
            </div>
        </div>

        <div class="grid-2">
            <div class="field-group">
                <label class="field-label">Jenjang Pendidikan</label>
                <select id="m_jenjang" class="field-input">
                    <option value="SLTP">SLTP (Mts/SMP)</option>
                    <option value="SLTA">SLTA (MA/SMA/SMK)</option>
                    <option value="PT">Perguruan Tinggi</option>
                </select>
            </div>
            <div class="field-group">
                <label class="field-label">Hak Akses (Role)</label>
                <select id="m_role" class="field-input">
                    <option value="anggota">Anggota</option>
                    <option value="pustakawan">Pustakawan</option>
                </select>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Organisasi</label>
            <input type="text" id="m_organisasi" class="field-input" placeholder="Nama organisasi">
        </div>

        <button type="submit" class="btn-save" id="btnSubmit">SIMPAN PERUBAHAN</button>
    </form>

    <div id="btnDelete" class="btn-del" style="display: none;">Hapus Permanen Anggota</div>
</div>

<script type="module">
    import { supabase } from './supa/supa.js';

    const form = document.getElementById('detailForm');
    const toast = document.getElementById('toast');
    const fileInput = document.getElementById('fileFoto');
    const prevFoto = document.getElementById('prevFoto');

    function showToast(msg) {
        toast.innerText = msg; toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // Helper untuk merubah kata menjadi Capitalize (warior -> Warrior)
    function capitalizeFirstLetter(string) {
        if (!string) return "Warrior";
        return string.charAt(0).toUpperCase() + string.slice(1).toLowerCase();
    }

    // --- LOGIKA UPLOAD & KOMPRES FOTO ---
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 400;
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                prevFoto.src = compressedBase64;
                document.getElementById('m_foto_url').value = compressedBase64;
                showToast("Foto siap diunggah");
            };
        };
    };

    // --- AMBIL DATA DARI LOCAL STORAGE ---
    const memberData = JSON.parse(localStorage.getItem('selectedMember'));

    if (memberData) {
        document.getElementById('pageTitle').innerText = 'Profil Anggota';
        document.getElementById('m_id').value = memberData.id;
        document.getElementById('m_nama').value = memberData.nama;
        document.getElementById('m_nis').value = memberData.nis;
        document.getElementById('m_kamar').value = memberData.kamar || '';
        document.getElementById('m_jenjang').value = memberData.jenjang;
        document.getElementById('m_role').value = memberData.role;
        document.getElementById('m_organisasi').value = memberData.organisasi || '';
        
        // Stats (Read Only)
        document.getElementById('txt_poin').innerText = memberData.poin || 0;
        document.getElementById('txt_karya').innerText = memberData.total_karya || 0;
        document.getElementById('txt_program').innerText = memberData.total_ikut_serta_program || 0;
        
        // Logika Rank Image & Text
        const rawRank = memberData.rank || 'warrior';
        const formattedRank = capitalizeFirstLetter(rawRank);
        document.getElementById('txt_rank').innerText = formattedRank;
        document.getElementById('img_rank').src = `rank/${formattedRank}.png`;
        document.getElementById('img_rank').style.display = 'block';

        if(memberData.foto) {
            prevFoto.src = memberData.foto;
            document.getElementById('m_foto_url').value = memberData.foto;
        } else {
            prevFoto.src = `https://ui-avatars.com/api/?name=${memberData.nama}&background=random`;
        }
        
        document.getElementById('btnDelete').style.display = 'block';
    } else {
        document.getElementById('pageTitle').innerText = 'Anggota Baru';
        document.getElementById('img_rank').style.display = 'none';
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('btnSubmit');
        submitBtn.innerText = "MENYIMPAN...";
        submitBtn.disabled = true;

        const id = document.getElementById('m_id').value;
        const payload = {
            nama: document.getElementById('m_nama').value,
            nis: document.getElementById('m_nis').value,
            kamar: document.getElementById('m_kamar').value.toUpperCase(),
            jenjang: document.getElementById('m_jenjang').value,
            role: document.getElementById('m_role').value,
            organisasi: document.getElementById('m_organisasi').value,
            foto: document.getElementById('m_foto_url').value,
            updated_at: new Date()
        };

        try {
            let res;
            if (id) {
                res = await supabase.from('anggota').update(payload).eq('id', id);
            } else {
                res = await supabase.from('anggota').insert([payload]);
            }
            if (res.error) throw res.error;
            showToast("Data berhasil diperbarui!");
            setTimeout(() => window.location.href = 'keanggotaan.html', 1500);
        } catch (err) {
            showToast("Error: " + err.message);
            submitBtn.innerText = "SIMPAN PERUBAHAN";
            submitBtn.disabled = false;
        }
    };

    document.getElementById('btnDelete').onclick = async () => {
        if (!confirm('Data ini akan dihapus permanen. Lanjutkan?')) return;
        const id = document.getElementById('m_id').value;
        const { error } = await supabase.from('anggota').delete().eq('id', id);
        if (!error) window.location.href = 'keanggotaan.html';
    };
</script>
</body>
</html>
