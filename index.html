<!DOCTYPE html> 
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Lubangsa</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="logo.ico">
    <meta name="theme-color" content="#05070a">

    <style>
        body {
            background-color: #05070a;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        /* Salju Lebat */
        .snow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .snowflake {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0.7;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0); }
            100% { transform: translateY(110vh) translateX(30px); }
        }

        /* Konten Utama */
        .container { text-align: center; z-index: 2; }
        h1 {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 12px;
            margin: 0;
            text-transform: uppercase;
        }
        h1 span { color: #a5f3fc; text-shadow: 0 0 30px rgba(165, 243, 252, 0.5); }

        /* Loading Bar Mewah */
        .loader-box {
            position: absolute;
            bottom: 15%;
            width: 300px;
            z-index: 3;
        }
        .bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2b6cb0, #a5f3fc, #ffffff);
            background-size: 200% 100%;
            box-shadow: 0 0 20px #a5f3fc;
            animation: move-gradient 2s linear infinite;
        }
        @keyframes move-gradient {
            0% { background-position: 100% 0%; }
            100% { background-position: -100% 0%; }
        }
        .perc {
            font-size: 11px;
            font-family: monospace;
            color: #a5f3fc;
            margin-top: 12px;
            text-align: center;
            letter-spacing: 3px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="snow" id="snow"></div>

    <div class="container">
        <h1>PERPUS <span>LUBANGSA</span></h1>
    </div>

    <div class="loader-box">
        <div class="bar"><div id="fill" class="fill"></div></div>
        <div id="perc" class="perc">0%</div>
    </div>

    <script>
        // Generator Salju
        const s = document.getElementById('snow');
        for (let i = 0; i < 120; i++) {
            const div = document.createElement('div');
            div.className = 'snowflake';
            const size = Math.random() * 4 + 1;
            div.style.width = div.style.height = size + 'px';
            div.style.left = Math.random() * 100 + '%';
            div.style.animationDuration = (Math.random() * 3 + 2) + 's';
            div.style.animationDelay = Math.random() * 5 + 's';
            s.appendChild(div);
        }

        // Registrasi PWA
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        // Loading Progress Alami
        let p = 0;
        const f = document.getElementById('fill');
        const tx = document.getElementById('perc');
        const load = setInterval(() => {
            p += Math.random() * 2;
            if (p >= 100) {
                p = 100;
                clearInterval(load);
                setTimeout(() => window.location.href = "opac.html", 1000);
            }
            f.style.width = p + '%';
            tx.innerText = Math.floor(p) + '%';
        }, 100);
    </script>
</body>
</html>
