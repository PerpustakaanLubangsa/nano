<!DOCTYPE html> 
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Lubangsa</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="theme-color" content="#05070a">
    <style>
        body {
            background-color: #05070a;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        /* Canvas Salju: Super Ringan */
        #snowCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container { text-align: center; z-index: 2; }
        h1 {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 12px;
            margin: 0;
            text-transform: uppercase;
        }
        h1 span { color: #a5f3fc; text-shadow: 0 0 25px rgba(165, 243, 252, 0.4); }

        .loader-box {
            position: absolute;
            bottom: 15%;
            width: 260px;
            z-index: 3;
        }
        .bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .fill {
            width: 0%;
            height: 100%;
            background: #a5f3fc;
            box-shadow: 0 0 15px #a5f3fc;
            /* Loading lebih cepat dengan transition singkat */
            transition: width 0.1s linear;
        }
        .perc {
            font-size: 10px;
            font-family: monospace;
            color: #a5f3fc;
            margin-top: 8px;
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="snowCanvas"></canvas>

    <div class="container">
        <h1>PERPUS <span>LUBANGSA</span></h1>
    </div>

    <div class="loader-box">
        <div class="bar"><div id="fill" class="fill"></div></div>
        <div id="perc" class="perc">0%</div>
    </div>

    <script>
        // --- LOGIKA SALJU CANVAS (ANTI-LAG) ---
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, snowflakes = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            snowflakes = [];
            for (let i = 0; i < 150; i++) {
                snowflakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height, // Langsung hujan di seluruh layar
                    r: Math.random() * 3 + 1,
                    d: Math.random() * 1,
                    v: Math.random() * 2 + 1 // Kecepatan jatuh
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            for (let s of snowflakes) {
                ctx.moveTo(s.x, s.y);
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2, true);
                s.y += s.v;
                s.x += Math.sin(s.d) * 0.5;
                if (s.y > height) s.y = -10;
            }
            ctx.fill();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        draw();

        // --- LOGIKA LOADING (DIPERCEPAT) ---
        let p = 0;
        const f = document.getElementById('fill');
        const tx = document.getElementById('perc');
        
        // Interval dipercepat (lebih agresif)
        const load = setInterval(() => {
            p += Math.random() * 5; // Lompatan persentase lebih besar
            if (p >= 100) {
                p = 100;
                clearInterval(load);
                // Langsung pindah tanpa delay lama
                window.location.href = "opac.html";
            }
            f.style.width = p + '%';
            tx.innerText = Math.floor(p) + '%';
        }, 50); // Kecepatan update 50ms (2x lebih cepat)

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
