<!DOCTYPE html> 
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Lubangsa</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo-perpus.png">
    <link rel="apple-touch-icon" href="logo-perpus.png">
    <meta name="theme-color" content="#05070a">

    <style>
        :root {
            --cold-blue: #a5f3fc;
            --deep-dark: #05070a;
        }

        body {
            background-color: var(--deep-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        #snowCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Konten Utama */
        .container { 
            text-align: center; 
            z-index: 2; 
            transition: transform 1s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 200; /* Lebih tipis agar elegan */
            letter-spacing: 15px;
            margin: 0;
            text-transform: uppercase;
            opacity: 0.9;
        }

        h1 span { 
            font-weight: 800;
            color: var(--cold-blue); 
            text-shadow: 0 0 20px rgba(165, 243, 252, 0.3); 
        }

        /* Area Interaksi */
        .interaction-box {
            position: absolute;
            bottom: 20%;
            width: 300px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
        }

        /* Loading Bar Minimalis */
        .loader-wrapper {
            width: 100%;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .bar {
            width: 100%;
            height: 2px; /* Lebih tipis untuk kesan minimalis */
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            width: 0%;
            height: 100%;
            background: var(--cold-blue);
            box-shadow: 0 0 15px var(--cold-blue);
            transition: width 0.2s ease-out;
        }

        .perc {
            font-size: 9px;
            font-family: monospace;
            color: var(--cold-blue);
            margin-top: 10px;
            letter-spacing: 5px;
            opacity: 0.6;
        }

        /* Tombol Masuk Elegant */
        #btnMasuk {
            display: none;
            opacity: 0;
            padding: 12px 50px;
            background: transparent;
            color: var(--cold-blue);
            border: 1px solid rgba(165, 243, 252, 0.3);
            border-radius: 2px; /* Kotak tajam lebih elegan/dingin */
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 8px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            outline: none;
        }

        #btnMasuk:hover, #btnMasuk:focus {
            background: rgba(165, 243, 252, 0.05);
            border-color: var(--cold-blue);
            box-shadow: 0 0 20px rgba(165, 243, 252, 0.2);
            letter-spacing: 10px; /* Efek ekspansi saat hover */
        }

        /* Animasi Fade In */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="snowCanvas"></canvas>

    <div class="container" id="mainTitle">
        <h1>PERPUS <span>LUBANGSA</span></h1>
    </div>

    <div class="interaction-box">
        <div id="loaderArea" class="loader-wrapper">
            <div class="bar"><div id="fill" class="fill"></div></div>
            <div id="perc" class="perc">LOADING</div>
        </div>
        
        <button id="btnMasuk" onclick="enterApp()">Masuk</button>
    </div>

    <script>
        // --- SNOW SYSTEM (Elegant & Light) ---
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 50; i++) { 
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 1.5 + 0.5,
                    v: Math.random() * 0.8 + 0.2,
                    o: Math.random() * 0.5 + 0.1
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            for(let p of particles) {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.o})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fill();
                p.y += p.v;
                if(p.y > h) p.y = -5;
            }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();

        // --- LOADING & INTERACTION SYSTEM ---
        let progress = 0;
        let isLoaded = false;
        const fill = document.getElementById('fill');
        const loaderArea = document.getElementById('loaderArea');
        const btn = document.getElementById('btnMasuk');

        const interval = setInterval(() => {
            progress += Math.random() * 5 + 2; 
            if(progress >= 100) {
                progress = 100;
                clearInterval(interval);
                showButton();
            }
            fill.style.width = progress + '%';
        }, 70);

        function showButton() {
            isLoaded = true;
            loaderArea.style.opacity = '0';
            setTimeout(() => {
                loaderArea.style.display = 'none';
                btn.style.display = 'block';
                btn.style.animation = 'fadeIn 0.8s forwards';
                btn.focus(); // Otomatis fokus agar bisa langsung Enter
            }, 500);
        }

        function enterApp() {
            // Efek transisi saat tombol diklik
            document.getElementById('mainTitle').style.transform = 'scale(1.1)';
            document.getElementById('mainTitle').style.opacity = '0';
            btn.style.opacity = '0';
            setTimeout(() => {
                window.location.href = "opac.html";
            }, 400);
        }

        // Fitur: Tekan Enter untuk Masuk
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && isLoaded) {
                enterApp();
            }
        });

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
