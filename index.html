<!DOCTYPE html> 
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Lubangsa</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">

    <style>
        :root {
            --accent-color: #a5f3fc;
            --bar-bg: rgba(255, 255, 255, 0.05);
            --bg-dark: #05070a;
        }

        body {
            background-color: var(--bg-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        /* ----- Latar Belakang Cahaya Dinamis ----- */
        .ambient-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(49, 130, 206, 0.1) 0%, rgba(5, 7, 10, 0) 70%);
            filter: blur(80px);
            z-index: 1;
        }

        /* ----- Sistem Salju Lebat ----- */
        .snow-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .snowflake {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0.8;
            filter: blur(1px);
            animation: fall-heavy linear infinite;
        }

        @keyframes fall-heavy {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); }
            100% { transform: translateY(110vh) translateX(40px) rotate(360deg); }
        }

        /* ----- Konten Teks (Diam/Statik) ----- */
        .container {
            text-align: center;
            z-index: 4;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        h1 span {
            color: var(--accent-color);
            text-shadow: 0 0 30px rgba(165, 243, 252, 0.5);
        }

        .sub-text {
            font-size: 12px;
            letter-spacing: 5px;
            color: #4a5568;
            margin-top: 10px;
            font-weight: 600;
        }

        /* ----- Loading Bar Mewah ----- */
        .loader-wrapper {
            position: absolute;
            bottom: 10%;
            width: 300px;
            text-align: center;
            z-index: 5;
        }

        .bar-container {
            width: 100%;
            height: 6px;
            background: var(--bar-bg);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2b6cb0, var(--accent-color), #fff);
            background-size: 200% 100%;
            box-shadow: 0 0 20px var(--accent-color);
            border-radius: 10px;
            transition: width 0.2s ease-out;
            animation: gradient-move 2s linear infinite;
        }

        @keyframes gradient-move {
            0% { background-position: 100% 0%; }
            100% { background-position: -100% 0%; }
        }

        .percentage {
            font-size: 10px;
            font-family: monospace;
            color: var(--accent-color);
            margin-top: 10px;
            letter-spacing: 2px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div class="snow-overlay" id="snow-field"></div>

    <div class="container">
        <h1>PERPUS <span>LUBANGSA</span></h1>
        <div class="sub-text">EST. 2026</div>
    </div>

    <div class="loader-wrapper">
        <div class="bar-container">
            <div id="progress-fill" class="bar-fill"></div>
        </div>
        <div id="perc-text" class="percentage">0%</div>
    </div>

    <script>
        // 1. Generator Salju Lebat
        const snowField = document.getElementById('snow-field');
        const count = 120; // Jumlah salju ditambah agar lebat

        for (let i = 0; i < count; i++) {
            const snow = document.createElement('div');
            snow.className = 'snowflake';
            
            const size = Math.random() * 4 + 1;
            snow.style.width = size + 'px';
            snow.style.height = size + 'px';
            
            snow.style.left = Math.random() * 100 + '%';
            snow.style.animationDuration = (Math.random() * 3 + 2) + 's'; // Lebih cepat
            snow.style.animationDelay = Math.random() * 5 + 's';
            snow.style.opacity = Math.random();
            
            snowField.appendChild(snow);
        }

        // 2. PWA Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {});
        }

        // 3. Loading Logic
        const fill = document.getElementById('progress-fill');
        const perc = document.getElementById('perc-text');
        let width = 0;

        function loading() {
            const step = () => {
                // Pertambahan alami: melambat saat mendekati 100
                let inc = Math.random() * 2;
                if (width > 80) inc = Math.random() * 0.5;
                
                width += inc;

                if (width >= 100) {
                    width = 100;
                    fill.style.width = '100%';
                    perc.innerText = '100%';
                    setTimeout(() => {
                        window.location.href = "opac.html";
                    }, 1200);
                    return;
                }

                fill.style.width = width + '%';
                perc.innerText = Math.floor(width) + '%';
                requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }

        window.onload = loading;
    </script>
</body>
</html>
