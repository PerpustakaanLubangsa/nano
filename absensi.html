<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piket Sign-In • Lubangsa Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 20% 20%, #eff6ff 0%, #f8fafc 100%);
        }
        h1 { font-family: 'Cinzel', serif; }
        
        .glass-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }

        .petugas-card { 
            background: #ffffff; 
            border: 1px solid #f1f5f9; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 1.5rem;
        }
        .petugas-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            border-color: #e2e8f0;
        }

        .avatar-circle {
            width: 45px; height: 45px; border-radius: 1rem;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1rem; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-status {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.4;
            filter: grayscale(1);
            font-size: 0.65rem !important;
        }
        .btn-status.active {
            opacity: 1;
            filter: grayscale(0);
            transform: scale(1.05);
            box-shadow: 0 8px 15px -3px rgba(0,0,0,0.1);
        }
        
        .btn-hadir.active { background-color: #2563eb !important; }
        .btn-izin.active { background-color: #f59e0b !important; }
        .btn-alpha.active { background-color: #e11d48 !important; }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .loading-ripple { position: relative; }
        .loading-ripple::after {
            content: ""; position: absolute; inset: 0; border-radius: inherit;
            border: 2px solid currentColor; animation: ripple 1s infinite;
        }

        /* Custom Scrollbar for the list */
        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="p-6">

    <div id="mainContainer" class="w-full max-w-2xl">
        <div id="loading" class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
            <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-blue-600 mt-6">Sinkronisasi Shift...</p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);
        const HARI_MAP = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];

        function getAvatarColor(char) {
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
            return colors[char.charCodeAt(0) % colors.length];
        }

        async function checkShift() {
            try {
                const now = new Date();
                const hariIni = HARI_MAP[now.getDay()];
                const jamMenit = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                const tglSekarang = now.toISOString().split('T')[0];

                const { data: allShifts } = await client.from('jam_master').select('*');
                const currentShift = allShifts?.find(s => {
                    const [mulai, selesai] = s.waktu.split(' - ');
                    return jamMenit >= mulai && jamMenit <= selesai;
                });

                if (!currentShift) { renderEmpty("Layanan Perpustakaan Sedang Tutup"); return; }

                const { data: petugas } = await client.from('jadwal_detail').select('*').eq('hari', hariIni).eq('shift', currentShift.waktu);
                const { data: rekapToday } = await client.from('rekap_absensi').select('*').eq('tanggal', tglSekarang).eq('shift', currentShift.label);

                renderAbsensi(hariIni, currentShift, petugas || [], rekapToday || []);
            } catch (e) {
                renderEmpty("Terjadi Kesalahan Koneksi");
            }
        }

        function renderAbsensi(hari, shift, petugas, rekap) {
            document.getElementById('mainContainer').innerHTML = `
                <div class="glass-container p-8 md:p-12 overflow-hidden">
                    <header class="mb-8 flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></span>
                                <span class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.3em]">Live Attendance</span>
                            </div>
                            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">${shift.label}</h1>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest"><i class="far fa-clock mr-1"></i> ${shift.waktu}</p>
                        </div>
                        <div class="text-right px-4 py-2 bg-slate-100 rounded-2xl">
                            <p class="text-xs font-black text-slate-800 uppercase">${hari}</p>
                            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">${new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'})}</p>
                        </div>
                    </header>

                    <div class="grid gap-3 max-h-[60vh] overflow-y-auto pr-2 list-container">
                        ${petugas.length > 0 ? petugas.map((p, idx) => {
                            const dataAbsen = rekap.find(r => r.nama === p.nama);
                            const char = p.nama.charAt(0);
                            return `
                                <div class="petugas-card p-4 flex items-center justify-between gap-4">
                                    <div class="flex items-center gap-4">
                                        <div class="avatar-circle flex-shrink-0" style="background-color: ${getAvatarColor(char)}">${char}</div>
                                        <h3 class="text-[11px] font-bold text-slate-700 uppercase tracking-tight leading-tight">${p.nama}</h3>
                                    </div>
                                    <div class="flex gap-1.5" id="btns-${idx}">
                                        <button onclick="updateStatus('${p.nama}', 'Hadir', '${hari}', '${shift.label}', ${idx})" 
                                            class="btn-status btn-hadir px-4 py-2 bg-slate-200 text-white rounded-lg font-bold uppercase tracking-widest ${dataAbsen?.status === 'Hadir' ? 'active' : ''}">Hadir</button>
                                        
                                        <button onclick="updateStatus('${p.nama}', 'Izin', '${hari}', '${shift.label}', ${idx})" 
                                            class="btn-status btn-izin px-4 py-2 bg-slate-200 text-white rounded-lg font-bold uppercase tracking-widest ${dataAbsen?.status === 'Izin' ? 'active' : ''}">Izin</button>
                                        
                                        <button onclick="updateStatus('${p.nama}', 'Alpha', '${hari}', '${shift.label}', ${idx})" 
                                            class="btn-status btn-alpha px-4 py-2 bg-slate-200 text-white rounded-lg font-bold uppercase tracking-widest ${dataAbsen?.status === 'Alpha' ? 'active' : ''}">Alpha</button>
                                    </div>
                                </div>
                            `;
                        }).join('') : `<p class="text-center py-10 text-xs font-bold text-slate-400 uppercase italic tracking-widest">Tidak ada jadwal piket hari ini</p>`}
                    </div>
                </div>
            `;
        }

        async function updateStatus(nama, status, hari, shift, idx) {
            const btnGroup = document.getElementById(`btns-${idx}`);
            const buttons = btnGroup.querySelectorAll('.btn-status');
            const tgl = new Date().toISOString().split('T')[0];

            // UI Feedback
            buttons.forEach(b => {
                b.classList.remove('active');
                if(b.innerText.toLowerCase() === status.toLowerCase()) {
                    b.classList.add('loading-ripple');
                }
            });

            try {
                // Hapus rekap lama (jika ada) untuk mencegah duplikasi
                await client.from('rekap_absensi').delete().eq('nama', nama).eq('tanggal', tgl).eq('shift', shift);
                
                // Input status baru
                const { error } = await client.from('rekap_absensi').insert([{
                    nama, hari, shift, status, tanggal: tgl
                }]);

                if (!error) {
                    buttons.forEach(b => {
                        b.classList.remove('loading-ripple');
                        if(b.innerText.toLowerCase() === status.toLowerCase()) {
                            b.classList.add('active');
                        }
                    });
                }
            } catch (e) {
                alert("Gagal memperbarui status. Cek koneksi internet.");
                checkShift(); // Refresh UI
            }
        }

        function renderEmpty(pesan) {
            document.getElementById('mainContainer').innerHTML = `
                <div class="glass-container p-16 text-center border-2 border-dashed border-slate-200">
                    <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                        <i class="fa-solid fa-moon text-3xl"></i>
                    </div>
                    <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter mb-2">Sesi Berakhir</h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">${pesan}</p>
                    <button onclick="checkShift()" class="mt-8 px-6 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 transition-all">Refresh Jadwal</button>
                </div>
            `;
        }

        window.onload = checkShift;
    </script>
</body>
</html>
