<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piket Sign-In • Lubangsa Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --snow-blue-bg: #f0f7ff; 
            --snow-blue-card: #e2eeff;
        }
        body { 
            background: var(--snow-blue-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f7ff 100%);
        }
        h1 { font-family: 'Cinzel', serif; }
        
        .glass-container {
            background: var(--snow-blue-card);
            backdrop-filter: blur(20px);
            border: 2px solid #ffffff;
            border-radius: 4rem;
            box-shadow: 0 40px 100px -20px rgba(148, 187, 233, 0.3);
        }

        .petugas-card { 
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            transition: all 0.3s ease; 
            border-radius: 2.5rem;
        }

        .avatar-circle {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.1rem; color: white;
            box-shadow: 0 8px 15px -5px rgba(0,0,0,0.1);
        }

        .btn-status {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: grayscale(0.8) opacity(0.5);
        }
        .btn-status.active {
            filter: grayscale(0) opacity(1);
            transform: scale(1.05);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15);
            outline: 3px solid white;
        }
        .btn-status:hover { filter: grayscale(0.3) opacity(0.8); }

        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .loading-pulse { animation: pulse-blue 1s infinite; }
    </style>
</head>
<body class="p-4">

    <div id="mainContainer" class="w-full max-w-2xl">
        <div id="loading" class="text-center text-blue-400">
            <i class="fas fa-snowflake fa-spin text-4xl"></i>
            <p class="text-[10px] font-bold uppercase tracking-widest mt-4">Memuat Shift...</p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);
        const HARI_MAP = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];

        function getAvatarColor(char) {
            const colors = ['#60a5fa', '#34d399', '#fbbf24', '#f87171', '#a78bfa', '#f472b6', '#22d3ee'];
            return colors[char.charCodeAt(0) % colors.length];
        }

        async function checkShift() {
            const now = new Date();
            const hariIni = HARI_MAP[now.getDay()];
            const jamMenit = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const tglSekarang = now.toISOString().split('T')[0];

            const { data: allShifts } = await client.from('jam_master').select('*');
            const currentShift = allShifts?.find(s => {
                const [mulai, selesai] = s.waktu.split(' - ');
                return jamMenit >= mulai && jamMenit <= selesai;
            });

            if (!currentShift) { renderEmpty("Waktunya Istirahat"); return; }

            const { data: petugas } = await client.from('jadwal_detail').select('*').eq('hari', hariIni).eq('shift', currentShift.waktu);
            const { data: rekapToday } = await client.from('rekap_absensi').select('*').eq('tanggal', tglSekarang).eq('shift', currentShift.label);

            renderAbsensi(hariIni, currentShift, petugas || [], rekapToday || []);
        }

        function renderAbsensi(hari, shift, petugas, rekap) {
            document.getElementById('mainContainer').innerHTML = `
                <div class="glass-container p-8 md:p-14">
                    <header class="mb-10 flex justify-between items-end border-b border-white/50 pb-8">
                        <div>
                            <span class="text-[9px] font-black text-blue-500 uppercase tracking-[0.4em]">Lubangsa Library</span>
                            <h1 class="text-4xl font-black text-slate-800 uppercase tracking-tighter mt-1">${shift.label}</h1>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-slate-600 uppercase tracking-widest">${hari}</p>
                            <p class="text-[10px] font-bold text-blue-400 uppercase italic">${shift.waktu}</p>
                        </div>
                    </header>
                    <div class="grid gap-4">
                        ${petugas.map((p, idx) => {
                            const dataAbsen = rekap.find(r => r.nama === p.nama);
                            const char = p.nama.charAt(0);
                            return `
                                <div class="petugas-card p-5 flex flex-col md:flex-row items-center justify-between gap-4">
                                    <div class="flex items-center gap-4 w-full md:w-auto">
                                        <div class="avatar-circle" style="background-color: ${getAvatarColor(char)}">${char}</div>
                                        <h3 class="text-sm font-black text-slate-700 uppercase tracking-tight">${p.nama}</h3>
                                    </div>
                                    <div class="flex gap-2 w-full md:w-auto" id="btns-${idx}">
                                        <button onclick="updateStatus('${p.nama}', 'Hadir', '${hari}', '${shift.label}', ${idx})" 
                                            class="btn-status flex-1 md:flex-none px-4 py-2.5 bg-blue-500 text-white rounded-xl text-[8px] font-black uppercase tracking-widest ${dataAbsen?.status === 'Hadir' ? 'active' : ''}">Hadir</button>
                                        
                                        <button onclick="updateStatus('${p.nama}', 'Izin', '${hari}', '${shift.label}', ${idx})" 
                                            class="btn-status flex-1 md:flex-none px-4 py-2.5 bg-amber-400 text-white rounded-xl text-[8px] font-black uppercase tracking-widest ${dataAbsen?.status === 'Izin' ? 'active' : ''}">Izin</button>
                                        
                                        <button onclick="updateStatus('${p.nama}', 'Alpha', '${hari}', '${shift.label}', ${idx})" 
                                            class="btn-status flex-1 md:flex-none px-4 py-2.5 bg-rose-400 text-white rounded-xl text-[8px] font-black uppercase tracking-widest ${dataAbsen?.status === 'Alpha' ? 'active' : ''}">Alpha</button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        async function updateStatus(nama, status, hari, shift, idx) {
            const btnGroup = document.getElementById(`btns-${idx}`);
            const buttons = btnGroup.querySelectorAll('.btn-status');
            const tgl = new Date().toISOString().split('T')[0];

            buttons.forEach(b => b.classList.remove('active', 'loading-pulse'));
            const targetBtn = Array.from(buttons).find(b => b.innerText.includes(status.toUpperCase()));
            targetBtn.classList.add('loading-pulse');

            await client.from('rekap_absensi').delete().eq('nama', nama).eq('tanggal', tgl).eq('shift', shift);
            
            const { error } = await client.from('rekap_absensi').insert([{
                nama, hari, shift, status, tanggal: tgl
            }]);

            if (!error) {
                targetBtn.classList.remove('loading-pulse');
                targetBtn.classList.add('active');
            }
        }

        function renderEmpty(pesan) {
            document.getElementById('mainContainer').innerHTML = `
                <div class="glass-container p-16 text-center border-dashed border-2 border-white">
                    <i class="fa-solid fa-snowflake text-white text-5xl mb-6"></i>
                    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-2">Break Time</h2>
                    <p class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.3em]">${pesan}</p>
                </div>
            `;
        }

        window.onload = checkShift;
    </script>
</body>
</html>
