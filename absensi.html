<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piket Attendance | Gemini Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #f8f9fa; --bg-card: #ffffff; --text-main: #1f1f1f;
            --text-muted: #5f6368; --accent: #1a73e8; --border: #e2e8f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000; --bg-card: #121212; --text-main: #e3e3e3;
                --text-muted: #9aa0a6; --accent: #8ab4f8; --border: #2d2d2d;
            }
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gemini-container { width: 100%; max-width: 480px; background: var(--bg-card); border-radius: 28px; padding: 32px; border: 1px solid var(--border); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .live-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-main); padding: 6px 14px; border-radius: 50px; font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .live-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        .petugas-item { background: var(--bg-main); padding: 16px; border-radius: 20px; border: 1px solid transparent; transition: border 0.3s; }
        .avatar { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 14px; }
        .btn-status { border: 1px solid var(--border); background: var(--bg-card); color: var(--text-main); padding: 10px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .btn-status:disabled { cursor: not-allowed; opacity: 0.6; }
        .btn-status.active[data-status="Hadir"] { background: var(--accent) !important; color: white !important; border-color: var(--accent) !important; }
        .btn-status.active[data-status="Izin"] { background: #f59e0b !important; color: white !important; border-color: #f59e0b !important; }
        .btn-status.active[data-status="Alpha"] { background: #d93025 !important; color: white !important; border-color: #d93025 !important; }
        .loader { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app" class="gemini-container">
    <div class="py-10 text-center">
        <div class="loader"></div>
        <p class="text-[10px] font-bold uppercase tracking-widest mt-4 opacity-40">Sinkronisasi Database...</p>
    </div>
</div>

<script type="module">
    import { supabase } from './supa/supa.js';

    const HARI_MAP = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    
    // Helper Tanggal Lokal Indonesia (Mencegah Bug UTC)
    const getLocalDate = () => {
        const d = new Date();
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        return d.toISOString().split('T')[0];
    };

    const getAvatarColor = (c) => {
        const colors = ['#4285F4', '#34A853', '#FBBC05', '#EA4335', '#673AB7', '#00ACC1'];
        return colors[c.charCodeAt(0) % colors.length] || '#ccc';
    };

    async function init() {
        try {
            const now = new Date();
            const hariIni = HARI_MAP[now.getDay()];
            const jamMenit = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const tgl = getLocalDate();

            // 1. Ambil data shift & rekap secara paralel (lebih cepat)
            const [ {data: shifts}, {data: rekap} ] = await Promise.all([
                supabase.from('jam_master').select('*'),
                supabase.from('rekap_absensi').select('*').eq('tanggal', tgl)
            ]);

            // 2. Tentukan shift aktif
            const currentShift = shifts?.find(s => {
                const [m, sl] = s.waktu.split(' - ');
                return jamMenit >= m && jamMenit <= sl;
            });

            if (!currentShift) return renderEmpty("Sesi Perpustakaan Tutup", "Tidak ada jadwal aktif pada jam ini.");

            // 3. Ambil petugas terjadwal
            const { data: petugas } = await supabase.from('jadwal_detail')
                .select('*')
                .eq('hari', hariIni)
                .eq('shift', currentShift.waktu);

            renderMain(hariIni, currentShift, petugas || [], rekap || []);
        } catch (e) {
            console.error(e);
            renderEmpty("Koneksi Bermasalah", "Pastikan internet stabil dan RLS Supabase sudah benar.");
        }
    }

    function renderMain(hari, shift, petugas, rekap) {
        const app = document.getElementById('app');
        const options = { day: 'numeric', month: 'long' };
        const tglIndo = new Date().toLocaleDateString('id-ID', options);

        app.innerHTML = `
            <div class="text-center mb-8">
                <div class="live-badge mb-4"><span class="live-dot"></span>Live Attendance</div>
                <h1 class="text-2xl font-extrabold tracking-tight">${shift.label}</h1>
                <p class="text-xs font-medium opacity-50 uppercase tracking-wide mt-1">${hari}, ${tglIndo} • ${shift.waktu}</p>
            </div>
            <div class="petugas-list">
                ${petugas.length > 0 ? petugas.map((p, idx) => {
                    const abs = rekap.find(r => r.nama === p.nama && r.shift === shift.label);
                    const char = p.nama.charAt(0);
                    return `
                    <div class="petugas-item">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="avatar shadow-sm" style="background:${getAvatarColor(char)}">${char}</div>
                            <div class="nama-petugas">${p.nama}</div>
                        </div>
                        <div class="btn-group grid grid-cols-3 gap-2" id="group-${idx}">
                            ${['Hadir', 'Izin', 'Alpha'].map(status => `
                                <button class="btn-status ${abs?.status === status ? 'active' : ''}" 
                                    data-status="${status}" 
                                    onclick="window.handleUpdate('${p.nama}', '${status}', '${hari}', '${shift.label}', ${idx})">
                                    ${status}
                                </button>
                            `).join('')}
                        </div>
                    </div>`;
                }).join('') : `<div class="text-center py-8 opacity-40 text-xs font-bold uppercase tracking-widest">Kosong</div>`}
            </div>
            <div class="mt-10 text-center">
                <button onclick="location.reload()" class="text-[9px] font-black opacity-20 hover:opacity-100 uppercase tracking-[2px] transition-all">SINKRONKAN ULANG</button>
            </div>
        `;
    }

    window.handleUpdate = async (nama, status, hari, shift, idx) => {
        const group = document.getElementById(`group-${idx}`);
        const btns = group.querySelectorAll('.btn-status');
        const tgl = getLocalDate();

        // UI Optimistik: Ubah warna tombol segera tanpa nunggu database
        btns.forEach(b => {
            b.classList.remove('active');
            b.disabled = true; // Kunci tombol saat proses
            if(b.dataset.status === status) {
                b.classList.add('active');
                b.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i>';
            } else {
                b.innerHTML = b.dataset.status;
            }
        });

        try {
            // Mencegah duplikasi: Hapus record lama untuk nama+tgl+shift yang sama
            await supabase.from('rekap_absensi').delete()
                .eq('nama', nama).eq('tanggal', tgl).eq('shift', shift);

            const { error } = await supabase.from('rekap_absensi').insert([
                { nama, hari, shift, status, tanggal: tgl }
            ]);

            if (error) throw error;
        } catch (e) {
            alert("Gagal simpan absensi: " + e.message);
        } finally {
            // Kembalikan teks tombol dan refresh data
            btns.forEach(b => {
                b.disabled = false;
                b.innerHTML = b.dataset.status;
            });
            init(); 
        }
    };

    function renderEmpty(title, sub) {
        document.getElementById('app').innerHTML = `
            <div class="text-center py-10">
                <i class="fa-solid fa-clock-rotate-left opacity-10 text-5xl mb-6"></i>
                <h2 class="text-lg font-bold">${title}</h2>
                <p class="text-sm opacity-50 mt-2 px-6">${sub}</p>
                <button onclick="location.reload()" class="mt-8 px-8 py-3 bg-black text-white dark:bg-white dark:text-black rounded-2xl text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-transform">Coba Lagi</button>
            </div>
        `;
    }

    init();
</script>
</body>
</html>
