<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Bibliografi • Perpustakaan Lubangsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #fcfdfe;
            --text-main: #1a1c1e;
            --text-muted: #5e6266;
            --accent: #0061ff;
            --border: #e9eef2;
            --input-bg: #f3f6f9;
            --modal-overlay: rgba(240, 244, 248, 0.7);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000;
                --text-main: #e2e2e6;
                --text-muted: #8e9189;
                --accent: #a8c7fa;
                --border: #222427;
                --input-bg: #111315;
                --modal-overlay: rgba(0, 0, 0, 0.9);
            }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #8882; border-radius: 10px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px 24px; line-height: 1.6; }
        .editor-wrapper { max-width: 720px; margin: 0 auto; }
        
        .nav-back { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: var(--input-bg); border-radius: 14px; color: var(--text-main); cursor: pointer; margin-bottom: 24px; transition: all 0.3s; border: 1px solid var(--border); }
        .nav-back:hover { background: var(--accent); color: #000; transform: translateX(-4px); }
        
        .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-top: 32px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; padding-left: 4px; }
        .form-control { width: 100%; background: var(--input-bg); border: 1px solid transparent; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 500; color: var(--text-main); outline: none; transition: all 0.3s; }
        .form-control:focus { border-color: var(--accent); background: var(--bg-main); box-shadow: 0 0 0 4px rgba(0, 97, 255, 0.05); }
        
        .eks-tag { background: var(--input-bg); border: 1px solid var(--border); padding: 12px 16px; border-radius: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s ease; }
        .eks-tag:hover { border-color: var(--accent); transform: translateY(-2px); }
        
        #iframeModal { position: fixed; inset: 0; z-index: 2000; display: none; background: var(--bg-main); }
        #iframeModal.active { display: block; }
        #iframeModal .modal-content { width: 100vw; height: 100vh; border: none; padding: 0; position: relative; }
        #iframeModal iframe { width: 100%; height: 100%; border: none; }
        
        .close-iframe { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 2010; background: #ef4444; color: white; padding: 12px 24px; border-radius: 50px; 
            display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 800; font-size: 12px;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        .modal { position: fixed; inset: 0; background: var(--modal-overlay); backdrop-filter: blur(16px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content-std { background: var(--bg-main); width: 100%; max-width: 420px; border-radius: 32px; padding: 32px; border: 1px solid var(--border); }

        .btn-save-main { background: var(--accent); color: #000; padding: 12px 32px; border-radius: 30px; font-size: 13px; font-weight: 800; cursor: pointer; border: none; }
        .btn-delete-link { font-size: 11px; font-weight: 700; color: #ef4444; cursor: pointer; opacity: 0.6; transition: opacity 0.3s; }
        .btn-delete-link:hover { opacity: 1; }
        
        .loader-full { position: fixed; inset: 0; background: var(--bg-main); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .loader-full.active { display: flex; }
    </style>
</head>
<body>

<div id="loader" class="loader-full"><i class="fa-solid fa-circle-notch fa-spin text-blue-500 text-3xl"></i></div>

<div id="iframeModal">
    <div class="modal-content">
        <div class="close-iframe" onclick="closeIframe()">
            <i class="fa-solid fa-xmark"></i> TUTUP PENCARIAN
        </div>
        <iframe id="klasifikasiFrame" src="about:blank"></iframe>
    </div>
</div>

<div id="eksModal" class="modal">
    <div class="modal-content-std">
        <div class="form-group">
            <label>Barcode / Kode Eksemplar</label>
            <input type="text" id="m_kode" class="form-control" placeholder="Scan barcode...">
        </div>
        <div class="form-group">
            <label>Nomor Panggil</label>
            <input type="text" id="m_panggil" class="form-control" placeholder="Contoh: 297.3 SAA m">
        </div>
        <div class="form-group">
            <label>Lokasi Rak / Kategori</label>
            <div class="relative">
                <input type="text" id="m_rak" class="form-control pr-12" placeholder="Nama Rak...">
                <button type="button" onclick="openKlasifikasi()" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-accent hover:bg-blue-50 dark:hover:bg-zinc-800 rounded-lg transition-colors">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>
        <div class="flex items-center justify-between mt-10">
            <button id="btnHapusEks" class="text-red-500 text-[10px] font-black uppercase hidden">Hapus Item</button>
            <div class="flex gap-4 ml-auto">
                <button type="button" onclick="closeModal()" class="text-muted font-bold text-sm">Batal</button>
                <button type="button" onclick="saveEks()" class="bg-black dark:bg-white dark:text-black text-white px-6 py-2.5 rounded-xl font-bold text-sm">Simpan</button>
            </div>
        </div>
    </div>
</div>

<div class="editor-wrapper">
    <div class="nav-back" onclick="goBack()"><i class="fa-solid fa-arrow-left text-lg"></i></div>
    
    <form id="biblioForm">
        <div class="section-title" style="margin-top: 0;">Informasi Dasar</div>
        <div class="form-group">
            <label>Judul Koleksi</label>
            <input type="text" id="f_judul" class="form-control" placeholder="Judul lengkap buku..." required>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6">
            <div class="form-group"><label>Penulis</label><input type="text" id="f_penulis" class="form-control"></div>
            <div class="form-group"><label>Penerbit</label><input type="text" id="f_penerbit" class="form-control"></div>
            <div class="form-group"><label>Tahun Terbit</label><input type="text" id="f_tahun" class="form-control"></div>
            <div class="form-group"><label>ISBN / ISSN</label><input type="text" id="f_isbn" class="form-control"></div>
            <div class="form-group"><label>Kategori Utama</label><input type="text" id="f_kategori" class="form-control"></div>
            <div class="form-group"><label>Deskripsi Fisik</label><input type="text" id="f_fisik" class="form-control" placeholder="200 hlm; 21 cm"></div>
        </div>

        <div class="form-group">
            <label>URL Sampul Buku (Link Gambar)</label>
            <input type="url" id="f_sampul" class="form-control" placeholder="https://image-url.com/buku.jpg">
        </div>

        <div class="section-title">Unit Eksemplar</div>
        <div id="eksList" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"></div>
        <button type="button" onclick="openModal()" class="text-xs font-bold text-blue-500 hover:opacity-70">+ Tambah Eksemplar</button>

        <div class="mt-12 pt-8 border-t border-slate-100 dark:border-zinc-900 flex items-center justify-end gap-6">
            <span id="btnDelete" class="btn-delete-link hidden" onclick="deleteData()">Hapus Koleksi</span>
            <button type="submit" class="btn-save-main">Simpan Perubahan</button>
        </div>
    </form>
</div>

<script type="module">
    import { supabase } from './supa/supa.js';

    // --- PROTEKSI LOGIN KUSTOM ---
    function checkAuth() {
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        if (isLoggedIn !== 'true') {
            window.location.replace('login.html');
            return false;
        }
        return true;
    }

    if (!checkAuth()) throw new Error("Unauthorized access");

    let editId = sessionStorage.getItem('editBiblioId'); 
    let eksemplars = [];
    let editingEksIndex = null;

    window.goBack = () => {
        sessionStorage.removeItem('editBiblioId');
        window.location.href = 'bibliografi.html';
    };

    // --- KLASIFIKASI IFRAME LOGIC ---
    window.openKlasifikasi = () => {
        const val = document.getElementById('m_rak').value.trim();
        const frame = document.getElementById('klasifikasiFrame');
        const searchUrl = val ? `klasifikasi.html?search=${encodeURIComponent(val)}` : 'klasifikasi.html';
        
        frame.src = searchUrl;
        document.getElementById('iframeModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    };

    window.closeIframe = () => {
        document.getElementById('iframeModal').classList.remove('active');
        document.getElementById('klasifikasiFrame').src = 'about:blank';
        document.body.style.overflow = 'auto';
    };

    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'SELECT_KLASIFIKASI') {
            const rawValue = event.data.value; 
            const cleanValue = rawValue.replace(/^[0-9\-\s.]+/, '').trim();
            document.getElementById('m_rak').value = cleanValue;
            closeIframe();
        }
    });

    // --- EKSEMPLAR LOGIC ---
    window.openModal = (index = null) => {
        editingEksIndex = index;
        const btnHapus = document.getElementById('btnHapusEks');
        if (index !== null) {
            const e = eksemplars[index];
            document.getElementById('m_kode').value = e.kode || '';
            document.getElementById('m_panggil').value = e.nomor_panggil || '';
            document.getElementById('m_rak').value = e.lokasi_rak || '';
            btnHapus.classList.remove('hidden');
            btnHapus.onclick = () => { eksemplars.splice(index, 1); closeModal(); renderEksemplar(); };
        } else {
            document.querySelectorAll('#eksModal input').forEach(i => i.value = '');
            btnHapus.classList.add('hidden');
        }
        document.getElementById('eksModal').classList.add('active');
    };

    window.closeModal = () => document.getElementById('eksModal').classList.remove('active');

    window.saveEks = () => {
        const kode = document.getElementById('m_kode').value.trim();
        if(!kode) return alert("Barcode wajib diisi");
        const data = { 
            kode, 
            nomor_panggil: document.getElementById('m_panggil').value, 
            lokasi_rak: document.getElementById('m_rak').value, 
            status: 'Tersedia', 
            status_audit: 'belum' 
        };
        if (editingEksIndex !== null) eksemplars[editingEksIndex] = { ...eksemplars[editingEksIndex], ...data };
        else eksemplars.push(data);
        closeModal();
        renderEksemplar();
    };

    function renderEksemplar() {
        const list = document.getElementById('eksList');
        list.innerHTML = eksemplars.map((e, i) => `
            <div class="eks-tag" onclick="openModal(${i})">
                <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                <div class="flex-1">
                    <div class="text-xs font-bold leading-none">${e.kode}</div>
                    <div class="text-[10px] text-muted font-medium mt-1">${e.nomor_panggil || '-'} • ${e.lokasi_rak || '-'}</div>
                </div>
                <i class="fa-solid fa-chevron-right text-[10px] opacity-20"></i>
            </div>
        `).join('');
    }

    // --- FORM DATA LOAD & SUBMIT ---
    if (editId) loadDetail();

    async function loadDetail() {
        document.getElementById('loader').classList.add('active');
        const { data, error } = await supabase.rpc('get_biblio_detail', { p_id: editId });
        if (!error && data.length > 0) {
            const bib = data[0].biblio_data;
            document.getElementById('btnDelete').classList.remove('hidden');
            document.getElementById('f_judul').value = bib.judul || '';
            document.getElementById('f_penulis').value = bib.penulis || '';
            document.getElementById('f_penerbit').value = bib.penerbit || '';
            document.getElementById('f_tahun').value = bib.tahun_terbit || '';
            document.getElementById('f_isbn').value = bib.isbn_issn || '';
            document.getElementById('f_kategori').value = bib.kategori || '';
            document.getElementById('f_fisik').value = bib.deskripsi_fisik || '';
            document.getElementById('f_sampul').value = bib.sampul_url || '';
            eksemplars = data[0].eksemplar_data || [];
            renderEksemplar();
        }
        document.getElementById('loader').classList.remove('active');
    }

    // --- FUNGSI HAPUS DENGAN RPC (BYPASS RLS 401) ---
    window.deleteData = async () => {
        if (!confirm("Hapus seluruh koleksi ini beserta eksemplarnya?")) return;
        
        document.getElementById('loader').classList.add('active');

        // Memanggil RPC delete_biblio_v2 yang sudah dibuat di SQL
        const { error } = await supabase.rpc('delete_biblio_v2', { p_id: editId });

        if (!error) {
            sessionStorage.removeItem('editBiblioId');
            location.href = 'bibliografi.html';
        } else {
            alert("Gagal menghapus: " + error.message);
            document.getElementById('loader').classList.remove('active');
        }
    };

    document.getElementById('biblioForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader').classList.add('active');
        
        const payload = {
            judul: document.getElementById('f_judul').value,
            penulis: document.getElementById('f_penulis').value,
            penerbit: document.getElementById('f_penerbit').value,
            tahun_terbit: document.getElementById('f_tahun').value,
            isbn_issn: document.getElementById('f_isbn').value,
            kategori: document.getElementById('f_kategori').value,
            deskripsi_fisik: document.getElementById('f_fisik').value,
            sampul_url: document.getElementById('f_sampul').value
        };

        const { error } = await supabase.rpc('upsert_full_biblio', {
            p_id: editId || null,
            p_data: payload,
            p_eksemplars: eksemplars
        });

        if (!error) {
            sessionStorage.removeItem('editBiblioId');
            location.href = 'bibliografi.html';
        } else {
            alert("Error: " + error.message);
            document.getElementById('loader').classList.remove('active');
        }
    };
</script>
</body>
</html>
