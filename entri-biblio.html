<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Bibliografi • Perpustakaan Lubangsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #fcfdfe; --text-main: #1a1c1e; --text-muted: #5e6266;
            --accent: #0061ff; --border: #e9eef2; --input-bg: #f3f6f9;
            --modal-overlay: rgba(240, 244, 248, 0.85);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000; --text-main: #e2e2e6; --text-muted: #8e9189;
                --accent: #a8c7fa; --border: #222427; --input-bg: #111315;
                --modal-overlay: rgba(0, 0, 0, 0.95);
            }
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #8884; border-radius: 20px; border: 2px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px 24px; scroll-behavior: smooth; }
        
        .editor-wrapper { max-width: 720px; margin: 0 auto; }
        .nav-back { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: var(--input-bg); border-radius: 12px; cursor: pointer; margin-bottom: 24px; border: 1px solid var(--border); transition: 0.2s; }
        .nav-back:hover { transform: translateX(-4px); background: var(--accent); color: #000; }
        
        .section-title { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-top: 32px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; letter-spacing: 1px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
        .form-control { width: 100%; background: var(--input-bg); border: 1px solid transparent; border-radius: 12px; padding: 12px 16px; font-size: 14px; color: var(--text-main); outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--accent); background: var(--bg-main); box-shadow: 0 0 0 4px rgba(0, 97, 255, 0.1); }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; background: var(--input-bg); padding: 8px; border-radius: 12px; border: 1px solid transparent; min-height: 48px; align-items: center; }
        .tag-item { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .tag-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text-main); font-size: 14px; min-width: 120px; padding: 4px; }

        .eks-tag { background: var(--input-bg); border: 1px solid var(--border); padding: 12px 16px; border-radius: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .eks-tag:hover { border-color: var(--accent); }

        /* --- Modal System --- */
        .modal { position: fixed; inset: 0; background: var(--modal-overlay); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-card { background: var(--bg-main); width: 100%; max-width: 400px; border-radius: 28px; padding: 32px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.1); transform: scale(0.95); transition: 0.3s; }
        .modal.active .modal-card { transform: scale(1); }

        .btn-save-main { background: var(--accent); color: #000; padding: 14px 32px; border-radius: 30px; font-size: 13px; font-weight: 800; cursor: pointer; border: none; transition: 0.3s; }
        .btn-save-main:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 97, 255, 0.2); }

        .loader-full { position: fixed; inset: 0; background: var(--bg-main); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .loader-full.active { display: flex; }

        #toast-container { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: #1a1c1e; color: white; padding: 12px 24px; border-radius: 16px; font-size: 12px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        @keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .status-msg { font-size: 10px; font-weight: 700; margin-top: 4px; display: none; }
        .status-msg.error { display: block; color: #ff453a; }
        .status-msg.success { display: block; color: #32d74b; }
        .input-error { border-color: #ff453a !important; }
    </style>
</head>
<body>

<div id="toast-container"></div>
<div id="loader" class="loader-full"><i class="fa-solid fa-circle-notch fa-spin text-blue-500 text-3xl"></i></div>

<div id="eksModal" class="modal">
    <div class="modal-card">
        <h3 class="font-extrabold text-lg mb-6 tracking-tight">Detail Eksemplar</h3>
        <div class="form-group">
            <label>Barcode / Kode Eksemplar</label>
            <input type="text" id="m_kode" class="form-control" placeholder="Contoh: B00123">
            <div id="m_kode_msg" class="status-msg"></div>
        </div>
        <div class="form-group">
            <label>Nomor Panggil</label>
            <input type="text" id="m_panggil" class="form-control">
        </div>
        <div class="form-group">
            <label>Lokasi Rak</label>
            <input type="text" id="m_rak" class="form-control">
        </div>
        <div class="flex justify-end gap-3 mt-8">
            <button type="button" onclick="closeModal('eksModal')" class="px-5 py-2 text-xs font-bold text-muted">Batal</button>
            <button type="button" id="btnSaveEks" onclick="saveEks()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-xs">Simpan</button>
        </div>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-card max-w-[340px] text-center">
        <div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-trash-can text-xl"></i>
        </div>
        <h3 class="font-extrabold text-lg mb-2">Hapus Koleksi?</h3>
        <p class="text-sm text-muted mb-8 leading-relaxed">Tindakan ini permanen. Seluruh data eksemplar juga akan dihapus.</p>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="closeModal('confirmModal')" class="bg-zinc-100 dark:bg-zinc-900 py-3 rounded-2xl font-bold text-xs">Batal</button>
            <button id="btnConfirmDelete" class="bg-red-500 text-white py-3 rounded-2xl font-bold text-xs">Ya, Hapus</button>
        </div>
    </div>
</div>

<div class="editor-wrapper">
    <div class="nav-back" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i></div>
    
    <form id="biblioForm">
        <div class="section-title" style="margin-top: 0;">Informasi Dasar</div>
        <div class="form-group">
            <label>Judul Koleksi</label>
            <input type="text" id="f_judul" class="form-control" required placeholder="Masukkan judul lengkap...">
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6">
            <div class="form-group"><label>Penulis</label><input type="text" id="f_penulis" class="form-control"></div>
            <div class="form-group"><label>Penerbit</label><input type="text" id="f_penerbit" class="form-control"></div>
            <div class="form-group"><label>Tahun Terbit</label><input type="text" id="f_tahun" class="form-control"></div>
            <div class="form-group"><label>ISBN / ISSN</label><input type="text" id="f_isbn" class="form-control"></div>
            
            <div class="form-group">
                <label>Kategori Utama</label>
                <input type="text" id="f_kategori" class="form-control" list="kategoriList" placeholder="Pilih atau ketik baru...">
                <datalist id="kategoriList">
                    </datalist>
            </div>
            
            <div class="form-group"><label>Deskripsi Fisik</label><input type="text" id="f_fisik" class="form-control"></div>
        </div>

        <div class="form-group">
            <label>Topik (Tekan Enter)</label>
            <div class="tag-container" id="topikWrapper">
                <input type="text" id="f_topik_input" class="tag-input" placeholder="Sejarah, Agama, Teknik...">
            </div>
        </div>

        <div class="form-group">
            <label>URL Sampul Buku</label>
            <input type="url" id="f_sampul" class="form-control" placeholder="https://...">
        </div>

        <div class="form-group">
            <label>Abstrak / Catatan</label>
            <textarea id="f_abstrak" class="form-control" rows="4"></textarea>
        </div>

        <div class="section-title">Unit Eksemplar</div>
        <div id="eksList" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4"></div>
        <button type="button" onclick="openModal('eksModal')" class="text-[11px] font-black text-blue-500 uppercase tracking-wider hover:underline">+ Tambah Eksemplar</button>

        <div class="mt-16 pt-8 border-t border-slate-100 dark:border-zinc-900 flex items-center justify-between">
            <span id="btnDelete" class="text-red-500 text-[10px] font-black uppercase cursor-pointer hidden transition-opacity hover:opacity-70" onclick="askDelete()">Hapus Koleksi</span>
            <button type="submit" class="btn-save-main">Simpan Perubahan</button>
        </div>
    </form>
</div>

<script type="module">
    import { supabase } from './supa/supa.js';

    let editId = sessionStorage.getItem('editBiblioId'); 
    let eksemplars = [];
    let topics = [];
    let editingEksIndex = null;
    let barcodeValid = true;
    let typingTimer;

    // --- TOAST & MODAL HELPERS ---
    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    window.openModal = (id, index = null) => {
        if(id === 'eksModal') setupEksModal(index);
        document.getElementById(id).classList.add('active');
    };

    window.closeModal = (id) => document.getElementById(id).classList.remove('active');

    window.goBack = () => {
        sessionStorage.removeItem('editBiblioId');
        window.location.href = 'bibliografi.html';
    };

    // --- KATEGORI SUGGESTION ---
    async function loadCategorySuggestions() {
        try {
            const { data } = await supabase.from('biblio').select('kategori');
            if (data) {
                const uniqueCats = [...new Set(data.map(i => i.kategori).filter(Boolean))];
                const list = document.getElementById('kategoriList');
                list.innerHTML = uniqueCats.map(c => `<option value="${c}">`).join('');
            }
        } catch (e) { console.error("Gagal muat kategori", e); }
    }

    // --- BARCODE REALTIME CHECK ---
    const mKodeInput = document.getElementById('m_kode');
    const mKodeMsg = document.getElementById('m_kode_msg');
    const btnSaveEks = document.getElementById('btnSaveEks');

    mKodeInput.addEventListener('input', () => {
        clearTimeout(typingTimer);
        mKodeMsg.innerText = 'Checking...';
        typingTimer = setTimeout(checkBarcode, 600);
    });

    async function checkBarcode() {
        const kode = mKodeInput.value.trim();
        if (!kode) return mKodeMsg.innerText = '';

        // Cek lokal
        const isDupLocal = eksemplars.some((e, i) => e.kode === kode && i !== editingEksIndex);
        if (isDupLocal) return setBarcodeStatus(false, "Sudah ada di daftar");

        // Cek DB
        const { data } = await supabase.from('eksemplar').select('biblio_id').eq('kode', kode).maybeSingle();
        if (data && data.biblio_id !== editId) setBarcodeStatus(false, "Sudah dipakai koleksi lain");
        else setBarcodeStatus(true, "Barcode tersedia");
    }

    function setBarcodeStatus(valid, msg) {
        barcodeValid = valid;
        mKodeMsg.innerText = msg;
        mKodeMsg.className = `status-msg ${valid ? 'success' : 'error'}`;
        mKodeInput.classList.toggle('input-error', !valid);
        btnSaveEks.disabled = !valid;
        btnSaveEks.style.opacity = valid ? '1' : '0.5';
    }

    // --- EKSEMPLAR LOGIC ---
    function setupEksModal(index) {
        editingEksIndex = index;
        setBarcodeStatus(true, '');
        if (index !== null) {
            const e = eksemplars[index];
            document.getElementById('m_kode').value = e.kode;
            document.getElementById('m_panggil').value = e.nomor_panggil || '';
            document.getElementById('m_rak').value = e.lokasi_rak || '';
        } else {
            document.querySelectorAll('#eksModal input').forEach(i => i.value = '');
        }
    }

    window.saveEks = () => {
        if(!barcodeValid) return;
        const kode = document.getElementById('m_kode').value.trim();
        if(!kode) return showToast("Barcode wajib diisi");

        const data = { 
            kode, 
            nomor_panggil: document.getElementById('m_panggil').value, 
            lokasi_rak: document.getElementById('m_rak').value,
            status: 'Tersedia'
        };

        if (editingEksIndex !== null) eksemplars[editingEksIndex] = data;
        else eksemplars.push(data);
        
        closeModal('eksModal');
        renderEksemplar();
    };

    window.deleteEks = (index) => {
        eksemplars.splice(index, 1);
        renderEksemplar();
    };

    function renderEksemplar() {
        const list = document.getElementById('eksList');
        list.innerHTML = eksemplars.map((e, i) => `
            <div class="eks-tag" onclick="openModal('eksModal', ${i})">
                <div class="flex-1">
                    <div class="text-[11px] font-black uppercase text-blue-500">${e.kode}</div>
                    <div class="text-[10px] text-muted font-bold mt-0.5">${e.nomor_panggil || 'Tanpa No. Panggil'}</div>
                </div>
                <button type="button" onclick="event.stopPropagation(); deleteEks(${i})" class="text-red-400 hover:text-red-600 transition-colors">
                    <i class="fa-solid fa-circle-xmark"></i>
                </button>
            </div>
        `).join('');
    }

    // --- TOPIC SYSTEM ---
    const topikInput = document.getElementById('f_topik_input');
    const topikWrapper = document.getElementById('topikWrapper');

    topikInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const val = topikInput.value.trim();
            if (val && !topics.includes(val)) {
                topics.push(val);
                renderTopics();
                topikInput.value = '';
            }
        }
    });

    function renderTopics() {
        topikWrapper.querySelectorAll('.tag-item').forEach(tag => tag.remove());
        topics.forEach((topic, index) => {
            const tag = document.createElement('div');
            tag.className = 'tag-item';
            tag.innerHTML = `${topic} <i class="fa-solid fa-xmark cursor-pointer"></i>`;
            tag.querySelector('i').onclick = () => { topics.splice(index, 1); renderTopics(); };
            topikWrapper.insertBefore(tag, topikInput);
        });
    }

    // --- MAIN CRUD ---
    if (editId) loadDetail();
    loadCategorySuggestions();

    async function loadDetail() {
        document.getElementById('loader').classList.add('active');
        const { data: bib } = await supabase.from('biblio').select('*').eq('id', editId).single();
        if (bib) {
            document.getElementById('btnDelete').classList.remove('hidden');
            document.getElementById('f_judul').value = bib.judul || '';
            document.getElementById('f_penulis').value = bib.penulis || '';
            document.getElementById('f_penerbit').value = bib.penerbit || '';
            document.getElementById('f_tahun').value = bib.tahun_terbit || '';
            document.getElementById('f_isbn').value = bib.isbn_issn || '';
            document.getElementById('f_kategori').value = bib.kategori || '';
            document.getElementById('f_fisik').value = bib.deskripsi_fisik || '';
            document.getElementById('f_sampul').value = bib.sampul_url || '';
            document.getElementById('f_abstrak').value = bib.abstrak || '';
            topics = Array.isArray(bib.topik) ? bib.topik : [];
            renderTopics();
            const { data: eks } = await supabase.from('eksemplar').select('*').eq('biblio_id', editId);
            eksemplars = eks || [];
            renderEksemplar();
        }
        document.getElementById('loader').classList.remove('active');
    }

    document.getElementById('biblioForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader').classList.add('active');
        
        const payload = {
            judul: document.getElementById('f_judul').value,
            penulis: document.getElementById('f_penulis').value,
            penerbit: document.getElementById('f_penerbit').value,
            tahun_terbit: document.getElementById('f_tahun').value,
            isbn_issn: document.getElementById('f_isbn').value,
            kategori: document.getElementById('f_kategori').value,
            deskripsi_fisik: document.getElementById('f_fisik').value,
            sampul_url: document.getElementById('f_sampul').value,
            abstrak: document.getElementById('f_abstrak').value,
            topik: topics,
            updated_at: new Date()
        };

        let result;
        if (editId) {
            result = await supabase.from('biblio').update(payload).eq('id', editId);
        } else {
            result = await supabase.from('biblio').insert([payload]).select();
            if (!result.error) editId = result.data[0].id;
        }

        if (!result.error) {
            await supabase.from('eksemplar').delete().eq('biblio_id', editId);
            if (eksemplars.length > 0) {
                const eksReady = eksemplars.map(ek => {
                    const { id, created_at, ...clean } = ek;
                    return { ...clean, biblio_id: editId };
                });
                await supabase.from('eksemplar').insert(eksReady);
            }
            showToast("Berhasil Disimpan");
            setTimeout(goBack, 1000);
        } else {
            showToast("Gagal menyimpan");
            document.getElementById('loader').classList.remove('active');
        }
    };

    window.askDelete = () => openModal('confirmModal');

    document.getElementById('btnConfirmDelete').onclick = async () => {
        closeModal('confirmModal');
        document.getElementById('loader').classList.add('active');
        const { error } = await supabase.from('biblio').delete().eq('id', editId);
        if (!error) {
            showToast("Koleksi dihapus");
            setTimeout(goBack, 1000);
        } else {
            showToast("Gagal menghapus");
            document.getElementById('loader').classList.remove('active');
        }
    };
</script>
</body>
</html>
