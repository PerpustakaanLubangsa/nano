<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detail Sirkulasi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: #121212;
            --text-main: #e3e3e3;
            --text-sub: #9aa0a6;
            --brand: #8ab4f8;
            --border: #303134;
            --input-bg: #1e1f20;
            --danger: #f28b82;
            --tag-bg: rgba(138, 180, 248, 0.15);
            --success: #00c853;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden;
        }
        .app-container { width: 100%; max-width: 420px; padding: 12px; }
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .section-title { font-size: 10px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
        .main-val { font-size: 18px; font-weight: 700; color: var(--text-main); line-height: 1.3; }
        .sub-val { font-size: 13px; font-weight: 600; color: var(--brand); }
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .tag { padding: 4px 10px; background: var(--tag-bg); color: var(--brand); font-size: 10px; font-weight: 700; border-radius: 8px; }
        .status-badge { padding: 6px 14px; border-radius: 100px; font-size: 10px; font-weight: 800; color: #000; }
        .action-area { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
        .btn {
            width: 100%; padding: 14px; border-radius: 100px;
            font-family: inherit; font-size: 14px; font-weight: 700;
            cursor: pointer; border: none; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--brand); color: #000; }
        .btn-secondary { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--border); }
        .hidden { display: none !important; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .modal-content { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 24px; padding: 28px; width: 100%; max-width: 340px; text-align: center; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--brand); color: #000; padding: 12px 24px; border-radius: 100px; font-size: 13px; font-weight: 700; z-index: 2000; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loader" class="card">
        <div style="height: 20px; background: var(--input-bg); border-radius: 6px; width: 40%;"></div>
        <div style="height: 60px; background: var(--input-bg); border-radius: 6px; width: 100%;"></div>
    </div>

    <div id="content" class="card hidden">
        <div id="successMsg" class="hidden" style="text-align: center; background: var(--tag-bg); padding: 10px; border-radius: 12px; border: 1px solid var(--brand); margin-bottom: 8px;">
            <p id="msgText" style="font-size: 11px; font-weight: 800; color: var(--brand);">DETAIL TRANSAKSI</p>
        </div>

        <div class="data-group">
            <span class="section-title">Peminjam</span>
            <p id="detNama" class="main-val">-</p>
            <p id="detNis" class="sub-val">-</p>
            <div id="memberTags" class="tag-container"></div>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border);">

        <div class="data-group">
            <span class="section-title">Buku</span>
            <p id="detJudul" class="main-val">-</p>
            <p id="detKode" class="sub-val">-</p>
            <div id="bookTags" class="tag-container"></div>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border);">

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="data-group">
                <span class="section-title">Informasi</span>
                <p id="detTempo" style="font-size: 15px; font-weight: 700; color: var(--brand);">Memuat...</p>
            </div>
            <div id="detStatus" class="status-badge">-</div>
        </div>

        <div id="preAction" class="action-area">
            <button id="btnKonfirmasi" class="btn btn-primary">Konfirmasi Pinjaman</button>
            <button onclick="goBack()" class="btn btn-secondary">Kembali</button>
        </div>

        <div id="postAction" class="action-area hidden">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button id="btnPerpanjang" class="btn btn-secondary">Perpanjang</button>
                <button id="btnKembalikan" class="btn btn-danger">Kembalikan</button>
            </div>
            <button onclick="goBack()" class="btn btn-primary">Selesai</button>
        </div>
    </div>
</div>

<div id="customModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom: 12px;">Konfirmasi</h3>
        <p id="modalBody" style="color: var(--text-sub); margin-bottom: 24px;">Lanjutkan aksi ini?</p>
        <div style="display: flex; gap: 10px;">
            <button id="modalCancel" class="btn btn-secondary">Batal</button>
            <button id="modalConfirm" class="btn btn-primary">Ya, Lanjut</button>
        </div>
    </div>
</div>

<script type="module">
    import { supabase as client } from './supa/supa.js';

    let state = { member: null, book: null, sirkulasiId: null };
    let modalCallback = null;

    async function loadDetail() {
        const sessionData = sessionStorage.getItem('pending_loan');
        if (!sessionData) { window.location.href = 'sirkulasi.html'; return; }
        const payload = JSON.parse(sessionData);

        // 1. Fetch data segar via RPC Search agar sinkron
        const { data: memberRes } = await client.rpc('sirkulasi_search_handler', { p_mode: 'MEMBER', p_query: payload.member.subtitle });
        const { data: bookRes } = await client.rpc('sirkulasi_search_handler', { p_mode: 'BOOK', p_query: payload.book.subtitle });

        if (!memberRes?.[0] || !bookRes?.[0]) return goBack();

        state.member = memberRes[0];
        state.book = bookRes[0];

        // 2. Render Dasar
        document.getElementById('detNama').innerText = state.member.title;
        document.getElementById('detNis').innerText = state.member.subtitle;
        document.getElementById('memberTags').innerHTML = `<span class="tag">${state.member.tag1}</span><span class="tag">${state.member.tag2}</span>`;
        
        document.getElementById('detJudul').innerText = state.book.title;
        document.getElementById('detKode').innerText = state.book.subtitle;
        document.getElementById('bookTags').innerHTML = `<span class="tag">${state.book.tag1}</span><span class="tag">${state.book.tag2}</span>`;

        // 3. LOGIKA PEMBEDA: Cek apakah buku yang dibuka adalah buku yang sedang dipinjam
        const isCurrentlyBorrowed = state.member.active_loan_code === state.book.subtitle;
        
        if (isCurrentlyBorrowed) {
            // MODE: SUDAH DIPINJAM (Tampilkan tombol Perpanjang/Kembali)
            state.sirkulasiId = state.member.active_loan_id;
            document.getElementById('detTempo').innerText = "Sedang Dipinjam";
            document.getElementById('detStatus').innerText = "DIPINJAM";
            document.getElementById('detStatus').style.background = "var(--brand)";
            showSuccessState(true);
        } else {
            // MODE: AKAN DIPINJAM (Tampilkan tombol Konfirmasi)
            const isAvailable = state.book.status_label?.toLowerCase() === 'tersedia';
            document.getElementById('detStatus').innerText = (state.book.status_label || "TERSEDIA").toUpperCase();
            document.getElementById('detStatus').style.background = isAvailable ? "var(--success)" : "var(--danger)";
            document.getElementById('btnKonfirmasi').disabled = !isAvailable;
            
            const t = new Date(); t.setDate(t.getDate() + 4);
            document.getElementById('detTempo').innerText = "Tempo: " + t.toISOString().split('T')[0];
        }

        document.getElementById('loader').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
    }

    async function runAction(actionType) {
        const { data, error } = await client.rpc('sirkulasi_action_handler', {
            p_action: actionType,
            p_member_id: state.member.id,
            p_book_code: state.book.subtitle,
            p_sirkulasi_id: state.sirkulasiId
        });

        if (error) {
            alert("Error: " + error.message);
        } else {
            if (actionType === 'CONFIRM') {
                state.sirkulasiId = data.id;
                document.getElementById('detTempo').innerText = "Jatuh Tempo: " + data.due_date;
                showSuccessState(false);
            } else if (actionType === 'RETURN') {
                window.location.href = 'sirkulasi.html';
            } else if (actionType === 'EXTEND') {
                document.getElementById('detTempo').innerText = "Perpanjang: " + data.due_date;
                closeModal();
            }
        }
    }

    function showSuccessState(isDirect) {
        document.getElementById('successMsg').classList.remove('hidden');
        document.getElementById('msgText').innerText = isDirect ? 'PINJAMAN AKTIF' : '✓ BERHASIL';
        document.getElementById('preAction').classList.add('hidden');
        document.getElementById('postAction').classList.remove('hidden');
    }

    // Modal & Event Listeners
    function showConfirm(title, body, cb) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerText = body;
        document.getElementById('customModal').classList.remove('hidden');
        modalCallback = cb;
    }

    function closeModal() { document.getElementById('customModal').classList.add('hidden'); }
    window.goBack = () => window.location.href = 'sirkulasi.html';

    document.getElementById('btnKonfirmasi').onclick = () => runAction('CONFIRM');
    document.getElementById('btnKembalikan').onclick = () => showConfirm("Kembalikan", "Buku sudah diterima kembali?", () => runAction('RETURN'));
    document.getElementById('btnPerpanjang').onclick = () => showConfirm("Perpanjang", "Tambah masa pinjam 4 hari?", () => runAction('EXTEND'));
    document.getElementById('modalCancel').onclick = closeModal;
    document.getElementById('modalConfirm').onclick = () => modalCallback && modalCallback();

    loadDetail();
</script>
</body>
</html>
