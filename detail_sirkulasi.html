<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detail Sirkulasi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #000000;
            --bg-surface: rgba(30, 31, 32, 0.85);
            --text-main: #e3e3e3;
            --text-sub: #9aa0a6;
            --brand: #8ab4f8;
            --border: #3c4043;
            --input-bg: #202124;
            --danger: #f28b82;
            --tag-bg: rgba(138, 180, 248, 0.15);
            --success: #81c995;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-page);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                              url('https://i.pinimg.com/originals/c6/a1/c9/c6a1c9f91f82c3fe5af6c5d83cc0bf7e.gif');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        .app-container { width: 100%; max-width: 420px; padding: 16px; z-index: 10; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .section-title { font-size: 10px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.5px; }
        .main-val { font-size: 20px; font-weight: 700; color: var(--text-main); line-height: 1.2; margin-top: 4px; }
        .sub-val { font-size: 13px; font-weight: 600; color: var(--brand); margin-top: 2px; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag { padding: 5px 12px; background: var(--tag-bg); color: var(--brand); font-size: 10px; font-weight: 700; border-radius: 10px; border: 1px solid rgba(138, 180, 248, 0.2); }
        
        .status-badge { padding: 6px 14px; border-radius: 100px; font-size: 10px; font-weight: 800; color: #000; text-transform: uppercase; }
        
        .action-area { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        
        .btn {
            width: 100%; padding: 16px; border-radius: 100px;
            font-family: inherit; font-size: 14px; font-weight: 800;
            cursor: pointer; border: none; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--brand); color: #000; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text-main); border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); color: #000; }

        .hidden { display: none !important; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; backdrop-filter: blur(8px);
        }
        .modal-content { background: #1e1f20; border: 1px solid var(--border); border-radius: 32px; padding: 35px; width: 100%; max-width: 340px; text-align: center; }
        .denda-box { 
            background: rgba(242, 139, 130, 0.15); 
            border: 1px solid var(--danger); 
            padding: 16px; border-radius: 20px; margin-top: 5px;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .pulse { animation: pulseAnim 1.5s infinite; background: var(--input-bg); border-radius: 8px; }
        @keyframes pulseAnim { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loader" class="card">
        <div class="pulse" style="height: 20px; width: 40%;"></div>
        <div class="pulse" style="height: 60px; width: 100%;"></div>
        <div class="pulse" style="height: 100px; width: 100%;"></div>
    </div>

    <div id="content" class="card hidden">
        <div id="statusHeader" class="hidden" style="text-align: center; background: rgba(138, 180, 248, 0.1); padding: 12px; border-radius: 16px; border: 1px solid var(--brand); margin-bottom: 5px;">
            <p id="statusHeaderText" style="font-size: 11px; font-weight: 800; color: var(--brand); letter-spacing: 1px;">PINJAMAN AKTIF</p>
        </div>

        <div class="data-group">
            <span class="section-title">Peminjam</span>
            <p id="detNama" class="main-val">-</p>
            <p id="detNis" class="sub-val">-</p>
            <div id="memberTags" class="tag-container"></div>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border);">

        <div class="data-group">
            <span class="section-title">Buku</span>
            <p id="detJudul" class="main-val">-</p>
            <p id="detKode" class="sub-val">-</p>
            <div id="bookTags" class="tag-container"></div>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border);">

        <div id="infoSirkulasi">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div class="data-group">
                    <span class="section-title" id="labelTempo">Estimasi Kembali</span>
                    <p id="detTempo" style="font-size: 16px; font-weight: 700; color: var(--brand); margin-top: 4px;">-</p>
                </div>
                <div id="detStatus" class="status-badge">-</div>
            </div>
            
            <div id="dendaArea" class="denda-box hidden">
                <span class="section-title" style="color: var(--danger);">⚠ TERLAMBAT</span>
                <p id="teksDenda" style="color: var(--danger); font-size: 15px; font-weight: 800; margin-top:6px;">Rp 0</p>
            </div>
        </div>

        <div id="preAction" class="action-area">
            <button id="btnKonfirmasi" class="btn btn-primary">Konfirmasi Pinjaman</button>
            <button onclick="goBack()" class="btn btn-secondary">Kembali</button>
        </div>

        <div id="postAction" class="action-area hidden">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button id="btnPerpanjang" class="btn btn-secondary">Perpanjang</button>
                <button id="btnKembalikan" class="btn btn-danger">Kembalikan</button>
            </div>
            <button onclick="goBack()" class="btn btn-primary">Selesai</button>
        </div>
    </div>
</div>

<div id="customModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom: 12px; font-weight: 800;">Konfirmasi</h3>
        <p id="modalBody" style="color: var(--text-sub); margin-bottom: 28px; font-size: 14px; line-height: 1.5;">Lanjutkan aksi ini?</p>
        <div style="display: flex; gap: 12px;">
            <button id="modalCancel" class="btn btn-secondary" style="flex: 1;">Batal</button>
            <button id="modalConfirm" class="btn btn-primary" style="flex: 1;">Lanjut</button>
        </div>
    </div>
</div>

<script type="module">
    import { supabase as client } from './supa/supa.js';

    let state = { member: null, book: null, sirkulasi: null, mode: 'NEW' };
    let modalCallback = null;

    async function init() {
        const sessionData = sessionStorage.getItem('pending_loan');
        if (!sessionData) return goBack();
        const payload = JSON.parse(sessionData);

        try {
            const [mRes, bRes] = await Promise.all([
                client.from('anggota').select('*').eq('id', payload.member.id).single(),
                client.from('eksemplar').select('*, biblio!eksemplar_biblio_id_fkey(*)').eq('kode', payload.book.subtitle).single()
            ]);

            if (mRes.error || bRes.error) throw new Error("Gagal ambil data");
            state.member = mRes.data;
            state.book = bRes.data;

            if (payload.sirkulasi_id) {
                const { data: sData } = await client.from('sirkulasi').select('*').eq('id', payload.sirkulasi_id).single();
                if (sData) {
                    state.sirkulasi = sData;
                    state.mode = 'EXISTING';
                }
            }

            renderUI();
        } catch (e) {
            console.error(e);
            alert("Error: Data tidak ditemukan.");
            goBack();
        }
    }

    function renderUI() {
        document.getElementById('detNama').innerText = state.member.nama;
        document.getElementById('detNis').innerText = state.member.nis;
        document.getElementById('memberTags').innerHTML = `
            <span class="tag">${state.member.jenjang}</span>
            <span class="tag">${state.member.kamar || state.member.organisasi || '-'}</span>
        `;

        document.getElementById('detJudul').innerText = state.book.biblio.judul;
        document.getElementById('detKode').innerText = state.book.kode;
        document.getElementById('bookTags').innerHTML = `
            <span class="tag">${state.book.biblio.penulis || '-'}</span>
            <span class="tag">${state.book.status}</span>
        `;

        // Sembunyikan denda secara default setiap render
        document.getElementById('dendaArea').classList.add('hidden');

        if (state.mode === 'EXISTING') {
            document.getElementById('statusHeader').classList.remove('hidden');
            document.getElementById('preAction').classList.add('hidden');
            document.getElementById('postAction').classList.remove('hidden');
            document.getElementById('detStatus').innerText = 'DIPINJAM';
            document.getElementById('detStatus').style.background = 'var(--brand)';
            document.getElementById('labelTempo').innerText = 'Batas Kembali';

            const tglPinjam = new Date(state.sirkulasi.tgl_pinjam);
            const tglTempo = new Date(tglPinjam);
            tglTempo.setDate(tglTempo.getDate() + 4);
            
            document.getElementById('detTempo').innerText = tglTempo.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });

            const hariIni = new Date();
            hariIni.setHours(0,0,0,0);
            tglTempo.setHours(0,0,0,0);

            if (hariIni > tglTempo) {
                const diffTime = Math.abs(hariIni - tglTempo);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const denda = diffDays * 1000;
                document.getElementById('dendaArea').classList.remove('hidden');
                document.getElementById('teksDenda').innerText = `Terlambat ${diffDays} Hari (Rp ${denda.toLocaleString('id-ID')})`;
            }
        } else {
            document.getElementById('statusHeader').classList.add('hidden');
            document.getElementById('preAction').classList.remove('hidden');
            document.getElementById('postAction').classList.add('hidden');
            document.getElementById('detStatus').innerText = 'TERSEDIA';
            document.getElementById('detStatus').style.background = 'var(--success)';
            document.getElementById('labelTempo').innerText = 'Estimasi Kembali';
            
            const estBack = new Date();
            estBack.setDate(estBack.getDate() + 4);
            document.getElementById('detTempo').innerText = estBack.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
        }

        document.getElementById('loader').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
    }

    async function prosesPinjam() {
        const { data, error } = await client.from('sirkulasi').insert([{
            member_id: state.member.id,
            biblio_id: state.book.biblio.id,
            nis: state.member.nis,
            nama_anggota: state.member.nama,
            kamar: state.member.kamar || state.member.organisasi,
            kode_eksemplar: state.book.kode,
            judul_buku: state.book.biblio.judul,
            penulis: state.book.biblio.penulis,
            tgl_pinjam: new Date().toISOString().split('T')[0],
            status: 'DIPINJAM'
        }]).select().single();

        if (error) return alert("Error: " + error.message);

        await client.from('eksemplar').update({ status: 'Dipinjam' }).eq('id', state.book.id);
        
        // Simpan sirkulasi_id ke sessionStorage agar jika di-refresh tidak error
        const sessionData = JSON.parse(sessionStorage.getItem('pending_loan'));
        sessionData.sirkulasi_id = data.id;
        sessionStorage.setItem('pending_loan', JSON.stringify(sessionData));

        state.sirkulasi = data;
        state.mode = 'EXISTING';
        renderUI();
    }

    async function prosesKembali() {
        await client.from('sirkulasi').update({ 
            status: 'KEMBALI', 
            tgl_kembali: new Date().toISOString().split('T')[0] 
        }).eq('id', state.sirkulasi.id);

        await client.from('eksemplar').update({ status: 'Tersedia' }).eq('kode', state.book.kode);
        goBack();
    }

    async function prosesPerpanjang() {
        const tglBaru = new Date().toISOString().split('T')[0];
        const { data, error } = await client.from('sirkulasi')
            .update({ tgl_pinjam: tglBaru })
            .eq('id', state.sirkulasi.id)
            .select()
            .single();

        if (error) return alert("Gagal: " + error.message);
        
        // UPDATE STATE LOKAL & RENDER ULANG (Tanpa reload)
        state.sirkulasi = data;
        renderUI();
        alert("Berhasil diperpanjang!");
    }

    function showConfirm(title, body, cb) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerText = body;
        document.getElementById('customModal').classList.remove('hidden');
        modalCallback = cb;
    }

    document.getElementById('btnKonfirmasi').onclick = () => showConfirm("Konfirmasi Pinjam", "Proses peminjaman buku ini?", prosesPinjam);
    document.getElementById('btnKembalikan').onclick = () => showConfirm("Kembalikan Buku", "Selesaikan transaksi peminjaman?", prosesKembali);
    document.getElementById('btnPerpanjang').onclick = () => showConfirm("Perpanjang", "Masa pinjam akan diperbarui (4 hari dari sekarang).", prosesPerpanjang);
    
    document.getElementById('modalCancel').onclick = () => document.getElementById('customModal').classList.add('hidden');
    document.getElementById('modalConfirm').onclick = () => {
        document.getElementById('customModal').classList.add('hidden');
        if(modalCallback) modalCallback();
    };

    window.goBack = () => {
        sessionStorage.removeItem('pending_loan');
        window.location.href = 'sirkulasi.html';
    };

    init();
</script>
</body>
</html>
