<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Intel - Performance Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dark-bg: #0f172a; --dark-card: #1e293b; --accent: #3b82f6; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        body { 
            background: #0f172a; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #f1f5f9; 
            min-height: 100vh; 
            overflow-x: hidden;
            /* Mengurangi beban render gradient kompleks */
        }
        
        /* OPTIMASI: Menghapus backdrop-filter blur karena sangat berat bagi GPU */
        .glass-card { 
            background: rgba(30, 41, 59, 0.95); 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            contain: content; /* Memberitahu browser untuk mengisolasi render elemen ini */
        }

        .stat-bar-card { padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .chart-label { font-size: 8px; font-weight: 800; text-transform: uppercase; color: #64748b; letter-spacing: 0.1em; margin-bottom: 10px; text-align: center; }

        /* OPTIMASI: Snow effect menggunakan CSS Animation (Hardware Accelerated) */
        .snow-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; overflow: hidden;
        }
        .snow {
            position: absolute; top: -10px; color: white; opacity: 0.2;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(105vh); }
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="snow-container" id="snow-box"></div>

    <div class="max-w-7xl mx-auto relative z-10">
        <header class="mb-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-snowflake"></i></div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight">Library Intel</h1>
                    <p id="currentDateDisplay" class="text-slate-500 font-bold uppercase text-[8px] tracking-[0.2em]"></p>
                </div>
            </div>
            <button onclick="location.href='arsip-pengunjung.html'" class="bg-white/5 hover:bg-blue-600 border border-white/10 px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition-all">Buka Arsip</button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
            <div class="glass-card stat-bar-card"><i class="fa-solid fa-users text-blue-400"></i><div><p class="text-[7px] text-slate-500 font-black uppercase">Hari Ini</p><h2 id="todayVisit" class="text-lg font-black">0</h2></div></div>
            <div class="glass-card stat-bar-card"><i class="fa-solid fa-user-check text-indigo-400"></i><div><p class="text-[7px] text-slate-500 font-black uppercase">Pinjam Aktif</p><h2 id="activeSirkulasi" class="text-lg font-black">0</h2></div></div>
            <div class="glass-card stat-bar-card"><i class="fa-solid fa-calendar-check text-emerald-400"></i><div><p class="text-[7px] text-slate-500 font-black uppercase">Bulan Ini</p><h2 id="monthVisit" class="text-lg font-black">0</h2></div></div>
            <div class="glass-card stat-bar-card"><i class="fa-solid fa-chart-line text-amber-400"></i><div><p class="text-[7px] text-slate-500 font-black uppercase">Tahun Ini</p><h2 id="yearVisit" class="text-lg font-black">0</h2></div></div>
            <div class="glass-card stat-bar-card"><i class="fa-solid fa-book text-rose-400"></i><div><p class="text-[7px] text-slate-500 font-black uppercase">Total Koleksi</p><h2 id="totalKoleksi" class="text-lg font-black">0</h2></div></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 space-y-6">
                <div class="glass-card p-5 h-[260px]">
                    <h3 class="chart-label">Tren Aktivitas Pengunjung Tahunan</h3>
                    <div class="relative h-[200px]"><canvas id="annualChart"></canvas></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="glass-card p-4 h-[220px]">
                        <h3 class="chart-label">Aktivitas Bulan Ini</h3>
                        <div class="relative h-[160px]"><canvas id="donutChart"></canvas></div>
                    </div>
                    <div class="glass-card p-4 h-[220px]">
                        <h3 class="chart-label">Aktivitas per Jenjang</h3>
                        <div class="relative h-[160px]"><canvas id="stackedBarChart"></canvas></div>
                    </div>
                    <div class="glass-card p-4 h-[220px]">
                        <h3 class="chart-label">Top Kategori Buku</h3>
                        <div class="relative h-[160px]"><canvas id="categoryBarChart"></canvas></div>
                    </div>
                </div>
            </div>

            <div class="glass-card p-5">
                <h3 class="chart-label border-b border-white/5 pb-2">Top 10 Pemustaka</h3>
                <div id="topRank" class="space-y-2 mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);
        const now = new Date();

        document.getElementById('currentDateDisplay').innerText = now.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

        // OPTIMASI: CSS-based Snow (Lebih ringan dari Canvas API)
        function createSnow() {
            const container = document.getElementById('snow-box');
            for (let i = 0; i < 20; i++) {
                const flake = document.createElement('div');
                flake.className = 'snow';
                flake.innerHTML = '•';
                flake.style.left = Math.random() * 100 + '%';
                flake.style.animationDuration = (Math.random() * 3 + 2) + 's';
                flake.style.animationDelay = Math.random() * 5 + 's';
                flake.style.fontSize = (Math.random() * 10 + 5) + 'px';
                container.appendChild(flake);
            }
        }
        createSnow();

        // Konfigurasi Global Chart.js untuk performa
        Chart.defaults.animation = false; // Matikan animasi global
        Chart.defaults.elements.line.tension = 0; // Kurangi kalkulasi kurva bezier
        Chart.defaults.font.family = "'Plus Jakarta Sans'";

        async function initDashboard() {
            const todayStr = now.toISOString().split('T')[0];
            const monthStr = todayStr.substring(0, 7);
            const yearStr = todayStr.substring(0, 4);

            try {
                const [p, s, b] = await Promise.all([
                    client.from('data_pengunjung').select('created_at, aktivitas, jenjang, kategori, nama').gte('created_at', `${yearStr}-01-01`),
                    client.from('sirkulasi').select('id', { count: 'exact' }).eq('status', 'DIPINJAM'),
                    client.from('biblio').select('id', { count: 'exact' })
                ]);

                const logs = p.data || [];
                const monthLogs = logs.filter(i => i.created_at.startsWith(monthStr));

                document.getElementById('todayVisit').innerText = logs.filter(i => i.created_at.startsWith(todayStr)).length;
                document.getElementById('activeSirkulasi').innerText = s.count || 0;
                document.getElementById('monthVisit').innerText = monthLogs.length;
                document.getElementById('yearVisit').innerText = logs.length;
                document.getElementById('totalKoleksi').innerText = b.count || 0;

                // Gunakan setTimeout agar rendering chart tidak memblokir update angka stat di atas
                setTimeout(() => {
                    renderCharts(logs, monthLogs, yearStr);
                    renderTopTen(logs);
                }, 50);

            } catch (e) { console.error(e); }
        }

        function renderCharts(allData, monthData, year) {
            const clean = (v) => (v || "LAINNYA").toString().toUpperCase().trim();

            // 1. Annual
            const monthly = new Array(12).fill(0);
            allData.forEach(i => monthly[new Date(i.created_at).getMonth()]++);

            new Chart(document.getElementById('annualChart'), {
                type: 'line',
                data: { 
                    labels: ["JAN","FEB","MAR","APR","MEI","JUN","JUL","AGU","SEP","OKT","NOV","DES"], 
                    datasets: [{ data: monthly, borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0, fill: false }] 
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9 } } } } }
            });

            // 2. Donut
            const acts = {}; monthData.forEach(i => { const a = clean(i.aktivitas); acts[a] = (acts[a] || 0) + 1; });
            new Chart(document.getElementById('donutChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(acts), datasets: [{ data: Object.values(acts), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'], borderWeight: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } }
            });

            // 3. Stacked Bar
            const jenjangs = [...new Set(monthData.map(i => clean(i.jenjang)))].slice(0, 5);
            new Chart(document.getElementById('stackedBarChart'), {
                type: 'bar',
                data: { 
                    labels: jenjangs, 
                    datasets: [{ label: 'Total', data: jenjangs.map(j => monthData.filter(i => clean(i.jenjang) === j).length), backgroundColor: '#6366f1' }] 
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 8 } } }, y: { display: false } }, plugins: { legend: { display: false } } }
            });

            // 4. Category
            const cats = {}; monthData.forEach(i => { if(i.kategori) { const c = clean(i.kategori); cats[c] = (cats[c] || 0) + 1; } });
            const topC = Object.entries(cats).sort((a,b) => b[1]-a[1]).slice(0, 5);
            new Chart(document.getElementById('categoryBarChart'), {
                type: 'bar',
                data: { labels: topC.map(d => d[0]), datasets: [{ data: topC.map(d => d[1]), backgroundColor: '#f59e0b' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 8 } } }, y: { display: false } } }
            });
        }

        function renderTopTen(data) {
            const counts = {};
            data.forEach(i => { const n = (i.nama || "User").toUpperCase(); counts[n] = (counts[n] || 0) + 1; });
            const sorted = Object.entries(counts).sort(([,a],[,b]) => b-a).slice(0, 10);
            document.getElementById('topRank').innerHTML = sorted.map(([n, c], i) => `
                <div class="flex justify-between text-[10px] p-2 bg-white/5 mb-1 rounded">
                    <span class="truncate w-32 font-bold">${i+1}. ${n}</span>
                    <span class="text-blue-400 font-black">${c}</span>
                </div>
            `).join('');
        }

        initDashboard();
    </script>
</body>
</html>
