<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Belum Scan | Perpustakaan Lubangsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #000000; --bg-card: #0a0a0a; --border-color: #1a1a1a; --google-red: #ff453a; --text-main: #e3e3e3; --text-muted: #9aa0a6; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 16px; }
        .shelf-section { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; margin-bottom: 2rem; overflow: hidden; }
        .shelf-banner { background: #161618; padding: 16px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .excel-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .excel-table th { background: #0d0d0d; color: var(--text-muted); text-align: left; padding: 12px 16px; font-size: 10px; text-transform: uppercase; }
        .excel-table td { padding: 12px 16px; border-bottom: 1px solid #111; }
        @media print { .no-print { display: none !important; } body { background: white; color: black; } .shelf-section { border: 1px solid #ddd; page-break-inside: avoid; } .excel-table td { color: black !important; } }
    </style>
</head>
<body class="p-6">

<div class="max-w-5xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 no-print">
        <div>
            <div class="flex items-center gap-3 mb-1">
                <div class="w-8 h-8 bg-red-500/20 rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-triangle-exclamation text-red-500 text-sm"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tight uppercase">Belum Di-Scan</h1>
            </div>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em]">Daftar buku missing dalam audit</p>
        </div>
        <div class="flex gap-3">
            <button onclick="window.print()" class="bg-zinc-800 border border-zinc-700 px-5 py-2 rounded-xl text-[10px] font-bold text-white hover:bg-zinc-700 transition-all uppercase">Cetak PDF</button>
            <button onclick="loadMissingReport()" class="bg-red-600 px-6 py-2 rounded-xl text-[10px] font-bold text-white hover:bg-red-700 shadow-lg shadow-red-900/20 transition-all uppercase">Refresh</button>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 no-print">
        <div class="stat-card">
            <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1">Total Missing</p>
            <h3 id="totalMissing" class="text-2xl font-black text-red-500 font-mono">0</h3>
        </div>
        <div class="stat-card">
            <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1">Area Rak</p>
            <h3 id="totalShelves" class="text-2xl font-black text-white font-mono">0</h3>
        </div>
    </div>

    <div id="reportContainer" class="space-y-6">
        <div class="text-center p-20 text-zinc-800 font-bold uppercase tracking-widest text-xs animate-pulse">Menghubungkan Database...</div>
    </div>
</div>

<script type="module">
    import { supabase } from './supa/supa.js';

    async function loadMissingReport() {
        const container = document.getElementById('reportContainer');
        const { data, error } = await supabase.rpc('get_missing_audit');

        if (error) {
            container.innerHTML = `<div class="text-red-500 text-center p-20 uppercase font-bold">Error: ${error.message}</div>`;
            return;
        }

        const missingData = data || {};
        const shelves = Object.keys(missingData).sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));
        
        let grandTotal = 0;
        shelves.forEach(s => grandTotal += missingData[s].length);

        document.getElementById('totalMissing').innerText = grandTotal;
        document.getElementById('totalShelves').innerText = shelves.length;

        if (grandTotal === 0) {
            container.innerHTML = `
                <div class="text-center p-20 bg-zinc-900/20 rounded-3xl border border-dashed border-zinc-800">
                    <i class="fa-solid fa-circle-check text-green-500 text-3xl mb-4"></i>
                    <p class="text-zinc-500 font-bold uppercase tracking-widest text-xs">Semua koleksi lengkap di rak.</p>
                </div>`;
            return;
        }

        container.innerHTML = shelves.map(shelf => {
            const items = missingData[shelf];
            return `
                <div class="shelf-section">
                    <div class="shelf-banner">
                        <h2 class="text-xs font-black text-white tracking-widest uppercase">RAK: ${shelf}</h2>
                        <span class="text-red-500 text-[9px] font-black px-3 py-1 rounded-full bg-red-500/10 border border-red-500/20">
                            ${items.length} ITEM MISSING
                        </span>
                    </div>
                    <table class="excel-table">
                        <thead>
                            <tr>
                                <th width="50">NO</th>
                                <th>JUDUL BUKU</th>
                                <th width="150">BARCODE</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${items.map((item, i) => `
                                <tr>
                                    <td class="text-zinc-800 font-mono font-bold">${i+1}</td>
                                    <td>
                                        <div class="font-bold text-[11px] text-zinc-300 uppercase truncate max-w-[400px]">${item.judul}</div>
                                        <div class="text-[9px] text-zinc-600 italic truncate max-w-[400px]">${item.penulis || '-'}</div>
                                    </td>
                                    <td class="font-mono text-[10px] font-bold text-red-500/70">${item.barcode}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }).join('');
    }

    window.loadMissingReport = loadMissingReport;
    window.onload = loadMissingReport;
</script>
</body>
</html>
