<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informasi Perpustakaan Lubangsa</title>
    <style>
        /* Dasar Halaman */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Background Utama */
        .background {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('bg.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
        }

        /* Kotak Pesan */
        .content {
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 80%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.5rem;
            font-weight: 300;
        }

        .highlight {
            color: #ffcc00;
            font-weight: bold;
        }

        /* Efek Salju */
        .snow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            filter: blur(1px);
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh);
            }
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="snow-container" id="snow"></div>

        <div class="content">
            <h1>mohon maaf</h1>
            <hr style="width: 50%; border: 1px solid rgba(255,255,255,0.3); margin: 20px auto;">
            <p>Peminjaman buku terpaksa kami <span class="highlight">NON AKTIFKAN</span></p>
            <p>Dikarenakan Perpustakaan Lubangsa akan tutup pada tanggal</p>
            <h2 style="font-size: 2.5rem;">1 Februari 2026</h2>
        </div>
    </div>

    <script>
        function createSnow() {
            const snowContainer = document.getElementById('snow');
            const snowflakeCount = 150; // Jumlah salju (deras)

            for (let i = 0; i < snowflakeCount; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                
                // Ukuran acak
                const size = Math.random() * 5 + 2 + 'px';
                flake.style.width = size;
                flake.style.height = size;
                
                // Posisi horizontal acak
                flake.style.left = Math.random() * 100 + 'vw';
                
                // Durasi jatuh acak (makin kecil angka makin deras/cepat)
                const duration = Math.random() * 3 + 2 + 's';
                flake.style.animationDuration = duration;
                
                // Delay acak agar tidak turun bersamaan
                flake.style.animationDelay = Math.random() * 5 + 's';
                
                // Transparansi acak
                flake.style.opacity = Math.random();

                snowContainer.appendChild(flake);
            }
        }

        createSnow();
    </script>
</body>
</html>
