<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Perpustakaan Lubangsa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Google Material 3 Dark Palette */
            --bg-color: #0f0f10;
            --surface: #1c1c1e;
            --on-surface: #f5f5f7;
            --text-secondary: #9aa0a6;
            --border-color: #333335;
            --primary-container: #a8c7fa;
            --on-primary-container: #062e6f;
            --error: #f2b8b5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--on-surface);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Navigasi Header */
        header { 
            padding: 24px 40px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 12px 20px;
            border-radius: 100px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-back:hover {
            color: var(--on-surface);
            background: rgba(255,255,255,0.08);
            transform: translateX(-5px);
            border-color: var(--text-secondary);
        }

        .logo-box img { 
            height: 42px; 
            width: auto; 
            filter: drop-shadow(0 0 10px rgba(168, 199, 250, 0.15)); 
        }

        /* Animasi Masuk Kenyal (Spring) */
        @keyframes springIn {
            0% { transform: scale(0.8) translateY(40px); opacity: 0; }
            60% { transform: scale(1.05) translateY(-5px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        main { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 24px;
            margin-top: -40px; 
        }
        
        .login-card { 
            width: 100%; 
            max-width: 400px; 
            animation: springIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-header h1 { 
            font-size: 32px; 
            font-weight: 800; 
            margin-bottom: 12px; 
            letter-spacing: -1px; 
            color: white;
        }
        .login-header p { color: var(--text-secondary); font-size: 15px; }

        form { display: flex; flex-direction: column; gap: 20px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 13px; font-weight: 600; color: var(--on-surface); margin-left: 4px; }

        input {
            width: 100%;
            padding: 18px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--surface);
            color: var(--on-surface);
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus { 
            border-color: var(--primary-container); 
            background: #252529;
            box-shadow: 0 0 0 4px rgba(168, 199, 250, 0.1); 
        }

        .pass-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 16px;
            padding: 5px;
        }

        .btn-login {
            margin-top: 12px;
            width: 100%;
            background-color: var(--primary-container);
            color: var(--on-primary-container);
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .btn-login:hover { 
            background-color: #c2d7ff;
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(168, 199, 250, 0.2);
        }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Success State */
        .success-screen {
            position: fixed; inset: 0; background: var(--bg-color);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .success-screen img { height: 80px; width: auto; animation: pulse 1s infinite ease-in-out; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        #toast-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast {
            padding: 14px 28px;
            border-radius: 100px;
            background-color: #2c2c2e;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            animation: springIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .footer-copyright { margin-top: 48px; text-align: center; font-size: 11px; color: var(--text-secondary); letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<header>
    <a href="index.html" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i>
        <span>KEMBALI</span>
    </a>
    <div class="logo-box">
        <img src="image/logo/logo.png" alt="Logo">
    </div>
</header>

<main>
    <div class="login-card">
        <div class="login-header">
            <h1>Masuk Admin</h1>
            <p>Verifikasi kredensial untuk akses manajemen</p>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Masukkan nama pengguna" required autofocus autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="Masukkan password" required autocomplete="off">
                    <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" id="btnLogin" class="btn-login">Verifikasi Identitas</button>
        </form>

        <div class="footer-copyright"><p>&copy; 2026 PERPUSTAKAAN LUBANGSA</p></div>
    </div>
</main>

<script type="module">
    import { supabase } from './supa/supa.js';

    const loginForm = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const toastContainer = document.getElementById('toast-container');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const usernameInput = document.getElementById('username');

    // Toggle Password Visibility
    togglePassword.addEventListener('click', () => {
        const isPass = passwordInput.type === 'password';
        passwordInput.type = isPass ? 'text' : 'password';
        togglePassword.classList.toggle('fa-eye', !isPass);
        togglePassword.classList.toggle('fa-eye-slash', isPass);
    });

    function showToast(message) {
        toastContainer.innerHTML = ''; 
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = message;
        toastContainer.appendChild(toast);
        setTimeout(() => { 
            toast.style.opacity = '0'; 
            setTimeout(() => toast.remove(), 500); 
        }, 3000);
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnLogin.disabled = true;
        btnLogin.innerText = "Memproses...";

        const user = usernameInput.value.trim();
        const pass = passwordInput.value;

        try {
            const { data, error } = await supabase.rpc('verify_admin_login', {
                input_user: user,
                input_pass: pass
            });

            if (error || !data || data.length === 0) {
                showToast("Identitas salah atau tidak ditemukan.");
                btnLogin.disabled = false;
                btnLogin.innerText = "Verifikasi Identitas";
                
                // Shake effect on error
                document.querySelector('.login-card').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            } else {
                const adminData = data[0];
                
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('adminUser', adminData.res_username);
                sessionStorage.setItem('adminRole', adminData.res_role); 
                
                document.body.innerHTML = `<div class="success-screen"><img src="image/logo/logo.png" alt="Loading"></div>`;
                
                // Redirect ke dual_page.html
                setTimeout(() => window.location.replace('dual_page.html'), 1200);
            }
        } catch (err) {
            showToast("Gagal terhubung ke database.");
            btnLogin.disabled = false;
            btnLogin.innerText = "Verifikasi Identitas";
        }
    });

    // Proteksi jika sudah login
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        window.location.replace('dual_page.html');
    }
</script>

</body>
</html>
