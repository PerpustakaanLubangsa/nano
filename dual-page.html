<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Page - Perpustakaan Lubangsa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Poppins', sans-serif;
            background-color: #000000;
        }
        .container { display: flex; width: 100%; height: 100vh; position: relative; }
        .sidebar { width: 22%; display: flex; flex-direction: column; background-color: #000000; z-index: 1; min-width: 240px; }
        .clock-section { padding: 20px 10px 10px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .clock-wrapper { display: flex; gap: 6px; align-items: center; }
        .time-card { background: #0a0a0a; color: #ffffff; padding: 8px 4px; border-radius: 10px; min-width: 55px; text-align: center; font-size: 1.8rem; font-weight: 900; line-height: 1; border: 2px solid #222; }
        
        /* GAYA TANGGAL SEBAGAI TOMBOL */
        #date-display { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-top: 10px; 
            color: #fffafa; 
            font-weight: 600; 
            opacity: 0.7; 
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            padding: 5px 10px;
            border-radius: 5px;
        }
        #date-display:hover {
            opacity: 1;
            background: rgba(255,255,255,0.1);
            color: #3b82f6;
        }

        .iframe-container-left { flex-grow: 1; padding: 0 15px 20px 15px; box-sizing: border-box; }
        .iframe-card { width: 100%; height: 100%; background: #ffffff; border-radius: 18px; overflow: hidden; }
        .main-content {
            width: 78%; background-color: #ffffff; z-index: 10;
            border-top-left-radius: 40px; border-bottom-left-radius: 40px;
            box-shadow: -20px 0 40px rgba(0, 0, 0, 0.6); overflow: hidden; position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="clock-section">
                <div class="clock-wrapper">
                    <div class="time-card" id="hour">00</div>
                    <div class="time-card" id="minute">00</div>
                    <div class="time-card" id="second">00</div>
                </div>
                <div id="date-display" onclick="location.href='index.html'">MEMUAT...</div>
            </div>
            <div class="iframe-container-left">
                <div class="iframe-card">
                    <iframe src="form.html"></iframe>
                </div>
            </div>
        </div>
        <div class="main-content">
            <iframe src="index.html"></iframe>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('hour').textContent = h;
            document.getElementById('minute').textContent = m;
            document.getElementById('second').textContent = s;
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date-display').textContent = now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
