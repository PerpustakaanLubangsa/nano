<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Browser Tab</title>
    <style>
        /* Dark Mode Styling */
        :root {
            --bg-dark: #202124;
            --tab-bg: #35363a;
            --tab-active: #202124;
            --text-color: #e8eaed;
            --border-color: #3c4043;
            --accent: #8ab4f8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Tab Bar */
        .tab-bar {
            background-color: #1a1b1e;
            display: flex;
            align-items: flex-end;
            padding: 8px 10px 0 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            background-color: var(--tab-bg);
            padding: 8px 15px;
            margin-right: 5px;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            cursor: pointer;
            min-width: 120px;
            max-width: 200px;
            font-size: 12px;
            position: relative;
            user-select: none;
        }

        .tab.active {
            background-color: var(--tab-active);
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .tab .close-btn {
            margin-left: auto;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .tab .close-btn:hover {
            background-color: rgba(255,255,255,0.2);
        }

        .add-tab-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 20px;
            cursor: pointer;
            padding: 5px 12px;
            margin-bottom: 5px;
        }

        .add-tab-btn:hover {
            background-color: var(--tab-bg);
            border-radius: 50%;
        }

        /* Content Area */
        .content-area {
            flex-grow: 1;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        iframe.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="tab-bar" id="tabBar">
    <button class="add-tab-btn" onclick="addNewTab()">+</button>
</div>

<div class="content-area" id="contentArea">
    </div>

<script>
    let tabCount = 0;

    function addNewTab() {
        tabCount++;
        const tabId = `tab-${tabCount}`;
        
        // 1. Buat Tab Baru
        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.id = `btn-${tabId}`;
        tab.innerHTML = `
            <span>Tab Baru ${tabCount}</span>
            <div class="close-btn" onclick="removeTab(event, '${tabId}')">×</div>
        `;
        tab.onclick = () => switchTab(tabId);
        
        document.querySelector('.add-tab-btn').before(tab);

        // 2. Buat Iframe Baru (Isi Google)
        const iframe = document.createElement('iframe');
        iframe.id = tabId;
        // Menggunakan parameter igu=1 untuk meminimalisir blokir frame
        iframe.src = "https://www.google.com/search?igu=1";
        document.getElementById('contentArea').appendChild(iframe);

        // 3. Aktifkan Tab Baru
        switchTab(tabId);
    }

    function switchTab(tabId) {
        // Matikan semua tab & iframe
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('iframe').forEach(i => i.classList.remove('active'));

        // Aktifkan yang dipilih
        document.getElementById(`btn-${tabId}`).classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    function removeTab(event, tabId) {
        event.stopPropagation(); // Mencegah switchTab terpanggil saat klik close
        
        const tabBtn = document.getElementById(`btn-${tabId}`);
        const iframe = document.getElementById(tabId);
        
        const wasActive = tabBtn.classList.contains('active');

        tabBtn.remove();
        iframe.remove();

        // Jika tab yang dihapus adalah yang aktif, pindah ke tab terakhir
        if (wasActive) {
            const tabs = document.querySelectorAll('.tab');
            if (tabs.length > 0) {
                const lastTabId = tabs[tabs.length - 1].id.replace('btn-', '');
                switchTab(lastTabId);
            }
        }
    }

    // Tambah tab pertama saat load
    addNewTab();
</script>

</body>
</html>
