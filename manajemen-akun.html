<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Akun | Perpustakaan Lubangsa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .glass-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #3b82f6;
            transition: all 0.2s;
        }
        .btn-primary:hover { background-color: #2563eb; }
        .modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 50;
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-extrabold tracking-tight text-slate-800">Manajemen Akun</h1>
            <p class="text-slate-500 text-sm">Kelola akses administrator dan staf sistem.</p>
        </div>
        <div class="flex gap-2">
            <a href="admin-panel.html" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-xl font-bold text-xs flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> KEMBALI
            </a>
            <button onclick="openModal()" class="px-6 py-2 btn-primary text-white rounded-xl font-bold text-xs flex items-center gap-2">
                <i class="fa-solid fa-user-plus"></i> TAMBAH AKUN
            </button>
        </div>
    </div>

    <div class="glass-card rounded-3xl overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                    <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Pengguna</th>
                    <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Role</th>
                    <th class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">Aksi</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</div>

<div id="userModal" class="modal">
    <div class="bg-white w-full max-w-md p-8 rounded-[2rem] shadow-2xl mx-4">
        <h3 id="modalTitle" class="text-xl font-bold mb-6 text-slate-800">Tambah Akun Baru</h3>
        <form id="userForm" class="space-y-4">
            <input type="hidden" id="userId">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Username</label>
                <input type="text" id="username" required class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm font-semibold">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Password</label>
                <input type="text" id="password" required class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm font-semibold">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Role / Jabatan</label>
                <select id="role" required class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm font-semibold cursor-pointer">
                    <option value="Admin">Admin</option>
                    <option value="Staf">Staf</option>
                </select>
            </div>
            <div class="flex gap-3 mt-8">
                <button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-xs">BATAL</button>
                <button type="submit" id="btnSimpan" class="flex-1 py-4 btn-primary text-white rounded-2xl font-bold text-xs">SIMPAN DATA</button>
            </div>
        </form>
    </div>
</div>

<div id="alertModal" class="modal">
    <div class="bg-white w-full max-w-xs p-8 rounded-[2rem] shadow-2xl mx-4 text-center">
        <div id="alertIcon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"></div>
        <h3 id="alertTitle" class="text-lg font-bold text-slate-800 mb-2"></h3>
        <p id="alertMessage" class="text-sm text-slate-500 mb-6"></p>
        <div id="alertActions" class="flex gap-2">
            <button id="alertConfirmBtn" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold text-xs uppercase tracking-wider">OK</button>
            <button id="alertCancelBtn" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs uppercase tracking-wider hidden">Batal</button>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
    const client = supabase.createClient(S_URL, S_KEY);

    if (localStorage.getItem('isLoggedIn') !== 'true') window.location.replace('login.html');

    function showAlert(title, message, type = 'info', onConfirm = null, showCancel = false) {
        const modal = document.getElementById('alertModal');
        const icon = document.getElementById('alertIcon');
        const titleEl = document.getElementById('alertTitle');
        const msgEl = document.getElementById('alertMessage');
        const confirmBtn = document.getElementById('alertConfirmBtn');
        const cancelBtn = document.getElementById('alertCancelBtn');

        titleEl.innerText = title;
        msgEl.innerText = message;
        
        icon.className = 'w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl ';
        if(type === 'success') {
            icon.classList.add('bg-green-50', 'text-green-500');
            icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
        } else if(type === 'error') {
            icon.classList.add('bg-red-50', 'text-red-500');
            icon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
        } else if(type === 'warning') {
            icon.classList.add('bg-amber-50', 'text-amber-500');
            icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        }

        cancelBtn.classList.toggle('hidden', !showCancel);
        
        confirmBtn.onclick = () => {
            modal.style.display = 'none';
            if (onConfirm) onConfirm();
        };
        
        cancelBtn.onclick = () => {
            modal.style.display = 'none';
        };

        modal.style.display = 'flex';
    }

    async function fetchUsers() {
        const { data, error } = await client.from('users').select('*').order('created_at', { ascending: false });
        if (error) return console.error(error);
        
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = data.map(user => {
            const is_admin = user.role === "Admin";
            const badgeColor = is_admin ? "bg-blue-50 text-blue-600" : "bg-slate-100 text-slate-600";

            return `
            <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                <td class="px-6 py-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full ${is_admin ? 'bg-blue-100 text-blue-500' : 'bg-slate-100 text-slate-400'} flex items-center justify-center text-xs">
                            <i class="fa-solid ${is_admin ? 'fa-user-shield' : 'fa-user'}"></i>
                        </div>
                        <div class="font-bold text-slate-700">${user.username}</div>
                    </div>
                </td>
                <td class="px-6 py-4">
                    <span class="px-3 py-1 ${badgeColor} rounded-lg text-[9px] font-black uppercase tracking-wider">
                        ${user.role || 'Staf'}
                    </span>
                </td>
                <td class="px-6 py-4 text-right flex justify-end gap-2">
                    <button onclick="editUser(${user.id}, '${user.username}', '${user.password}', '${user.role}')" class="w-8 h-8 flex items-center justify-center bg-amber-50 text-amber-600 rounded-lg hover:bg-amber-100 transition-colors">
                        <i class="fa-solid fa-pen-to-square text-xs"></i>
                    </button>
                    <button onclick="confirmDelete(${user.id}, '${user.username}')" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </button>
                </td>
            </tr>
        `}).join('');
    }

    function openModal() {
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('modalTitle').innerText = 'Tambah Akun Baru';
        document.getElementById('btnSimpan').innerText = 'SIMPAN AKUN';
        document.getElementById('role').value = 'Staf';
        document.getElementById('userModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('userModal').style.display = 'none';
    }

    function editUser(id, username, password, role) {
        document.getElementById('userId').value = id;
        document.getElementById('username').value = username;
        document.getElementById('password').value = password;
        document.getElementById('role').value = role || 'Staf';
        document.getElementById('modalTitle').innerText = 'Edit Akun';
        document.getElementById('btnSimpan').innerText = 'SIMPAN PERUBAHAN';
        document.getElementById('userModal').style.display = 'flex';
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        btn.innerText = 'MEMPROSES...';

        const id = document.getElementById('userId').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        try {
            if (id) {
                const { error } = await client.from('users').update({ username, password, role }).eq('id', id);
                if(error) throw error;
                showAlert('Berhasil', 'Data akun telah diperbarui.', 'success');
            } else {
                const { error } = await client.from('users').insert([{ username, password, role }]);
                if(error) throw error;
                showAlert('Berhasil', 'Akun baru telah ditambahkan.', 'success');
            }
            closeModal();
            fetchUsers();
        } catch (error) {
            showAlert('Gagal', error.message, 'error');
        } finally {
            btn.disabled = false;
        }
    });

    function confirmDelete(id, username) {
        showAlert(
            'Konfirmasi Hapus', 
            `Apakah Anda yakin ingin menghapus akun "${username}"?`, 
            'warning', 
            async () => {
                const { error } = await client.from('users').delete().eq('id', id);
                if(!error) {
                    fetchUsers();
                } else {
                    showAlert('Gagal', 'Tidak dapat menghapus data: ' + error.message, 'error');
                }
            },
            true
        );
    }

    fetchUsers();
</script>
</body>
</html>
