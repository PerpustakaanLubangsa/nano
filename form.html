<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu - Luvionics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root {
            --bg-page: #000000;
            --bg-card: #0a0a0a;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent-color: #8ab4f8;
            --input-bg: #1f2023;
            --drop-bg: #1f2023;
            --item-hover: rgba(138, 180, 248, 0.08);
            --modal-overlay: rgba(0, 0, 0, 0.85);
            --radius-semi: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-shrink: 0;
        }
        .header-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        
        .btn-close-box {
            display: inline-block;
            text-decoration: none;
            color: var(--text-primary);
            background-color: #1f2023;
            padding: 12px 24px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: var(--radius-semi);
            transition: all 0.2s ease;
        }
        .btn-close-box:hover {
            background-color: rgba(255, 77, 77, 0.15);
            color: #ff4d4d;
        }
        .btn-close-box:active { transform: scale(0.95); }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
            height: 100%;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .field-group { position: relative; display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 14px; }
        .row > div { flex: 1; }
        label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; padding-left: 6px; }
        
        input, select {
            width: 100%;
            padding: 16px 18px;
            font-size: 15px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            border: none;
            border-radius: var(--radius-semi);
            outline: none;
            transition: all 0.2s ease;
            appearance: none;
        }
        select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%239aa0a6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 40px;
        }
        input:focus, select:focus { 
            background-color: #26272b;
            box-shadow: 0 0 0 2px var(--accent-color); 
        }

        .drop-box {
            position: absolute;
            top: calc(100% + 6px); left: 0; right: 0;
            background-color: var(--drop-bg);
            border: none;
            border-radius: var(--radius-semi);
            max-height: 220px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 12px 36px rgba(0,0,0,0.7);
            display: none;
        }
        .drop-item {
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 1px solid #2a2b30;
            transition: all 0.1s ease;
        }
        .drop-item:last-child { border-bottom: none; }
        .drop-item:hover, .drop-item.selected { background-color: var(--item-hover); }
        .drop-item.selected { box-shadow: inset 4px 0 0 0 var(--accent-color); }
        .drop-item .main-text { font-size: 14px; font-weight: 700; color: #fff; }
        .drop-item .sub-text { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

        .actions { margin-top: auto; display: flex; flex-direction: column; gap: 12px; padding: 16px 0; flex-shrink: 0; }
        
        button { padding: 16px; border-radius: var(--radius-semi); font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; border: none; }
        .btn-rank { background-color: #1f2023; color: var(--accent-color); }
        .btn-rank:hover { background-color: #26272b; }
        .btn-submit { background-color: var(--accent-color); color: #000; }
        .btn-submit:hover { background-color: #abc7f9; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.4; pointer-events: none; }

        #customModal {
            display: none; position: fixed; inset: 0; background: var(--modal-overlay);
            z-index: 9999; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(12px);
        }
        .modal-content {
            background: #1f2023; border: none; border-radius: var(--radius-semi);
            width: 100%; max-width: 350px; padding: 36px 24px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .modal-icon { font-size: 44px; margin-bottom: 16px; display: block; }
        .modal-title { font-size: 19px; font-weight: 800; margin-bottom: 10px; color: #ff6b6b; letter-spacing: -0.3px; }
        .modal-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 28px; }
        .btn-modal-close { background: #2d3035; color: white; width: 100%; border-radius: var(--radius-semi); }
        .btn-modal-close:hover { background: #383c42; }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

<div id="customModal">
    <div class="modal-content">
        <span class="modal-icon">⏳</span>
        <div class="modal-title" id="modalTitle">Sudah Terabsen</div>
        <div class="modal-text" id="modalMessage">Pesan pembatasan akan muncul di sini.</div>
        <button class="btn-modal-close" onclick="closeModal()">Tutup</button>
    </div>
</div>

<header>
    <div class="header-title">BUKU TAMU</div>
    <a href="index.html" class="btn-close-box">Tutup</a>
</header>

<form id="guestForm" autocomplete="off">
    <div class="field-group">
        <label>Nama Pengunjung</label>
        <input type="text" id="inputNama" placeholder="Cari Nama atau NIS..." required>
        <div id="dropNama" class="drop-box"></div>
    </div>

    <div class="row">
        <div class="field-group">
            <label>Kamar</label>
            <input type="text" id="inputKamar" placeholder="Contoh: A-01" required>
        </div>
        <div class="field-group">
            <label>Jenjang</label>
            <select id="inputJenjang" required>
                <option value="" disabled selected>Pilih</option>
                <option value="SLTP">SLTP</option>
                <option value="SLTA">SLTA</option>
                <option value="PT">PT</option>
            </select>
        </div>
    </div>

    <div class="field-group">
        <label>Koleksi Buku</label>
        <input type="text" id="inputBuku" placeholder="Ketik Judul atau Kode Eksemplar..." required>
        <div id="dropBuku" class="drop-box"></div>
    </div>

    <div class="row">
        <div class="field-group">
            <label>Kategori</label>
            <select id="inputKategori" required>
                <option value="" disabled selected>Memuat kategori...</option>
            </select>
        </div>
        <div class="field-group">
            <label>Aktivitas</label>
            <select id="inputAktivitas" required>
                <option value="" disabled selected>Pilih</option>
                <option value="Baca">Baca</option>
                <option value="Pinjam">Pinjam</option>
            </select>
        </div>
    </div>

    <div class="actions">
        <button type="button" class="btn-rank" onclick="window.location.href='rank.html'">Lihat Leaderboard</button>
        <button type="submit" id="btnSubmit" class="btn-submit">Simpan Kunjungan</button>
    </div>
</form>

<script type="module">
    import { supabase } from './supa/supa.js';

    // Daftarkan fungsi modal ke window global di awal modul agar bisa diakses HTML onclick
    window.closeModal = () => {
        document.getElementById('customModal').style.display = 'none';
    };

    let selectedAnggotaData = null;
    let selectedBukuData = null;
    let currentFocus = -1;
    
    function showToast(msg, isError = true) {
        Toastify({ 
            text: msg, duration: 2500, gravity: "top", position: "center",
            style: { background: isError ? "#ff4d4d" : "#00c853", borderRadius: "12px", fontSize: "13px" }
        }).showToast();
    }

    async function fetchKategoriDatabase() {
        const selectKategori = document.getElementById('inputKategori');
        try {
            const { data, error } = await supabase
                .from('kategori')
                .select('nama_kategori')
                .order('nama_kategori', { ascending: true });

            if (error) throw error;

            if (data && data.length > 0) {
                selectKategori.innerHTML = '<option value="" disabled selected>Pilih</option>';
                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.nama_kategori;
                    opt.textContent = item.nama_kategori;
                    selectKategori.appendChild(opt);
                });
            } else {
                selectKategori.innerHTML = '<option value="" disabled selected>Kategori Kosong</option>';
            }
        } catch (err) {
            console.error("Gagal mengambil data kategori:", err.message);
            selectKategori.innerHTML = '<option value="" disabled selected>Gagal memuat kategori</option>';
        }
    }

    function bindSmartSearch(inputId, dropId, tableName) {
        const input = document.getElementById(inputId);
        const drop = document.getElementById(dropId);
        let timer;

        input.addEventListener('input', () => {
            if (inputId === 'inputNama') selectedAnggotaData = null;
            if (inputId === 'inputBuku') selectedBukuData = null;
            
            const val = input.value.trim();
            if (val.length < 2) { 
                drop.style.display = 'none'; 
                return; 
            }

            clearTimeout(timer);
            timer = setTimeout(async () => {
                let query = supabase.from(tableName).select('*');
                
                if (tableName === 'anggota') {
                    query = query.or(`nama.ilike.%${val}%,nis.ilike.%${val}%`);
                } else if (tableName === 'biblio') { 
                    query = query.or(`judul.ilike.%${val}%,daftar_kode.cs.["${val}"]`);
                }

                const { data, error } = await query.limit(10);
                if (error) { console.error(error); return; }
                renderSuggestions(drop, inputId, data || []);
            }, 300);
        });

        input.addEventListener('keydown', (e) => {
            const items = drop.querySelectorAll('.drop-item');
            if (items.length === 0) return;

            if (e.key === "ArrowDown") {
                currentFocus++;
                addActive(items);
            } else if (e.key === "ArrowUp") {
                currentFocus--;
                addActive(items);
            } else if (e.key === "Enter") {
                if (currentFocus > -1) {
                    e.preventDefault();
                    items[currentFocus].click();
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !drop.contains(e.target)) drop.style.display = 'none';
        });
    }

    function addActive(items) {
        if (!items) return false;
        removeActive(items);
        if (currentFocus >= items.length) currentFocus = 0;
        if (currentFocus < 0) currentFocus = items.length - 1;
        items[currentFocus].classList.add("selected");
        items[currentFocus].scrollIntoView({ block: "nearest" });
    }

    function removeActive(items) {
        for (let i = 0; i < items.length; i++) {
            items[i].classList.remove("selected");
        }
    }

    function renderSuggestions(drop, inputId, data) {
        if (data.length === 0) { drop.style.display = 'none'; return; }
        currentFocus = -1;
        
        drop.innerHTML = data.map((item, i) => {
            if (inputId === 'inputNama') {
                return `
                    <div class="drop-item" data-idx="${i}">
                        <div class="main-text">${item.nama}</div>
                        <div class="sub-text">${item.nis || '-'} • Kamar: ${item.kamar || '-'}</div>
                    </div>`;
            } else {
                return `
                    <div class="drop-item" data-idx="${i}">
                        <div class="main-text">${item.judul}</div>
                        <div class="sub-text">${item.penulis || 'Tanpa Penulis'} • Kategori: ${item.kategori || 'Tanpa Kategori'}</div>
                    </div>`;
            }
        }).join('');

        drop.querySelectorAll('.drop-item').forEach(el => {
            el.onclick = () => {
                const selected = data[el.dataset.idx];
                if (inputId === 'inputNama') {
                    document.getElementById('inputNama').value = selected.nama;
                    document.getElementById('inputKamar').value = selected.kamar || '';
                    document.getElementById('inputJenjang').value = selected.jenjang || '';
                    selectedAnggotaData = selected; 
                } else {
                    document.getElementById('inputBuku').value = selected.judul;
                    document.getElementById('inputKategori').value = selected.kategori || '';
                    selectedBukuData = selected;
                }
                drop.style.display = 'none';
            };
        });
        drop.style.display = 'block';
    }

    document.getElementById('guestForm').onsubmit = async (e) => {
        e.preventDefault();

        if (!selectedAnggotaData || !selectedBukuData) {
            showToast("⚠️ Harap pilih Nama & Buku dari daftar pencarian yang muncul.");
            return;
        }

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = 'Menyinkronkan...';

        try {
            const p_nama = document.getElementById('inputNama').value;
            const p_kamar = document.getElementById('inputKamar').value;
            const p_jenjang = document.getElementById('inputJenjang').value;
            const p_judul = document.getElementById('inputBuku').value;
            const p_kategori = document.getElementById('inputKategori').value;
            const p_aktivitas = document.getElementById('inputAktivitas').value;

            const sekarang = new Date();
            const jamSekarang = sekarang.getHours(); 
            
            let sesiHariIni = "";
            let tglMulaiCheck, tglSelesaiCheck;

            // Dapatkan string tanggal format YYYY-MM-DD berbasis waktu lokal komputer pengguna
            const targetYear = sekarang.getFullYear();
            const targetMonth = String(sekarang.getMonth() + 1).padStart(2, '0');
            const targetDay = String(sekarang.getDate()).padStart(2, '0');
            const dateString = `${targetYear}-${targetMonth}-${targetDay}`;

            if (jamSekarang >= 4 && jamSekarang < 15) {
                sesiHariIni = "Pagi-Siang";
                tglMulaiCheck = new Date(`${dateString}T04:00:00`).toISOString();
                tglSelesaiCheck = new Date(`${dateString}T14:59:59`).toISOString();
            } else {
                sesiHariIni = "Malam";
                if (jamSekarang >= 15) {
                    const besok = new Date(sekarang);
                    besok.setDate(sekarang.getDate() + 1);
                    const dateStringBesok = `${besok.getFullYear()}-${String(besok.getMonth()+1).padStart(2,'0')}-${String(besok.getDate()).padStart(2,'0')}`;
                    
                    tglMulaiCheck = new Date(`${dateString}T15:00:00`).toISOString();
                    tglSelesaiCheck = new Date(`${dateStringBesok}T03:59:59`).toISOString();
                } else {
                    const kemarin = new Date(sekarang);
                    kemarin.setDate(sekarang.getDate() - 1);
                    const dateStringKemarin = `${kemarin.getFullYear()}-${String(kemarin.getMonth()+1).padStart(2,'0')}-${String(kemarin.getDate()).padStart(2,'0')}`;
                    
                    tglMulaiCheck = new Date(`${dateStringKemarin}T15:00:00`).toISOString();
                    tglSelesaiCheck = new Date(`${dateString}T03:59:59`).toISOString();
                }
            }

            // Memeriksa riwayat kunjungan pada rentang sesi berjalan
            const { data: checkSesi, error: errorCheck } = await supabase
                .from('data_pengunjung')
                .select('id')
                .eq('id_anggota', selectedAnggotaData.id)
                .gte('created_at', tglMulaiCheck)
                .lte('created_at', tglSelesaiCheck)
                .limit(1);

            if (errorCheck) throw errorCheck;

            if (checkSesi && checkSesi.length > 0) {
                document.getElementById('modalTitle').innerText = "Batas Kunjungan Terpenuhi";
                document.getElementById('modalMessage').innerText = `Anda sudah mengisi buku tamu pada Sesi ${sesiHariIni}. Setiap pengunjung hanya diperbolehkan melakukan 1 kunjungan di Pagi-Siang, dan 1 kunjungan di Malam hari.`;
                document.getElementById('customModal').style.display = 'flex';
                
                btn.disabled = false;
                btn.innerText = 'Simpan Kunjungan';
                return;
            }

            const { error: insertError } = await supabase
                .from('data_pengunjung')
                .insert([{
                    id_anggota: selectedAnggotaData.id,  
                    nis: selectedAnggotaData.nis,         
                    nama: p_nama,
                    kamar: p_kamar,
                    jenjang: p_jenjang,
                    judul_buku: p_judul,                                            
                    kategori: p_kategori,
                    aktivitas: p_aktivitas,
                    tanggal_kunjungan: dateString         
                }]);

            if (insertError) throw insertError;

            sessionStorage.setItem('last_guest', JSON.stringify({
                id_anggota: selectedAnggotaData.id,
                nama: p_nama
            }));

            showToast("Berhasil disimpan!", false);
            
            setTimeout(() => {
                window.location.href = 'profile_pencapaian_pengunjung.html';
            }, 1000);

        } catch (err) {
            showToast("Gagal: " + err.message);
            btn.disabled = false;
            btn.innerText = 'Simpan Kunjungan';
        }
    };

    fetchKategoriDatabase(); 
    bindSmartSearch('inputNama', 'dropNama', 'anggota'); 
    bindSmartSearch('inputBuku', 'dropBuku', 'biblio');  
</script>
</body>
</html>
