<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu - Snowy Digital Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root { --bg: #f0f9ff; --accent: #0ea5e9; --text-main: #0f172a; }
        * { scrollbar-width: none; -ms-overflow-style: none; box-sizing: border-box; }
        *::-webkit-scrollbar { display: none; }
        body { 
            background: radial-gradient(circle at top right, #e0f2fe, #f0f9ff);
            color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; margin: 0; padding: 15px; display: flex; flex-direction: column; overflow: hidden;
            position: relative;
        }
        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 50px 50px; animation: snow 10s linear infinite;
            opacity: 0.5; pointer-events: none;
        }
        @keyframes snow { 0% { background-position: 0px 0px; } 100% { background-position: 500px 1000px; } }
        header { margin-bottom: 15px; flex-shrink: 0; }
        form { display: flex; flex-direction: column; height: 100%; gap: 10px; position: relative; }
        .input-formal { 
            background: #fff !important; border: 1.5px solid #cbd5e1 !important; 
            border-radius: 12px !important; padding: 10px 12px !important; font-weight: 600; 
            width: 100%; font-size: 14px; color: #1e293b !important; outline: none; transition: 0.3s;
        }
        .input-formal:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; }
        
        .drop-box {
            position: absolute; width: 100%; max-height: 250px; overflow-y: auto;
            background: rgba(255, 255, 255, 0.98); border-radius: 12px; border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; margin-top: 5px; display: none;
            backdrop-filter: blur(10px);
        }
        .drop-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f1f5f9; transition: 0.2s; }
        .drop-item:hover, .drop-item.active { background: #e0f2fe; border-left: 4px solid var(--accent); }
        
        .loading-item { padding: 12px; text-align: center; color: #64748b; font-size: 12px; font-weight: 700; }
        
        .btn-submit { 
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white; padding: 14px; border-radius: 14px; font-weight: 800; width: 100%; border: none; cursor: pointer; text-transform: uppercase;
        }
        .btn-rank {
            background: white; border: 2px solid #0ea5e9; color: #0ea5e9; padding: 10px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.3s;
        }
        .btn-rank:hover { background: #f0f9ff; }

        #customModal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); 
            display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); padding: 20px;
        }
        .modal-content {
            background: white; border-radius: 2.5rem; width: 100%; max-width: 360px; 
            max-height: 95vh; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative;
        }
        .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 0.8rem 1.5rem; background: white; border-top: 1px solid #f1f5f9; }
        .stat-card { background: white; border: 1px solid #e2e8f0; border-radius: 15px; padding: 8px; text-align: center; }
    </style>
</head>
<body>

    <div id="customModal">
        <div class="modal-content">
            <div id="modalBodyContent" class="modal-body">
                </div>
            <div class="modal-footer">
                <button id="modalAction" class="btn-submit !rounded-2xl shadow-lg">Tutup & Selesai</button>
            </div>
        </div>
    </div>

    <header class="flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold text-slate-800 tracking-tighter">BUKU TAMU</h1>
            <p class="text-[8px] font-black text-sky-500 uppercase tracking-[0.2em]">Crystal Library Sync</p>
        </div>
        <i id="syncStatus" class="fa-solid fa-snowflake text-slate-200"></i>
    </header>

    <form id="guestForm" autocomplete="off">
        <div class="relative">
            <label><i class="fa-solid fa-id-card mr-1"></i> Identitas Nama / NIS</label>
            <input type="text" id="inputNama" placeholder="Cari NIS atau Nama..." required class="input-formal">
            <div id="dropNama" class="drop-box"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label><i class="fa-solid fa-house-chimney mr-1"></i> Kamar</label>
                <input type="text" id="inputKamar" required placeholder="A-01" class="input-formal uppercase">
            </div>
            <div>
                <label><i class="fa-solid fa-school mr-1"></i> Jenjang</label>
                <select id="inputJenjang" required class="input-formal">
                    <option value="" disabled selected>- Pilih -</option>
                    <option value="SLTP">SLTP</option>
                    <option value="SLTA">SLTA</option>
                    <option value="PT">PT</option>
                </select>
            </div>
        </div>
        <div class="relative">
            <label><i class="fa-solid fa-book-bookmark mr-1"></i> Judul Koleksi</label>
            <input type="text" id="inputBuku" placeholder="Cari judul buku..." required class="input-formal">
            <div id="dropBuku" class="drop-box"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label><i class="fa-solid fa-tag mr-1"></i> Kategori</label>
                <select id="inputKategori" required class="input-formal text-[11px]">
                    <option value="" disabled selected>- Pilih -</option>
                    <option value="Kesusastraan">Kesusastraan</option><option value="Komik">Komik</option>
                    <option value="Filsafat dan Psikologi">Filsafat dan Psikologi</option><option value="Agama">Agama</option>
                    <option value="Ilmu Sosial">Ilmu Sosial</option><option value="Sejarah dan Geografi">Sejarah dan Geografi</option>
                    <option value="Ilmu Murni">Ilmu Murni</option><option value="Ilmu Bahasa">Ilmu Bahasa</option>
                    <option value="Managemen">Managemen</option><option value="Majalah">Majalah</option>
                </select>
            </div>
            <div>
                <label><i class="fa-solid fa-person-rays mr-1"></i> Aktivitas</label>
                <select id="inputAktivitas" required class="input-formal">
                    <option value="" disabled selected>- Pilih -</option>
                    <option value="Baca">Baca</option><option value="Pinjam">Pinjam</option>
                </select>
            </div>
        </div>
        <div class="mt-auto pb-2 flex flex-col gap-2">
            <button type="button" onclick="window.location.href='rank.html'" class="btn-rank">
                <i class="fa-solid fa-trophy mr-2"></i>Lihat Peringkat
            </button>
            <button type="submit" id="btnSubmit" class="btn-submit">
                <i class="fa-solid fa-cloud-arrow-up mr-2"></i>Simpan & Sinkron
            </button>
        </div>
    </form>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);
        let searchTimer;

        function calculateRank(poin) {
            let rank = "Warrior";
            if (poin >= 1000) rank = "Immortal";
            else if (poin >= 955) rank = "Glory";
            else if (poin >= 905) rank = "Honor";
            else if (poin >= 855) rank = "Mythic";
            else if (poin >= 655) rank = "Legend";
            else if (poin >= 455) rank = "Epic";
            else if (poin >= 305) rank = "Grandmaster";
            else if (poin >= 155) rank = "Master";
            else if (poin >= 55) rank = "Elite";
            return { name: rank, img: `${rank}.jpg` };
        }

        function showToast(msg, color = "#ef4444") {
            Toastify({ text: msg, duration: 3000, gravity: "top", position: "center", style: { background: color, borderRadius: "10px", fontWeight: "bold" } }).showToast();
        }

        function bindSmartSearch(inputId, dropId, tableName, searchColumns) {
            const input = document.getElementById(inputId);
            const drop = document.getElementById(dropId);
            let activeIdx = -1;

            input.addEventListener('keydown', (e) => {
                const items = drop.querySelectorAll('.drop-item');
                if (e.key === 'ArrowDown') { activeIdx = (activeIdx + 1) % items.length; updateActive(items); e.preventDefault(); }
                else if (e.key === 'ArrowUp') { activeIdx = (activeIdx - 1 + items.length) % items.length; updateActive(items); e.preventDefault(); }
                else if (e.key === 'Enter' && activeIdx > -1) { items[activeIdx].click(); e.preventDefault(); }
            });

            input.addEventListener('input', () => {
                clearTimeout(searchTimer);
                const val = input.value.trim();
                activeIdx = -1;
                if (val.length < 2) { drop.style.display = 'none'; return; }
                drop.style.display = 'block';
                drop.innerHTML = `<div class="loading-item"><i class="fa-solid fa-spinner fa-spin mr-2"></i>MENCARI...</div>`;

                searchTimer = setTimeout(async () => {
                    let query = client.from(tableName).select('*');
                    if (searchColumns.length > 1) query = query.or(`${searchColumns[0]}.ilike.%${val}%,${searchColumns[1]}.ilike.%${val}%`);
                    else query = query.ilike(searchColumns[0], `%${val}%`);
                    
                    const { data } = await query.limit(10);
                    if (data && data.length > 0) {
                        drop.innerHTML = data.map((m, i) => `
                            <div class="drop-item" onclick="pick('${inputId}', '${dropId}', ${i})">
                                <div class="text-[13px] font-extrabold text-slate-700">${m.nama || m.judul}</div>
                                <div class="text-[10px] text-slate-400 font-bold uppercase">${m.nis ? `NIS: ${m.nis} • ` : ''} ${m.kamar || m.kategori || ''}</div>
                            </div>`).join('');
                        drop.dataset.current = JSON.stringify(data);
                    } else { drop.style.display = 'none'; }
                }, 400);
            });

            if (inputId === 'inputNama') {
                input.addEventListener('blur', async () => {
                    setTimeout(async () => {
                        const val = input.value.trim();
                        if (!val || drop.style.display === 'block') return;
                        if (/^\d+$/.test(val)) {
                            const { data } = await client.from('anggota').select('*').eq('nis', val).maybeSingle();
                            if (data) {
                                input.value = data.nama;
                                document.getElementById('inputKamar').value = data.kamar || '';
                                document.getElementById('inputJenjang').value = data.jenjang || '';
                            } else { input.value = ''; showToast("NIS tidak ditemukan!"); }
                        }
                    }, 200);
                });
            }

            function updateActive(items) {
                items.forEach((item, i) => {
                    item.classList.toggle('active', i === activeIdx);
                    if(i === activeIdx) item.scrollIntoView({ block: 'nearest' });
                });
            }
        }

        bindSmartSearch('inputNama', 'dropNama', 'anggota', ['nama', 'nis']);
        bindSmartSearch('inputBuku', 'dropBuku', 'biblio', ['judul']);

        function pick(inputId, dropId, idx) {
            const drop = document.getElementById(dropId);
            const data = JSON.parse(drop.dataset.current)[idx];
            if (inputId === 'inputNama') {
                document.getElementById('inputNama').value = data.nama;
                document.getElementById('inputKamar').value = data.kamar || '';
                document.getElementById('inputJenjang').value = data.jenjang || '';
            } else {
                document.getElementById('inputBuku').value = data.judul;
                document.getElementById('inputKategori').value = data.kategori || '';
            }
            drop.style.display = 'none';
        }

        document.getElementById('guestForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const namaUser = document.getElementById('inputNama').value;
            const modal = document.getElementById('customModal');
            const modalBody = document.getElementById('modalBodyContent');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>MEMPROSES...';

            try {
                // CEK COOLDOWN 3 JAM
                const threeHoursAgo = new Date(Date.now() - 3 * 60 * 60 * 1000).toISOString();
                const { data: recentLogs, error: checkError } = await client
                    .from('data_pengunjung')
                    .select('created_at')
                    .eq('nama', namaUser)
                    .gt('created_at', threeHoursAgo)
                    .limit(1);

                if (checkError) throw checkError;

                if (recentLogs && recentLogs.length > 0) {
                    // TAMPILAN MODAL COOLDOWN
                    modalBody.innerHTML = `
                        <div class="text-center py-6">
                            <div class="w-20 h-20 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-clock-rotate-left text-4xl"></i>
                            </div>
                            <h2 class="text-slate-800 font-extrabold text-xl mb-2">UPS, TUNGGU DULU!</h2>
                            <p class="text-slate-500 text-sm font-semibold leading-relaxed">
                                Anda telah mencatat kunjungan hari ini.<br>Kembali lagi pada jam selanjutnya!
                            </p>
                        </div>`;
                    modal.style.display = 'flex';
                    return;
                }

                // JIKA LOLOS CEK, INSERT DATA
                const payload = {
                    nama: namaUser,
                    kamar: document.getElementById('inputKamar').value,
                    jenjang: document.getElementById('inputJenjang').value,
                    judul_buku: document.getElementById('inputBuku').value,
                    kategori: document.getElementById('inputKategori').value,
                    aktivitas: document.getElementById('inputAktivitas').value,
                    created_at: new Date().toISOString()
                };

                const { error: errInsert } = await client.from('data_pengunjung').insert([payload]);
                if (errInsert) throw errInsert;

                // AMBIL DATA REKAP UNTUK TAMPILAN SUKSES
                const { data: viewData } = await client.from('rekap_pengunjung_lengkap').select('*').eq('nama', namaUser).maybeSingle();

                if (viewData) {
                    const r = calculateRank(viewData.poin_saat_ini);
                    modalBody.innerHTML = `
                        <div class="text-center flex flex-col items-center mb-4">
                            <div class="w-24 h-24 mb-1 overflow-hidden">
                                <img src="${r.img}" alt="Rank" class="w-full h-full object-contain">
                            </div>
                            <div class="text-sky-600 text-[10px] font-black tracking-widest uppercase mb-1">${r.name}</div>
                            <h2 class="text-slate-800 font-extrabold text-lg uppercase tracking-tight w-full truncate">${viewData.nama}</h2>
                            <div class="text-slate-400 text-[9px] font-bold uppercase mt-1">${viewData.jenjang} • KAMAR ${viewData.kamar}</div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <div class="stat-card border-sky-100 bg-sky-50/30">
                                <span class="text-[8px] font-bold text-sky-600 uppercase">Poin Kamu</span><br>
                                <span class="text-xl font-black text-sky-600">${viewData.poin_saat_ini}</span>
                            </div>
                            <div class="stat-card">
                                <span class="text-[8px] font-bold text-slate-400 uppercase">Kunjungan</span><br>
                                <span class="text-xl font-black text-slate-800">${viewData.total_kunjungan}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <div class="stat-card">
                                <span class="text-[8px] font-bold text-slate-400 uppercase">Total Baca</span><br>
                                <span class="text-lg font-black text-slate-700">${viewData.total_baca}</span>
                            </div>
                            <div class="stat-card">
                                <span class="text-[8px] font-bold text-slate-400 uppercase">Total Pinjam</span><br>
                                <span class="text-lg font-black text-slate-700">${viewData.total_pinjam}</span>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                            <span class="text-[9px] font-bold text-slate-500 uppercase flex items-center gap-2 mb-1">
                                <i class="fa-solid fa-clock-rotate-left"></i> Riwayat Koleksi
                            </span>
                            <div class="text-[10px] text-slate-600 leading-tight font-semibold max-h-20 overflow-y-auto italic">
                                ${viewData.history_judul_buku || 'Belum ada riwayat.'}
                            </div>
                        </div>`;
                }
                modal.style.display = 'flex';
            } catch (err) {
                showToast("Gagal: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i>Simpan & Sinkron';
            }
        };

        document.getElementById('modalAction').onclick = () => location.reload();
    </script>
</body>
</html>
