<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akses Cepat | Perpustakaan Lubangsa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-page: #070708;
            --bg-card: #111112;
            --text-primary: #f5f5f7;
            --text-secondary: #7e8280;
            --border-color: rgba(255, 255, 255, 0.06);
            --accent-color: #0a84ff;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            outline: none !important;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Kartu shortcut dengan efek scale up halus saat di-hover */
        .shortcut-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .shortcut-card:hover {
            border-color: rgba(10, 132, 255, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        /* Pembungkus preview iframe kecil */
        .preview-window {
            width: 100%;
            height: 200px;
            background: #161618;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Overlay transparan agar klik di iframe tidak macet dan langsung memicu buka tab baru */
        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 10;
            background: transparent;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* Menonaktifkan kontrol scroll internal di dalam preview */
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md mx-auto text-center">
        
        <header class="mb-8">
            <div class="inline-flex items-center gap-1.5 text-[9px] font-extrabold text-[var(--accent-color)] tracking-widest uppercase mb-2">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-[var(--accent-color)]"></span> Pintasan Eksternal
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-white uppercase mb-1">
                Akses Media Utama
            </h1>
            <p class="text-xs text-[var(--text-secondary)]">Klik kartu untuk membuka situs web secara penuh di tab baru.</p>
        </header>

        <div class="shortcut-card p-4 text-left relative group" onclick="openTargetSite()">
            
            <div class="click-overlay"></div>

            <div class="preview-window mb-4">
                <iframe src="https://lensaperpustakaanlubangsa.vercel.app/" scrolling="no"></iframe>
            </div>

            <div class="flex items-start justify-between gap-3 px-1">
                <div class="min-w-0">
                    <h3 class="text-sm font-bold text-white uppercase tracking-wide group-hover:text-[var(--accent-color)] transition-colors truncate">
                        Lensa Perpustakaan Lubangsa
                    </h3>
                    <p class="text-[11px] text-[var(--text-secondary)] mt-0.5 truncate">
                        https://lensaperpustakaanlubangsa.vercel.app/
                    </p>
                </div>
                
                <div class="w-8 h-8 flex items-center justify-center bg-neutral-900 border border-neutral-800 text-gray-400 group-hover:text-white group-hover:border-blue-500/30 rounded-lg shrink-0 transition-colors">
                    <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                </div>
            </div>

        </div>

        <footer class="mt-8 border-t border-[var(--border-color)] pt-4 w-full">
            <p class="text-[10px] font-semibold text-neutral-600 uppercase tracking-widest">Perpustakaan Lubangsa © 2026</p>
        </footer>

    </div>

    <script>
        // Fungsi eksekusi buka tab baru secara instan
        function openTargetSite() {
            window.open("https://lensaperpustakaanlubangsa.vercel.app/", "_blank", "noopener,noreferrer");
        }
    </script>
</body>
</html>
