<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik Petugas • Gemini Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #f8f9fa; --bg-card: #ffffff; --text-main: #1f1f1f;
            --text-muted: #5f6368; --accent: #1a73e8; --border: #e2e8f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000; --bg-card: #121212; --text-main: #e3e3e3;
                --text-muted: #9aa0a6; --accent: #8ab4f8; --border: #2d2d2d;
            }
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-main); min-height: 100vh; padding: clamp(20px, 5vw, 40px); transition: all 0.3s ease; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .card { 
            background: var(--bg-card); border-radius: 28px; padding: 24px; 
            border: 1px solid var(--border); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px -10px rgba(0,0,0,0.1); }
        
        .rank-avatar { 
            width: 56px; height: 56px; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; background: var(--bg-main); border: 1px solid var(--border); 
        }

        .stat-pill { background: var(--bg-main); padding: 12px 4px; border-radius: 16px; text-align: center; border: 1px solid transparent; }
        
        /* Progress Bar Animation */
        .progress-track { width: 100%; height: 6px; background: var(--bg-main); border-radius: 10px; overflow: hidden; margin-top: 12px; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: width 1s ease-out; width: 0; }
        
        .loader-ui { text-align: center; padding: 60px; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        input[type="date"] {
            background: transparent; border: none; color: inherit; font-family: inherit; font-size: 13px; font-weight: 700; outline: none; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
        <div class="title-group">
            <p class="text-[10px] font-extrabold tracking-[3px] text-blue-500 uppercase mb-2">Performance Analytics</p>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight">Statistik Petugas</h1>
        </div>
        
        <div class="flex items-center gap-3 bg-[var(--bg-card)] p-2 px-4 rounded-2xl border border-[var(--border)] shadow-sm">
            <i class="fa-solid fa-calendar text-blue-500 text-sm"></i>
            <div class="flex flex-col">
                <span class="text-[8px] font-bold opacity-40 uppercase tracking-tighter">Mulai Dari</span>
                <input type="date" id="startDate">
            </div>
            <button onclick="window.loadStats()" class="bg-blue-500 hover:bg-blue-600 text-white p-2 px-4 rounded-xl text-[10px] font-bold transition-all ml-2">UPDATE</button>
        </div>
    </header>

    <div id="loading" class="loader-ui">
        <div class="spinner"></div>
        <p class="text-[10px] font-black uppercase tracking-[2px] mt-4 opacity-40">Calculating Insights...</p>
    </div>

    <div id="rekapGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 opacity-0 transition-opacity duration-500">
        </div>
</div>

<script type="module">
    import { supabase } from './supa/supa.js';

    // Set default tanggal ke awal bulan ini agar data tidak terlalu berat saat pertama load
    const today = new Date();
    const firstDayMonth = `${today.getFullYear()}-${(today.getMonth() + 1).toString().padStart(2, '0')}-01`;
    document.getElementById('startDate').value = firstDayMonth;

    const getRankInfo = (score) => {
        if (score >= 95) return { name: "Mythic", color: "text-rose-500", bg: "bg-rose-500/10", icon: "👑" };
        if (score >= 85) return { name: "Legend", color: "text-orange-500", bg: "bg-orange-500/10", icon: "💎" };
        if (score >= 70) return { name: "Epic", color: "text-purple-500", bg: "bg-purple-500/10", icon: "⚔️" };
        if (score >= 40) return { name: "Grandmaster", color: "text-blue-500", bg: "bg-blue-500/10", icon: "🛡️" };
        return { name: "Warrior", color: "text-slate-500", bg: "bg-slate-500/10", icon: "👣" };
    };

    async function loadStats() {
        const grid = document.getElementById('rekapGrid');
        const loading = document.getElementById('loading');
        const startStr = document.getElementById('startDate').value;

        grid.classList.remove('opacity-100');
        grid.classList.add('opacity-0');
        loading.style.display = 'block';

        try {
            // Ambil data secara paralel
            const [p, j, r] = await Promise.all([
                supabase.from('petugas_master').select('nama').order('nama'),
                supabase.from('jadwal_detail').select('*'),
                supabase.from('rekap_absensi').select('*').gte('tanggal', startStr)
            ]);

            const master = p.data || [];
            const jadwal = j.data || [];
            const rekap = r.data || [];

            grid.innerHTML = master.map(user => {
                const logs = rekap.filter(l => l.nama === user.nama);
                const hadir = logs.filter(l => l.status === 'Hadir').length;
                const izin = logs.filter(l => l.status === 'Izin').length;
                const alpha = logs.filter(l => l.status === 'Alpha').length;
                
                // Menghitung berapa kali seharusnya masuk berdasarkan log yang ada
                // atau total record yang sudah terinput di rekap_absensi untuk shift dia
                const totalLogs = logs.length;
                
                // Kalkulasi Score: Hadir dibanding Total Record (Hadir + Izin + Alpha)
                const score = totalLogs > 0 ? Math.round((hadir / totalLogs) * 100) : 0;
                const rank = getRankInfo(score);

                return `
                    <div class="card">
                        <div class="flex items-center gap-4 mb-6">
                            <div class="rank-avatar ${rank.bg}">${rank.icon}</div>
                            <div class="name-tag">
                                <h3 class="text-base font-bold tracking-tight">${user.nama}</h3>
                                <p class="text-[9px] font-black uppercase tracking-wider ${rank.color}">${rank.name}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-2 mb-6">
                            <div class="stat-pill border-b-2 border-green-500/20">
                                <span class="val block text-lg font-black text-green-500">${hadir}</span>
                                <span class="lbl text-[8px] font-bold opacity-40 uppercase">Hadir</span>
                            </div>
                            <div class="stat-pill border-b-2 border-amber-500/20">
                                <span class="val block text-lg font-black text-amber-500">${izin}</span>
                                <span class="lbl text-[8px] font-bold opacity-40 uppercase">Izin</span>
                            </div>
                            <div class="stat-pill border-b-2 border-red-500/20">
                                <span class="val block text-lg font-black text-red-500">${alpha}</span>
                                <span class="lbl text-[8px] font-bold opacity-40 uppercase">Alpha</span>
                            </div>
                        </div>

                        <div class="pt-4 border-t border-dashed border-[var(--border)]">
                            <div class="flex justify-between items-end mb-1">
                                <span class="text-[9px] font-black opacity-30 uppercase tracking-widest">Consistency</span>
                                <span class="text-sm font-black text-blue-500">${score}%</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" style="width: ${score}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Tampilkan grid dengan animasi
            setTimeout(() => {
                loading.style.display = 'none';
                grid.classList.remove('opacity-0');
                grid.classList.add('opacity-100');
            }, 300);

        } catch (e) {
            console.error("Fetch Error:", e);
            grid.innerHTML = `<p class="text-center col-span-full opacity-50 text-sm">Gagal memuat data. Periksa koneksi atau RLS Supabase.</p>`;
        }
    }

    window.loadStats = loadStats;
    window.onload = loadStats;
</script>

</body>
</html>
