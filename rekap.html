<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Rekap • Lubangsa Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --snow-blue-bg: #f0f7ff; 
            --snow-blue-card: #e2eeff;
        }
        body { 
            background: var(--snow-blue-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }
        h1 { font-family: 'Cinzel', serif; }
        
        .glass-container {
            background: var(--snow-blue-card);
            backdrop-filter: blur(20px);
            border: 2px solid #ffffff;
            border-radius: 4rem;
            box-shadow: 0 40px 100px -20px rgba(148, 187, 233, 0.3);
        }

        .petugas-stat-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid white;
            border-radius: 2.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .counter-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 6px;
            border-radius: 1.2rem;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .label-status {
            font-size: 7px;
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 4px;
            color: #94a3b8;
        }

        /* Rank Image Style */
        .rank-img-circle {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="mb-12 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase leading-none">Statistik Petugas</h1>
                <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] mt-2">Performance & Attendance Summary</p>
            </div>
            
            <div class="flex gap-4">
                <div class="bg-white px-6 py-3 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Dimulai Sejak</p>
                    <input type="date" id="startDate" onchange="loadRekapIndividu()" class="text-xs font-bold outline-none text-slate-700">
                </div>
                <button onclick="loadRekapIndividu()" class="bg-slate-900 text-white px-8 py-4 rounded-3xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 transition-all">
                    Update
                </button>
            </div>
        </header>

        <div id="rekapGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="loading" class="text-center py-20 text-blue-300">
            <i class="fas fa-snowflake fa-spin text-5xl"></i>
        </div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);

        const today = new Date();
        document.getElementById('startDate').value = `${today.getFullYear()}-01-01`;

        async function loadRekapIndividu() {
            document.getElementById('loading').classList.remove('hidden');
            const grid = document.getElementById('rekapGrid');
            const startStr = document.getElementById('startDate').value;
            grid.innerHTML = "";

            try {
                const { data: masterPetugas } = await client.from('petugas_master').select('nama');
                const { data: jadwal } = await client.from('jadwal_detail').select('*');
                const { data: rekap } = await client.from('rekap_absensi').select('*').gte('tanggal', startStr);

                const weeksElapsed = getWeeksBetween(new Date(startStr), new Date());

                masterPetugas.forEach(p => {
                    const logs = rekap.filter(r => r.nama === p.nama);
                    const hadir = logs.filter(l => l.status === 'Hadir').length;
                    const izin = logs.filter(l => l.status === 'Izin').length;
                    const alpha = logs.filter(l => l.status === 'Alpha').length;

                    const shiftPerMinggu = jadwal.filter(j => j.nama === p.nama).length;
                    const totalSeharusnya = shiftPerMinggu * weeksElapsed;
                    const score = calculateScore(hadir, totalSeharusnya);
                    
                    const tidakAbsen = Math.max(0, totalSeharusnya - logs.length);

                    // Logika Rank Baru sesuai instruksi pengguna
                    let rankName, rankImg, rankColor;
                    
                    if (score > 70) { 
                        rankName = "Mythic"; 
                        rankImg = "Mythic.jpg"; 
                        rankColor = "text-rose-500"; 
                    } 
                    else if (score >= 50) { 
                        rankName = "Legend"; 
                        rankImg = "Legend.jpg"; 
                        rankColor = "text-orange-500"; 
                    } 
                    else if (score >= 20) { 
                        rankName = "Epic"; 
                        rankImg = "Epic.jpg"; 
                        rankColor = "text-purple-500"; 
                    } 
                    else if (score >= 10) { 
                        rankName = "Grandmaster"; 
                        rankImg = "Grandmaster.jpg"; 
                        rankColor = "text-blue-500"; 
                    } 
                    else { 
                        rankName = "Warrior"; 
                        rankImg = "Warrior.jpg"; 
                        rankColor = "text-slate-500"; 
                    }

                    grid.innerHTML += `
                        <div class="petugas-stat-card p-8">
                            <div class="flex items-center gap-4 mb-6">
                                <div class="w-14 h-14 flex items-center justify-center">
                                    <img src="${rankImg}" alt="${rankName}" class="rank-img-circle">
                                </div>
                                <div>
                                    <h3 class="text-md font-black text-slate-800 uppercase leading-none">${p.nama}</h3>
                                    <p class="text-[8px] font-extrabold ${rankColor} uppercase tracking-widest mt-1">${rankName}</p>
                                </div>
                            </div>

                            <div class="counter-grid">
                                <div class="counter-box">
                                    <span class="text-lg font-black text-green-500">${hadir}</span>
                                    <span class="label-status">Hadir</span>
                                </div>
                                <div class="counter-box">
                                    <span class="text-lg font-black text-amber-500">${izin}</span>
                                    <span class="label-status">Izin</span>
                                </div>
                                <div class="counter-box">
                                    <span class="text-lg font-black text-red-500">${alpha}</span>
                                    <span class="label-status">Alpha</span>
                                </div>
                                <div class="counter-box bg-slate-100 border-slate-200">
                                    <span class="text-lg font-black text-slate-400">${tidakAbsen}</span>
                                    <span class="label-status">N/A</span>
                                </div>
                            </div>
                            
                            <div class="mt-6 pt-4 border-t border-dashed border-slate-200 flex justify-between items-center">
                                <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Performance Score</span>
                                <span class="text-xs font-black text-blue-600">${score}%</span>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error loading data:", error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function getWeeksBetween(d1, d2) {
            let diff = (d2.getTime() - d1.getTime()) / (7 * 24 * 60 * 60 * 1000);
            return Math.max(1, Math.ceil(diff));
        }

        function calculateScore(hadir, total) {
            if (total <= 0) return 0;
            return Math.min(100, Math.round((hadir / total) * 100));
        }

        window.onload = loadRekapIndividu;
    </script>
</body>
</html>
