<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Rekap • Lubangsa Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            color: #1e293b;
        }
        h1 { font-family: 'Cinzel', serif; }
        
        .stat-card {
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
            border-color: #3b82f633;
        }

        .counter-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 6px;
            border-radius: 1.25rem;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }
        .stat-card:hover .counter-box { background: white; }

        .progress-bar {
            height: 6px;
            border-radius: 10px;
            background: #f1f5f9;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease-out;
        }

        .avatar-box {
            width: 56px; height: 56px; border-radius: 1.25rem;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.25rem; color: white;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.3);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.5);
        }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-1 h-blue-600 bg-blue-600 rounded-full"></div>
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em]">Analytics Engine</p>
                </div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase leading-none">Rekapitulasi SDM</h1>
            </div>
            
            <div class="flex items-center gap-3 bg-white p-2 rounded-[2rem] border border-slate-200 shadow-sm">
                <div class="px-5 py-2">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-0.5">Filter Mulai</p>
                    <input type="date" id="startDate" onchange="loadRekapIndividu()" class="text-xs font-bold outline-none text-slate-700 bg-transparent">
                </div>
                <button onclick="loadRekapIndividu()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-slate-900 transition-all shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
        </header>

        <div id="loading" class="flex flex-col items-center py-20">
            <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-4">Menghitung Performa...</p>
        </div>

        <div id="rekapGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);

        // Set default filter ke awal bulan ini agar data lebih relevan
        const now = new Date();
        document.getElementById('startDate').value = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-01`;

        async function loadRekapIndividu() {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('rekapGrid');
            loading.classList.remove('hidden');
            grid.classList.add('hidden');
            
            const startStr = document.getElementById('startDate').value;
            grid.innerHTML = "";

            try {
                const { data: masterPetugas } = await client.from('petugas_master').select('nama');
                const { data: jadwal } = await client.from('jadwal_detail').select('*');
                const { data: rekap } = await client.from('rekap_absensi').select('*').gte('tanggal', startStr);

                const weeksElapsed = getWeeksBetween(new Date(startStr), new Date());

                masterPetugas.forEach(p => {
                    const logs = rekap.filter(r => r.nama === p.nama);
                    const hadir = logs.filter(l => l.status === 'Hadir').length;
                    const izin = logs.filter(l => l.status === 'Izin').length;
                    const alpha = logs.filter(l => l.status === 'Alpha').length;

                    const shiftPerMinggu = jadwal.filter(j => j.nama === p.nama).length;
                    const totalSeharusnya = shiftPerMinggu * weeksElapsed;
                    const tidakAbsen = Math.max(0, totalSeharusnya - logs.length);
                    const score = calculateScore(hadir, totalSeharusnya);

                    grid.innerHTML += `
                        <div class="stat-card p-7">
                            <div class="flex items-center gap-4 mb-8">
                                <div class="avatar-box bg-blue-600">
                                    ${p.nama.charAt(0)}
                                </div>
                                <div>
                                    <h3 class="text-sm font-black text-slate-800 uppercase tracking-tight">${p.nama}</h3>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Staf Perpustakaan</p>
                                </div>
                                <div class="ml-auto text-right">
                                    <span class="text-xs font-black text-blue-600">${score}%</span>
                                    <div class="text-[7px] font-bold text-slate-400 uppercase">Performa</div>
                                </div>
                            </div>

                            <div class="grid grid-cols-4 gap-2">
                                <div class="counter-box">
                                    <span class="text-sm font-black text-emerald-600">${hadir}</span>
                                    <span class="text-[7px] font-bold text-slate-400 uppercase mt-1">Hadir</span>
                                </div>
                                <div class="counter-box">
                                    <span class="text-sm font-black text-amber-500">${izin}</span>
                                    <span class="text-[7px] font-bold text-slate-400 uppercase mt-1">Izin</span>
                                </div>
                                <div class="counter-box">
                                    <span class="text-sm font-black text-rose-500">${alpha}</span>
                                    <span class="text-[7px] font-bold text-slate-400 uppercase mt-1">Alpha</span>
                                </div>
                                <div class="counter-box">
                                    <span class="text-sm font-black text-slate-400">${tidakAbsen}</span>
                                    <span class="text-[7px] font-bold text-slate-400 uppercase mt-1">N/A</span>
                                </div>
                            </div>
                            
                            <div class="mt-6">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Attendance Rate</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill ${getScoreColor(score)}" style="width: ${score}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
            } finally {
                loading.classList.add('hidden');
                grid.classList.remove('hidden');
            }
        }

        function getWeeksBetween(d1, d2) {
            const diff = (d2.getTime() - d1.getTime()) / (7 * 24 * 60 * 60 * 1000);
            return Math.max(1, Math.ceil(diff));
        }

        function calculateScore(hadir, total) {
            if (total === 0) return 0;
            return Math.min(100, Math.round((hadir / total) * 100));
        }

        function getScoreColor(score) {
            if (score >= 80) return 'bg-emerald-500';
            if (score >= 50) return 'bg-amber-500';
            return 'bg-rose-500';
        }

        window.onload = loadRekapIndividu;
    </script>
</body>
</html>
