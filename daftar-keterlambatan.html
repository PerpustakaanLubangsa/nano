<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Excel - Keterlambatan | Perpustakaan Lubangsa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-card: #ffffff;
            --text-main: #1f1f1f;
            --text-muted: #5f6368;
            --accent: #1a73e8;
            --border: #e2e8f0;
            --radius-sharp: 4px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-card: #111111;
                --text-main: #e3e3e3;
                --text-muted: #9aa0a6;
                --accent: #8ab4f8;
                --border: #1e1f20;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; border: none; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        body { 
            background-color: transparent; 
            color: var(--text-main); 
            padding: 20px 0; 
        }

        .table-container { 
            background: var(--bg-card); 
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sharp); 
            overflow-x: auto; 
        }

        table { width: 100%; border-collapse: collapse; }
        
        th { 
            background-color: var(--bg-card); 
            color: var(--text-muted); 
            font-size: 11px; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            padding: 14px 16px; 
            border-bottom: 2px solid var(--border); 
            text-align: left;
        }
        
        td { 
            padding: 14px 16px; 
            border-bottom: 1px solid var(--border); 
            font-size: 13px; 
            color: var(--text-main); 
        }

        tr:last-child td { border-bottom: none; }

        .btn-copy { 
            background: var(--accent); 
            color: white; 
            padding: 10px 18px; 
            border-radius: var(--radius-sharp); 
            font-weight: 700; 
            font-size: 12px; 
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease; 
            cursor: pointer; 
        }
        .btn-copy:hover { 
            opacity: 0.9;
            transform: translateY(-1px); 
        }
        .btn-copy:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="w-full mx-auto">
    <div class="flex justify-between items-center mb-6 px-1">
        <div>
            <h1 class="text-lg font-extrabold text-[var(--text-main)]">Ekspor Data Terlambat</h1>
            <p class="text-xs text-[var(--text-muted)] font-medium mt-0.5">Format bersih teroptimasi siap tempel langsung ke Excel</p>
        </div>
        <button onclick="copyTableToClipboard()" class="btn-copy">
            <i class="fa-solid fa-copy"></i> SALIN DATA EXCEL
        </button>
    </div>

    <div class="table-container">
        <table id="exportTable">
            <thead>
                <tr>
                    <th style="width: 60px; text-align: center;">No</th>
                    <th>Nama Anggota</th>
                    <th>Kamar</th>
                    <th>Judul Buku</th>
                    <th>Penulis</th>
                    <th style="text-align: center;">Telat</th>
                    <th style="text-align: right;">Denda</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="7" class="text-center py-12 text-[var(--text-muted)] italic">
                        <i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Memuat data sirkulasi keterlambatan...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-slate-100 text-white dark:text-black px-6 py-3 rounded-md text-xs font-bold opacity-0 transition-all duration-300 pointer-events-none shadow-xl flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-green-500 text-sm"></i> Berhasil disalin! Silakan buka Excel dan tekan Ctrl+V.
    </div>
</div>

<script>
    const S_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
    const client = supabase.createClient(S_URL, S_KEY);

    async function loadData() {
        const localNow = new Date();
        const todayZero = new Date(localNow.getFullYear(), localNow.getMonth(), localNow.getDate());

        try {
            // Tarik data seluruh buku yang berstatus DIPINJAM tanpa filter tanggal di tingkat query, 
            // agar data yang kolom tgl_kembali-nya null / kosong tidak ikut terbuang.
            const { data, error } = await client
                .from('sirkulasi')
                .select('nama_anggota, kamar, judul_buku, penulis, tgl_pinjam, tgl_kembali') 
                .eq('status', 'DIPINJAM')
                .order('tgl_pinjam', { ascending: true })
                .limit(1000);

            if (error) throw error;

            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-[var(--text-muted)] italic">Tidak ada data santri yang sedang meminjam buku.</td></tr>';
                return;
            }

            let validRowCount = 0;

            data.forEach((item) => {
                let deadlineDate = null;

                // LOGIKA BACKUP JIKA TGL_KEMBALI KOSONG (NULL)
                if (item.tgl_kembali) {
                    const parts = item.tgl_kembali.split('-');
                    if(parts.length === 3) {
                        deadlineDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                    }
                } else if (item.tgl_pinjam) {
                    // Jika tgl_kembali null, gunakan tgl_pinjam + 4 hari (Pinjam tanggal 1 + 4 hari = Batas tanggal 5)
                    const parts = item.tgl_pinjam.split('-');
                    if(parts.length === 3) {
                        const pinjamDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                        pinjamDate.setDate(pinjamDate.getDate() + 4); 
                        deadlineDate = pinjamDate;
                    }
                }

                // Jika kedua kolom tanggal tidak valid, lewati baris ini
                if (!deadlineDate) return;

                // Hitung selisih hari antara Hari Ini dengan Tanggal Batas Kembali
                const diffTime = todayZero - deadlineDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                // Jika diffDays <= 0 berarti belum terlambat (masih dalam masa peminjaman sah)
                if (diffDays <= 0) return;

                const denda = diffDays * 1000;
                validRowCount++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="text-align: center; font-weight: 600; color: var(--text-muted);">${validRowCount}</td>
                    <td style="font-weight: 600;">${item.nama_anggota || '-'}</td>
                    <td>${item.kamar || '-'}</td>
                    <td style="font-weight: 500;">${item.judul_buku || '-'}</td>
                    <td>${item.penulis || '-'}</td> 
                    <td style="text-align: center; font-weight: 700;" class="text-red-500">${diffDays} Hari</td>
                    <td style="text-align: right; font-weight: 700; color: var(--accent);">Rp ${denda.toLocaleString('id-ID')}</td>
                `;
                body.appendChild(tr);
            });

            // Jika setelah pengecekan tidak ada baris yang lolos kualifikasi keterlambatan
            if (validRowCount === 0) {
                body.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-[var(--text-muted)] italic">Tidak ada data santri yang terlambat mengembalikan buku.</td></tr>';
            }

        } catch (error) {
            console.error("Error Detail:", error.message);
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="text-center py-12 text-red-500 font-medium"><i class="fa-solid fa-triangle-exclamation mr-2"></i> Gagal memuat data: ${error.message}</td></tr>`;
        }
    }

    function copyTableToClipboard() {
        const table = document.getElementById('exportTable');
        const range = document.createRange();
        range.selectNode(table);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        
        try {
            document.execCommand('copy');
            showToast();
        } catch (err) {
            alert('Gagal menyalin data tabel.');
        }
        window.getSelection().removeAllRanges();
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.opacity = '1';
        toast.style.transform = 'translate(-50%, -8px)';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translate(-50%, 0)';
        }, 3000);
    }

    window.onload = loadData;
</script>

</body>
</html>
