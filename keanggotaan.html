<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pemustaka</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #000000;
            --bg-card: #111111;
            --text-main: #e3e3e3;
            --text-muted: #9aa0a6;
            --accent: #8ab4f8;
            --border: #222222;
            --danger: #f28b82;
            --input-bg: #1a1a1a;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        * { margin: 0; padding: 0; box-sizing: border-box; border: none; outline: none; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            width: 100%; height: 100%;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .app-wrapper {
            max-width: 600px; margin: 0 auto; width: 100%;
            min-height: 100vh; display: flex; flex-direction: column;
            padding: 16px; position: relative;
        }

        /* List Items */
        .list-container { flex: 1; padding-bottom: 100px; }
        .card-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 12px; margin-bottom: 8px;
            background: var(--bg-card); border-radius: 14px;
            cursor: pointer; transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .card-item:active { transform: scale(0.98); background: var(--border); }

        .content-box { flex: 1; min-width: 0; }
        .content-box h3 { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .content-box p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .role-badge { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--accent); opacity: 0.8; }

        /* Floating Search Bar */
        .floating-bar {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px); max-width: 500px;
            background: var(--bg-card); border-radius: 30px;
            padding: 8px 8px 8px 20px; display: flex; align-items: center;
            gap: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            z-index: 100; border: 1px solid var(--border);
        }
        .search-input { flex: 1; background: transparent; color: var(--text-main); font-size: 14px; }
        .btn-fab { width: 40px; height: 40px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Modal System */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px); display: none;
            justify-content: center; align-items: flex-end; z-index: 200;
        }
        .modal-overlay.active { display: flex; }
        .modal-pane {
            background: var(--bg-card); width: 100%; max-width: 600px;
            max-height: 85vh; overflow-y: auto;
            border-radius: 28px 28px 0 0; padding: 32px 24px 40px;
            animation: slideUp 0.3s cubic-bezier(0, 0, 0.2, 1);
            border-top: 1px solid var(--border);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Form Elements */
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .btn-del { color: var(--danger); font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .field-group { margin-bottom: 16px; }
        .field-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
        .field-input { 
            width: 100%; background: var(--input-bg); padding: 14px 16px; 
            border-radius: 12px; color: var(--text-main); font-size: 14px; 
            border: 1px solid var(--border);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-submit {
            width: 100%; background: var(--accent); color: #000; padding: 16px;
            border-radius: 16px; font-weight: 800; font-size: 12px;
            text-transform: uppercase; margin-top: 10px; cursor: pointer;
        }

        /* Status Toast (Pengganti Alert) */
        #statusToast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 20px; border-radius: 12px; background: var(--bg-card);
            border: 1px solid var(--border); z-index: 999; display: none;
            font-size: 13px; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .shimmer { height: 70px; background: var(--bg-card); margin-bottom: 8px; border-radius: 14px; position: relative; overflow: hidden; }
        .shimmer::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); animation: load 1.5s infinite; }
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="statusToast"></div>

<div class="app-wrapper">
    <div id="memberList" class="list-container"></div>
    <div id="sentinel" style="height: 50px;"></div>
</div>

<div class="floating-bar">
    <i class="fa-solid fa-magnifying-glass" style="color: #94a3b8; font-size: 14px;"></i>
    <input type="text" id="memberSearch" class="search-input" placeholder="Cari nama atau NIS..." autocomplete="off">
    <div onclick="openModal('NEW')" class="btn-fab"><i class="fa-solid fa-plus"></i></div>
</div>

<div id="memberModal" class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal-pane">
        <div class="modal-header">
            <h2 id="modalTitle" style="font-size: 20px; font-weight: 800;">Profil</h2>
            <div id="btnDelete" onclick="confirmDelete()" class="hidden btn-del">Hapus</div>
        </div>
        <form id="memberForm">
            <input type="hidden" id="m_id">
            <div class="field-group">
                <label class="field-label">NIS</label>
                <input type="text" id="m_nis" class="field-input" required>
            </div>
            <div class="field-group">
                <label class="field-label">Nama Lengkap</label>
                <input type="text" id="m_nama" class="field-input" required>
            </div>
            <div class="grid-2">
                <div class="field-group">
                    <label class="field-label">Jenjang</label>
                    <select id="m_jenjang" class="field-input">
                        <option value="SLTP">SLTP</option>
                        <option value="SLTA">SLTA</option>
                        <option value="PT">PT</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="field-label">Kamar</label>
                    <input type="text" id="m_kamar" class="field-input" style="text-transform: uppercase;">
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Role</label>
                <select id="m_role" class="field-input">
                    <option value="anggota">Anggota</option>
                    <option value="pustakawan">Pustakawan</option>
                </select>
            </div>
            <div class="field-group">
                <label class="field-label">Password</label>
                <input type="password" id="m_password" class="field-input" placeholder="Isi untuk set/ubah password">
            </div>
            <button type="submit" class="btn-submit" id="btnSubmitText">Simpan Data</button>
        </form>
    </div>
</div>

<div id="confirmModal" class="modal-overlay" style="align-items: center; background: rgba(0,0,0,0.9);">
    <div class="modal-pane" style="border-radius: 24px; width: 320px; padding: 32px; text-align: center;">
        <h3 style="margin-bottom: 12px;">Hapus Data?</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 24px;">Tindakan ini tidak dapat dibatalkan.</p>
        <div style="display: flex; gap: 12px;">
            <button onclick="document.getElementById('confirmModal').classList.remove('active')" style="flex: 1; padding: 12px; border-radius: 12px; background: var(--input-bg); color: #fff; font-weight: 700; cursor: pointer;">Batal</button>
            <button id="finalDeleteBtn" style="flex: 1; padding: 12px; border-radius: 12px; background: var(--danger); color: #000; font-weight: 700; cursor: pointer;">Hapus</button>
        </div>
    </div>
</div>

<script type="module">
    import { supabase } from './supa/supa.js';

    let page = 0;
    const perPage = 20;
    let hasMore = true;
    let isLoading = false;
    let searchQuery = '';
    let memoryCache = [];

    const list = document.getElementById('memberList');
    const searchInput = document.getElementById('memberSearch');

    function showToast(msg, color = 'var(--accent)') {
        const t = document.getElementById('statusToast');
        t.innerText = msg;
        t.style.borderColor = color;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function loadData(reset = false) {
        if (isLoading || (!hasMore && !reset)) return;
        isLoading = true;

        if (reset) {
            page = 0;
            hasMore = true;
            list.innerHTML = Array(6).fill('<div class="shimmer"></div>').join('');
        }

        const from = page * perPage;
        const to = from + perPage - 1;

        let query = supabase.from('anggota').select('*');

        if (searchQuery) {
            query = query.or(`nama.ilike.%${searchQuery}%,nis.ilike.%${searchQuery}%`);
        }

        const { data, error } = await query
            .order('nama', { ascending: true })
            .range(from, to);

        if (reset) list.innerHTML = '';

        if (error) {
            showToast("Error load data", "var(--danger)");
        } else {
            if (data.length < perPage) hasMore = false;
            data.forEach(m => {
                const div = document.createElement('div');
                div.className = 'card-item';
                div.onclick = () => openModal(m);
                div.innerHTML = `
                    <div class="content-box">
                        <h3>${m.nama}</h3>
                        <p>${m.nis || '-'} • ${m.jenjang || '-'} • ${m.kamar || '-'}</p>
                    </div>
                    <div class="role-badge">${m.role}</div>
                `;
                list.appendChild(div);
            });
            if (page === 0) memoryCache = data;
            page++;
        }
        isLoading = false;
    }

    // Modal Logic
    window.openModal = (data = 'NEW') => {
        const form = document.getElementById('memberForm');
        form.reset();
        const delBtn = document.getElementById('btnDelete');
        
        if (data === 'NEW') {
            document.getElementById('m_id').value = '';
            document.getElementById('modalTitle').innerText = 'Tambah Baru';
            document.getElementById('btnSubmitText').innerText = 'Tambah Pemustaka';
            delBtn.classList.add('hidden');
        } else {
            document.getElementById('m_id').value = data.id;
            document.getElementById('m_nis').value = data.nis;
            document.getElementById('m_nama').value = data.nama;
            document.getElementById('m_jenjang').value = data.jenjang;
            document.getElementById('m_kamar').value = data.kamar || '';
            document.getElementById('m_role').value = data.role;
            document.getElementById('modalTitle').innerText = 'Edit Profil';
            document.getElementById('btnSubmitText').innerText = 'Simpan Perubahan';
            delBtn.classList.remove('hidden');
        }
        document.getElementById('memberModal').classList.add('active');
    };

    window.closeModal = () => document.getElementById('memberModal').classList.remove('active');

    // CRUD Operations
    document.getElementById('memberForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('m_id').value;
        const payload = {
            nis: document.getElementById('m_nis').value,
            nama: document.getElementById('m_nama').value,
            jenjang: document.getElementById('m_jenjang').value,
            kamar: document.getElementById('m_kamar').value.toUpperCase(),
            role: document.getElementById('m_role').value,
            updated_at: new Date()
        };

        const pwd = document.getElementById('m_password').value;
        if (pwd) payload.password = pwd;

        let res;
        if (id) {
            res = await supabase.from('anggota').update(payload).eq('id', id);
        } else {
            res = await supabase.from('anggota').insert([payload]);
        }

        if (res.error) showToast("Gagal menyimpan", "var(--danger)");
        else {
            showToast("Berhasil disimpan");
            closeModal();
            loadData(true);
        }
    };

    window.confirmDelete = () => {
        document.getElementById('confirmModal').classList.add('active');
        document.getElementById('finalDeleteBtn').onclick = async () => {
            const id = document.getElementById('m_id').value;
            const { error } = await supabase.from('anggota').delete().eq('id', id);
            
            document.getElementById('confirmModal').classList.remove('active');
            if (error) showToast("Gagal menghapus", "var(--danger)");
            else {
                showToast("Data dihapus");
                closeModal();
                loadData(true);
            }
        };
    };

    // Infinity Scroll & Search
    const observer = new IntersectionObserver(e => {
        if (e[0].isIntersecting && hasMore && !isLoading) loadData();
    }, { rootMargin: '200px' });
    observer.observe(document.getElementById('sentinel'));

    let timer;
    searchInput.oninput = () => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            searchQuery = searchInput.value.trim();
            loadData(true);
        }, 500);
    };

    loadData(true);
</script>
</body>
</html>
