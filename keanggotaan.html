<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Daftar Anggota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-main: #000; 
            --bg-card: #0a0a0a; 
            --text-main: #ffffff; 
            --text-muted: #888; 
            --accent: #8ab4f8; 
            --border: #1a1a1a; 
            --shimmer-bg: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            padding: 16px; 
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app-wrapper { max-width: 600px; margin: 0 auto; padding-bottom: 110px; }

        .header { 
            position: sticky; top: 0; background: var(--bg-main); 
            padding: 20px 0 10px; z-index: 10; margin-bottom: 15px;
        }

        /* Card & Profile Photo */
        .card-item {
            display: flex; align-items: center; gap: 16px;
            padding: 14px 18px; margin-bottom: 12px; background: var(--bg-card);
            border-radius: 20px; cursor: pointer; border: 1px solid var(--border);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-item:active { transform: scale(0.97); background: var(--border); }

        .profile-img {
            width: 48px; height: 48px; border-radius: 16px;
            object-fit: cover; background: var(--shimmer-bg);
            border: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .content-box { flex: 1; }
        .content-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; letter-spacing: -0.3px; }
        .content-box p { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        /* Custom Floating Bar (Borderless Input) */
        .floating-bar {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px); max-width: 500px;
            background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(25px) saturate(180%);
            border-radius: 35px; padding: 6px 8px 6px 24px; 
            display: flex; align-items: center; gap: 12px;
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .search-input { 
            flex: 1; background: transparent; color: #fff; font-size: 15px; 
            border: none; outline: none; font-weight: 500; padding: 10px 0;
        }
        .search-input::placeholder { color: #555; }

        .btn-fab { 
            width: 44px; height: 44px; background: var(--accent); color: #000; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; flex-shrink: 0; transition: transform 0.2s;
        }
        .btn-fab:active { transform: scale(0.9); }

        /* Loading & Shimmer */
        .shimmer { 
            height: 76px; background: var(--shimmer-bg); border-radius: 20px; 
            margin-bottom: 12px; position: relative; overflow: hidden; 
        }
        .shimmer::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        #sentinel { height: 40px; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <h1 style="font-weight: 800; font-size: 28px; letter-spacing: -1px;">Pemustaka</h1>
    </div>
    
    <div id="memberList"></div>
    
    <div id="sentinel">
        <div class="spinner" id="loadingSpinner"></div>
    </div>
</div>

<div class="floating-bar">
    <i class="fa-solid fa-magnifying-glass" style="color: #444; font-size: 14px;"></i>
    <input type="text" id="memberSearch" class="search-input" placeholder="Cari nama atau NIS..." autocomplete="off">
    <div onclick="goToDetail('NEW')" class="btn-fab"><i class="fa-solid fa-plus"></i></div>
</div>

<script type="module">
    import { supabase } from './supa/supa.js';

    let page = 0;
    const perPage = 20;
    let searchQuery = '';
    let isLoading = false;
    let hasMore = true;
    
    const list = document.getElementById('memberList');
    const spinner = document.getElementById('loadingSpinner');

    window.goToDetail = (data) => {
        if (data === 'NEW') {
            localStorage.removeItem('selectedMember');
        } else {
            localStorage.setItem('selectedMember', JSON.stringify(data));
        }
        window.location.href = 'detail-keanggotaan.html';
    };

    async function loadData(reset = false) {
        if (isLoading || (!hasMore && !reset)) return;
        
        isLoading = true;
        if (reset) {
            page = 0;
            hasMore = true;
            list.innerHTML = Array(6).fill('<div class="shimmer"></div>').join('');
        } else {
            spinner.style.display = 'block';
        }

        try {
            let query = supabase.from('anggota').select('*', { count: 'exact' });
            
            if (searchQuery) {
                query = query.or(`nama.ilike.%${searchQuery}%,nis.ilike.%${searchQuery}%`);
            }
            
            const { data, error, count } = await query
                .order('nama', { ascending: true })
                .range(page * perPage, (page + 1) * perPage - 1);

            if (error) throw error;

            if (reset) list.innerHTML = '';
            
            if (data && data.length > 0) {
                data.forEach(m => {
                    const avatarUrl = m.foto || `https://ui-avatars.com/api/?name=${encodeURIComponent(m.nama)}&background=111&color=8ab4f8&bold=true`;
                    
                    const div = document.createElement('div');
                    div.className = 'card-item';
                    div.onclick = () => goToDetail(m);
                    div.innerHTML = `
                        <img src="${avatarUrl}" class="profile-img" alt="${m.nama}" loading="lazy">
                        <div class="content-box">
                            <h3>${m.nama}</h3>
                            <p>${m.nis || 'No NIS'} • Kamar ${m.kamar || '-'}</p>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="color: #222; font-size: 11px;"></i>
                    `;
                    list.appendChild(div);
                });

                page++;
                if (list.querySelectorAll('.card-item').length >= count) hasMore = false;
            } else {
                if (reset) list.innerHTML = '<p style="text-align:center; color: #444; margin-top: 40px; font-size: 14px;">Data tidak ditemukan</p>';
                hasMore = false;
            }
        } catch (err) {
            console.error("Load error:", err);
        } finally {
            isLoading = false;
            spinner.style.display = 'none';
        }
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isLoading && hasMore) {
            loadData();
        }
    }, { rootMargin: '150px' });

    observer.observe(document.getElementById('sentinel'));

    document.getElementById('memberSearch').oninput = (e) => {
        searchQuery = e.target.value.trim();
        clearTimeout(window.searchTimer);
        window.searchTimer = setTimeout(() => {
            loadData(true);
        }, 400);
    };

    loadData(true);
</script>
</body>
</html>
