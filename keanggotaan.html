<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sistem Pemustaka - Snow Edition (Monthly Rank)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --snow-bg: #f8fafc;
            --snow-card: #ffffff;
            --ice-blue: #3b82f6;
            --ice-light: #e0f2fe;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-soft: #e2e8f0;
        }

        body { 
            background-color: var(--snow-bg); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 14px; margin: 0; 
            padding-top: env(titlebar-area-inset-top, 20px);
            overflow-x: hidden;
        }
        
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .search-container { 
            background: var(--snow-card); border: 1px solid var(--border-soft); 
            border-radius: 16px; transition: all 0.3s ease; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .search-container:focus-within { 
            border-color: var(--ice-blue); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1); 
        }

        .list-row {
            display: grid; grid-template-columns: 80px 150px 1fr 100px 120px 100px;
            align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-soft);
            transition: background 0.2s ease; cursor: pointer; background: var(--snow-card);
            position: relative; width: 100%;
        }

        .list-row:hover { 
            background: var(--ice-light); 
            box-shadow: inset 4px 0 0 0 var(--ice-blue);
            z-index: 10; 
        }

        .list-header {
            display: grid; grid-template-columns: 80px 150px 1fr 100px 120px 100px;
            padding: 15px 20px; color: var(--text-muted); font-weight: 700; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 2px solid var(--border-soft);
            background: rgba(248, 250, 252, 0.9); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 40;
        }

        .rank-tag {
            font-size: 8px; font-weight: 900; letter-spacing: 0.05em; padding: 2px 6px;
            border-radius: 4px; text-transform: uppercase; width: fit-content;
        }
        .rank-Warrior { background: #fee2e2; color: #991b1b; }
        .rank-Grandmaster { background: #fef3c7; color: #92400e; }
        .rank-Epic { background: #f0fdf4; color: #166534; }
        .rank-Legend { background: #faf5ff; color: #6b21a8; }
        .rank-Mythic { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

        .role-badge {
            font-size: 9px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; font-weight: 800;
        }
        .role-admin { background: #fee2e2; color: #ef4444; }
        .role-pustakawan { background: #dcfce7; color: #22c55e; }
        .role-anggota { background: #e0f2fe; color: #0ea5e9; }

        .browser-input, .browser-select { 
            background: #f1f5f9 !important; border: 1px solid var(--border-soft) !important; 
            padding: 12px 16px !important; width: 100%; border-radius: 8px !important;
            outline: none;
        }
        .browser-input:focus { border-color: var(--ice-blue) !important; background: white !important; }

        .bottom-sheet { 
            position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 100; visibility: hidden; 
        }
        .bottom-sheet.active { transform: translateY(0); visibility: visible; }

        .icon-btn { 
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; 
            background: white; border: 1px solid var(--border-soft); border-radius: 12px; transition: 0.2s; 
        }
        .icon-btn:hover { border-color: var(--ice-blue); color: var(--ice-blue); }

        #toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150%); 
            background: var(--text-main); color: white; padding: 12px 24px; border-radius: 12px; z-index: 2000; 
            transition: transform 0.3s; 
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="antialiased">

    <div id="toast"><span id="toastText">Memproses...</span></div>

    <div class="max-w-6xl mx-auto px-6 py-10 md:py-16">
        <header class="flex flex-col md:flex-row justify-between items-end mb-12 gap-8">
            <div>
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900">Pemustaka<span class="text-blue-500">.</span></h1>
                <p class="text-slate-400 text-[10px] mt-2 font-bold uppercase tracking-[0.3em]">
                    Halo, <span id="displayUserName" class="text-blue-600">User</span> (<span id="displayUserRole">Role</span>) • <span class="text-slate-600" id="currentMonthLabel">BULAN INI</span>
                </p>
            </div>
            <button onclick="openMemberModal('NEW')" class="bg-blue-600 text-white px-8 py-4 rounded-xl text-xs font-bold uppercase tracking-widest shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                <i class="fa-solid fa-plus mr-2"></i> Tambah Anggota
            </button>
        </header>

        <div class="mb-8">
            <div class="search-container flex items-center px-6">
                <i class="fa-solid fa-search text-slate-300 mr-4"></i>
                <input type="text" id="memberSearch" placeholder="Cari Nama atau NIS..." class="w-full py-5 text-lg font-medium outline-none bg-transparent" 
                onkeyup="if(event.key==='Enter') { currentPage=0; loadMembers(); }">
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <div class="min-w-[900px]">
                    <div class="list-header">
                        <span class="text-center">Profil</span>
                        <span>Identitas & Rank (Bulan Ini)</span>
                        <span>Nama Lengkap</span>
                        <span>Jenjang</span>
                        <span>Role</span>
                        <span>Kamar</span>
                    </div>
                    <div id="memberList" class="divide-y divide-slate-100"></div>
                    <div id="loadingState" class="hidden p-20 text-center">
                        <i class="fa-solid fa-snowflake fa-spin text-blue-400 text-3xl"></i>
                        <p class="text-xs font-bold text-slate-400 mt-4 uppercase tracking-widest">Memproses Ranking Bulanan...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mt-6 px-2">
            <div class="text-[11px] text-slate-400 font-bold uppercase">Halaman <span id="pageNumber" class="text-blue-600">1</span></div>
            <div class="flex gap-2">
                <button id="prevBtn" onclick="changePage(-1)" class="icon-btn hover:border-blue-500"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="nextBtn" onclick="changePage(1)" class="icon-btn hover:border-blue-500"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <div id="memberModal" class="bottom-sheet overflow-y-auto">
        <div class="max-w-2xl mx-auto px-8 py-12">
            <div class="flex justify-between items-center mb-6 pb-4 border-b">
                <h2 class="text-2xl font-extrabold text-slate-900">Profil Anggota</h2>
                <div class="flex gap-2">
                    <button id="btnDeleteMember" onclick="askDelete()" class="hidden icon-btn text-red-500 hover:bg-red-50"><i class="fa-solid fa-trash"></i></button>
                    <button type="submit" form="memberForm" class="icon-btn !bg-blue-600 !text-white border-none"><i class="fa-solid fa-check"></i></button>
                    <button onclick="closeMemberModal()" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>

            <div id="rankDisplay" class="mb-8 p-6 bg-blue-50 rounded-2xl border border-blue-100 flex items-center gap-6">
                <div class="w-20 h-20 rounded-full border-4 border-white shadow-sm overflow-hidden bg-white flex items-center justify-center">
                    <img id="modalRankImg" src="" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=User&background=random'">
                </div>
                <div>
                    <div id="modalRankTag" class="rank-tag mb-1">Warrior</div>
                    <div class="text-xl font-black text-slate-800 uppercase tracking-tight">Status Aktivitas</div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Poin Bulan Ini: <span id="modalPoin" class="text-blue-600">0</span></p>
                </div>
            </div>

            <form id="memberForm" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
                <input type="hidden" id="memberId">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">NIS (Username)</label>
                    <input type="text" id="m_nis" required class="browser-input font-bold">
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Nama Lengkap</label>
                    <input type="text" id="m_nama" required class="browser-input font-semibold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Role</label>
                    <select id="m_role" class="browser-select font-bold"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Jenjang</label>
                    <select id="m_jenjang" required class="browser-select">
                        <option value="SLTP">SLTP</option>
                        <option value="SLTA">SLTA</option>
                        <option value="PT">PT</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Kamar</label>
                    <input type="text" id="m_kamar" class="browser-input uppercase">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Ganti Password</label>
                    <input type="password" id="m_password" placeholder="Kosongkan jika tidak diubah" class="browser-input">
                </div>
            </form>
        </div>
    </div>

    <script>
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3bWJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY'; 
        const client = supabase.createClient(SB_URL, SB_KEY);

        const myRole = (sessionStorage.getItem('userRole') || 'anggota').toLowerCase();
        const myName = sessionStorage.getItem('userName') || 'User';
        const myNis = sessionStorage.getItem('userNis');

        document.getElementById('displayUserName').innerText = myName;
        document.getElementById('displayUserRole').innerText = myRole.toUpperCase();

        let membersData = [], allProcessedMembers = [], currentPage = 0, itemsPerPage = 10;

        // FUNGSI RANKING: Menggunakan Posisi (Juara) sesuai rujukan buku tamu
        function getRankByPosition(pos) {
            const n = parseInt(pos) || 999;
            if (n <= 3) return { name: 'Mythic', img: 'Mythic.jpg' };
            if (n <= 10) return { name: 'Legend', img: 'Legend.jpg' };
            if (n <= 25) return { name: 'Epic', img: 'Epic.jpg' };
            if (n <= 50) return { name: 'Grandmaster', img: 'Grandmaster.jpg' };
            return { name: 'Warrior', img: 'Warrior.jpg' };
        }

        async function loadMembers() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('memberList').innerHTML = "";
            
            try {
                const q = document.getElementById('memberSearch').value;
                const now = new Date();
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
                
                const monthName = now.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
                document.getElementById('currentMonthLabel').innerText = monthName.toUpperCase();

                // 1. Ambil semua anggota
                let req = client.from('anggota').select('*');
                if(q) req = req.or(`nis.ilike.%${q}%,nama.ilike.%${q}%`);
                const { data: allMembers, error: errM } = await req;
                if(errM) throw errM;

                // 2. Ambil log aktivitas BULAN INI (GTE FirstDay)
                const { data: logs, error: errL } = await client
                    .from('data_pengunjung')
                    .select('nama')
                    .gte('created_at', firstDay);
                if(errL) throw errL;

                // 3. Hitung poin bulanan
                const monthlyPoints = {};
                logs.forEach(log => {
                    monthlyPoints[log.nama] = (monthlyPoints[log.nama] || 0) + 1;
                });

                // 4. Proses data & Sorting (Juara ditentukan dari poin tertinggi)
                allProcessedMembers = allMembers.map(m => ({
                    ...m,
                    poin_bulan_ini: monthlyPoints[m.nama] || 0
                })).sort((a, b) => b.poin_bulan_ini - a.poin_bulan_ini);

                // 5. Simpan urutan juara asli sebelum pagination
                allProcessedMembers.forEach((m, index) => {
                    m.currentRankPos = index + 1;
                });

                updatePagination();
            } catch (err) { 
                console.error(err);
                notify("Gagal memuat ranking bulanan", false);
            } finally { 
                document.getElementById('loadingState').classList.add('hidden'); 
            }
        }

        function updatePagination() {
            const from = currentPage * itemsPerPage;
            const to = from + itemsPerPage;
            membersData = allProcessedMembers.slice(from, to);
            
            renderMembers();
            
            document.getElementById('pageNumber').innerText = currentPage + 1;
            document.getElementById('prevBtn').disabled = (currentPage === 0);
            document.getElementById('nextBtn').disabled = (to >= allProcessedMembers.length);
        }

        function renderMembers() {
            const list = document.getElementById('memberList');
            if(membersData.length === 0) {
                list.innerHTML = `<div class="p-10 text-center text-slate-400 font-bold uppercase text-[10px]">Tidak ada data ditemukan</div>`;
                return;
            }

            list.innerHTML = membersData.map(m => {
                // Penentuan Gambar Rank berdasarkan posisi juara (m.currentRankPos)
                const rank = getRankByPosition(m.currentRankPos);
                return `
                <div onclick="openMemberModal('${m.id}')" class="list-row animate-in fade-in duration-500">
                    <div class="flex justify-center">
                        <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center border border-slate-200 overflow-hidden shadow-sm">
                            <img src="${rank.img}" onerror="this.src='https://ui-avatars.com/api/?name=${m.nama}&background=random'" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <div class="flex flex-col gap-1">
                        <span class="font-bold text-xs text-slate-900">Rank #${m.currentRankPos}</span>
                        <span class="rank-tag rank-${rank.name}">${rank.name}</span>
                    </div>
                    <div class="font-bold text-slate-700 truncate pr-4">
                        ${m.nama}
                        <div class="text-[9px] text-blue-500 font-black">${m.poin_bulan_ini} POIN BULAN INI</div>
                    </div>
                    <div class="text-[10px] font-bold text-slate-500">${m.jenjang || '---'}</div>
                    <div><span class="role-badge role-${m.role || 'anggota'}">${m.role || 'anggota'}</span></div>
                    <div class="text-slate-900 font-bold text-[11px]">${m.kamar || '---'}</div>
                </div>`;
            }).join('');
        }

        function openMemberModal(id) {
            const form = document.getElementById('memberForm');
            form.reset();
            document.getElementById('memberId').value = id;
            
            const roleSelect = document.getElementById('m_role');
            const passInput = document.getElementById('m_password');
            const deleteBtn = document.getElementById('btnDeleteMember');

            let roleOptions = `<option value="anggota">Anggota</option><option value="pustakawan">Pustakawan</option>`;
            if(myRole === 'admin') roleOptions += `<option value="admin">Admin</option>`;
            roleSelect.innerHTML = roleOptions;

            roleSelect.disabled = false;
            passInput.disabled = false;
            passInput.placeholder = "Isi untuk ubah password";

            if(id !== 'NEW') {
                const m = allProcessedMembers.find(x => x.id === id);
                if(m) {
                    document.getElementById('m_nis').value = m.nis || '';
                    document.getElementById('m_nama').value = m.nama || '';
                    roleSelect.value = m.role || 'anggota';
                    document.getElementById('m_jenjang').value = m.jenjang || 'SLTP';
                    document.getElementById('m_kamar').value = m.kamar || '';
                    
                    if(myRole === 'pustakawan') {
                        deleteBtn.classList.add('hidden');
                        if (m.nis !== myNis && m.role === 'pustakawan') {
                            roleSelect.disabled = true;
                            passInput.disabled = true;
                            passInput.placeholder = "Dibatasi";
                        }
                    } else if (myRole === 'admin') {
                        deleteBtn.classList.remove('hidden');
                    }

                    const rank = getRankByPosition(m.currentRankPos);
                    document.getElementById('rankDisplay').classList.remove('hidden');
                    document.getElementById('modalRankImg').src = rank.img;
                    document.getElementById('modalRankTag').innerText = rank.name;
                    document.getElementById('modalRankTag').className = `rank-tag rank-${rank.name}`;
                    document.getElementById('modalPoin').innerText = m.poin_bulan_ini || 0;
                }
            } else {
                document.getElementById('rankDisplay').classList.add('hidden');
                deleteBtn.classList.add('hidden');
            }
            document.getElementById('memberModal').classList.add('active');
        }

        function closeMemberModal() { document.getElementById('memberModal').classList.remove('active'); }

        document.getElementById('memberForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('memberId').value;
            const targetNis = document.getElementById('m_nis').value;
            const newRole = document.getElementById('m_role').value;
            const pass = document.getElementById('m_password').value;
            const originalData = id !== 'NEW' ? allProcessedMembers.find(x => x.id === id) : null;

            if (myRole === 'pustakawan' && id !== 'NEW') {
                if (originalData && originalData.nis !== myNis && originalData.role === 'pustakawan' && newRole === 'anggota') {
                    notify('Gagal: Demosi dilarang!', false); return;
                }
                if (targetNis !== myNis && pass !== "") {
                    notify('Gagal: Password dikunci!', false); return;
                }
            }

            const payload = {
                nis: targetNis,
                nama: document.getElementById('m_nama').value,
                role: newRole,
                jenjang: document.getElementById('m_jenjang').value,
                kamar: document.getElementById('m_kamar').value,
                updated_at: new Date().toISOString()
            };
            
            if(pass) payload.password = pass;

            notify('Sedang menyimpan...');
            
            try {
                const res = id === 'NEW' ? 
                    await client.from('anggota').insert([payload]) : 
                    await client.from('anggota').update(payload).eq('id', id);

                if(!res.error) { 
                    closeMemberModal(); 
                    loadMembers(); 
                    notify('Data Berhasil Disimpan!', true); 
                } else { 
                    alert("Error: " + res.error.message); 
                }
            } catch (err) {
                notify("Terjadi kesalahan sistem", false);
            }
        };

        async function askDelete() {
            if(myRole !== 'admin') return;
            if(confirm("Apakah Anda yakin ingin menghapus anggota ini secara permanen?")) {
                const id = document.getElementById('memberId').value;
                const { error } = await client.from('anggota').delete().eq('id', id);
                if(!error) {
                    closeMemberModal();
                    loadMembers();
                    notify('Data telah dihapus', true);
                }
            }
        }

        function notify(text, success = null) {
            const t = document.getElementById('toast');
            document.getElementById('toastText').innerText = text;
            t.classList.add('show');
            if(success !== null) {
                setTimeout(()=> t.classList.remove('show'), 3000);
            }
        }

        function changePage(s) { 
            currentPage += s; 
            if(currentPage < 0) currentPage = 0;
            updatePagination();
        }

        window.onload = loadMembers;
    </script>
</body>
</html>
