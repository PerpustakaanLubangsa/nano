<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sistem Pemustaka - Snow Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --snow-bg: #f8fafc;
            --snow-card: #ffffff;
            --ice-blue: #3b82f6;
            --ice-light: #e0f2fe;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-soft: #e2e8f0;
        }

        body { 
            background-color: var(--snow-bg); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 14px; 
            margin: 0; 
            padding-top: env(titlebar-area-inset-top, 20px);
        }
        
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .search-container { 
            background: var(--snow-card); border: 1px solid var(--border-soft); 
            border-radius: 16px; transition: all 0.3s ease; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .search-container:focus-within { 
            border-color: var(--ice-blue); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1); 
        }

        .list-row {
            display: grid; grid-template-columns: 60px 140px 1fr 120px 140px 120px;
            align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-soft);
            transition: all 0.2s; cursor: pointer; background: var(--snow-card);
        }

        .list-row:hover { background: var(--ice-light); transform: scale(1.005); z-index: 10; }

        .list-header {
            display: grid; grid-template-columns: 60px 140px 1fr 120px 140px 120px;
            padding: 15px 20px; color: var(--text-muted); font-weight: 700; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 2px solid var(--border-soft);
            background: rgba(248, 250, 252, 0.9); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 40;
        }

        .role-badge {
            font-size: 9px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; font-weight: 800;
        }
        .role-admin { background: #fee2e2; color: #ef4444; }
        .role-pustakawan { background: #dcfce7; color: #22c55e; }
        .role-anggota { background: #e0f2fe; color: #0ea5e9; }

        .browser-input, .browser-select { 
            background: #f1f5f9 !important; border: 1px solid var(--border-soft) !important; 
            padding: 12px 16px !important; width: 100%; border-radius: 8px !important;
            outline: none;
        }

        .bottom-sheet { 
            position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 100; visibility: hidden; 
        }
        .bottom-sheet.active { transform: translateY(0); visibility: visible; }

        .icon-btn { 
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; 
            background: white; border: 1px solid var(--border-soft); border-radius: 12px; transition: 0.2s; 
        }

        #toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150%); 
            background: #0f172a; color: white; padding: 12px 24px; border-radius: 12px; z-index: 2000; 
            transition: transform 0.3s; font-size: 12px; font-weight: 600;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="antialiased">

    <div id="toast"><span id="toastText">Memproses...</span></div>

    <div class="max-w-6xl mx-auto px-6 py-10 md:py-16">
        <header class="flex flex-col md:flex-row justify-between items-end mb-12 gap-8">
            <div>
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900">Pemustaka<span class="text-blue-500">.</span></h1>
                <p class="text-slate-400 text-[10px] mt-2 font-bold uppercase tracking-[0.3em]">
                    Halo, <span id="displayUserName" class="text-blue-600">User</span> (<span id="displayUserRole">Role</span>)
                </p>
            </div>
            <div class="flex gap-3">
                <button onclick="openMemberModal('NEW')" class="bg-blue-600 text-white px-8 py-4 rounded-xl text-xs font-bold uppercase tracking-widest shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                    <i class="fa-solid fa-plus mr-2"></i> Tambah Anggota
                </button>
            </div>
        </header>

        <div class="mb-8">
            <div class="search-container flex items-center px-6">
                <i class="fa-solid fa-search text-slate-300 mr-4"></i>
                <input type="text" id="memberSearch" placeholder="Cari Nama atau NIS..." class="w-full py-5 text-lg font-medium outline-none bg-transparent" 
                onkeyup="if(event.key==='Enter') { currentPage=0; loadMembers(); }">
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <div class="min-w-[900px]">
                    <div class="list-header">
                        <span class="text-center">Profil</span>
                        <span>NIS</span>
                        <span>Nama Lengkap</span>
                        <span>Jenjang</span>
                        <span>Role</span>
                        <span>Kamar</span>
                    </div>
                    <div id="memberList" class="divide-y divide-slate-100"></div>
                    <div id="loadingState" class="hidden p-20 text-center">
                        <i class="fa-solid fa-snowflake fa-spin text-blue-400 text-3xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mt-6 px-2">
            <div class="text-[11px] text-slate-400 font-bold uppercase">Hal. <span id="pageNumber" class="text-blue-600">1</span></div>
            <div class="flex gap-2">
                <button id="prevBtn" onclick="changePage(-1)" class="icon-btn hover:border-blue-500 disabled:opacity-30"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="nextBtn" onclick="changePage(1)" class="icon-btn hover:border-blue-500 disabled:opacity-30"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <div id="memberModal" class="bottom-sheet overflow-y-auto">
        <div class="max-w-2xl mx-auto px-8 py-12">
            <div class="flex justify-between items-center mb-10 pb-4 border-b">
                <h2 class="text-2xl font-extrabold text-slate-900">Profil Anggota</h2>
                <div class="flex gap-2">
                    <button id="btnDeleteMember" onclick="askDelete()" class="hidden icon-btn text-red-500 hover:bg-red-50"><i class="fa-solid fa-trash"></i></button>
                    <button type="submit" form="memberForm" class="icon-btn !bg-blue-600 !text-white border-none"><i class="fa-solid fa-check"></i></button>
                    <button onclick="closeMemberModal()" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>

            <form id="memberForm" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
                <input type="hidden" id="memberId">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">NIS (Identitas)</label>
                    <input type="text" id="m_nis" required class="browser-input font-bold text-lg">
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Nama Lengkap</label>
                    <input type="text" id="m_nama" required class="browser-input font-semibold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Hak Akses (Role)</label>
                    <select id="m_role" class="browser-select font-bold">
                        <option value="anggota">Anggota</option>
                        <option value="pustakawan">Pustakawan</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Jenjang</label>
                    <select id="m_jenjang" required class="browser-select">
                        <option value="SLTP">SLTP</option>
                        <option value="SLTA">SLTA</option>
                        <option value="PT">Perguruan Tinggi</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Lokasi Kamar</label>
                    <input type="text" id="m_kamar" class="browser-input font-medium" placeholder="Contoh: A.01">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block tracking-widest">Password</label>
                    <input type="password" id="m_password" placeholder="Kosongkan jika tidak diubah" class="browser-input">
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. KONFIGURASI SUPABASE
        const SB_URL = 'https://heosadzwckwmbjhxydtm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhlb3NhZHp3Y2t3mJqaHh5ZHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMDk5MDMsImV4cCI6MjA4Mjc4NTkwM30.4tUQQNsczDqX6xuzvq8C5JncxvX_RAdwr95xMaWIvhY';
        const client = supabase.createClient(SB_URL, SB_KEY);

        // 2. PROTEKSI HALAMAN & ROLE CHECK
        const rawRole = sessionStorage.getItem('userRole') || '';
        const myRole = rawRole.toLowerCase();
        const myName = sessionStorage.getItem('userName') || 'User';
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');

        // Jika bukan admin/pustakawan atau belum login, tendang ke login
        if (isLoggedIn !== 'true' || (myRole !== 'admin' && myRole !== 'pustakawan')) {
            window.location.replace('login.html');
        }

        document.getElementById('displayUserName').innerText = myName;
        document.getElementById('displayUserRole').innerText = myRole.toUpperCase();

        let membersData = [], currentPage = 0, itemsPerPage = 10;

        // 3. FUNGSI HELPER
        function notify(text, isSuccess = false) {
            const t = document.getElementById('toast');
            document.getElementById('toastText').innerText = text;
            t.classList.add('show');
            if(isSuccess) setTimeout(() => t.classList.remove('show'), 2000);
        }

        function checkEmpty(val) {
            return (!val || val.toString().trim() === "") 
                ? `<span class="text-slate-300 italic text-[10px]">Kosong</span>` : val;
        }

        // 4. LOAD DATA ANGGOTA
        async function loadMembers() {
            const list = document.getElementById('memberList');
            list.innerHTML = '';
            document.getElementById('loadingState').classList.remove('hidden');
            
            try {
                const q = document.getElementById('memberSearch').value.trim();
                const from = currentPage * itemsPerPage;
                const to = from + itemsPerPage - 1;

                let req = client.from('anggota').select('*', { count: 'exact' }).order('nama', { ascending: true }).range(from, to);
                
                if(q) req = req.or(`nis.ilike.%${q}%,nama.ilike.%${q}%`);
                
                const { data, count, error } = await req;
                if(error) throw error;

                membersData = data || [];
                renderMembers();
                
                document.getElementById('pageNumber').innerText = currentPage + 1;
                document.getElementById('prevBtn').disabled = (currentPage === 0);
                document.getElementById('nextBtn').disabled = (to >= (count || 0) - 1);

            } catch (err) { 
                console.error(err);
                notify("Gagal memuat data");
            } finally { 
                document.getElementById('loadingState').classList.add('hidden'); 
            }
        }

        function renderMembers() {
            const list = document.getElementById('memberList');
            if(membersData.length === 0) {
                list.innerHTML = `<div class="p-20 text-center text-slate-400 text-xs font-bold uppercase tracking-widest">Data Tidak Ditemukan</div>`;
                return;
            }

            list.innerHTML = membersData.map(m => `
                <div onclick="openMemberModal('${m.id}')" class="list-row">
                    <div class="flex justify-center">
                        <div class="w-10 h-10 bg-slate-50 text-blue-500 rounded-xl flex items-center justify-center border border-slate-100">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>
                    <div class="font-bold text-xs text-slate-900">${m.nis}</div>
                    <div class="font-bold text-slate-700 uppercase">${m.nama}</div>
                    <div class="text-[10px] font-bold text-slate-500">${checkEmpty(m.jenjang)}</div>
                    <div><span class="role-badge role-${(m.role || 'anggota').toLowerCase()}">${m.role || 'anggota'}</span></div>
                    <div class="text-slate-900 font-bold text-[11px]">${checkEmpty(m.kamar)}</div>
                </div>
            `).join('');
        }

        // 5. MODAL & CRUD
        function openMemberModal(id) {
            const form = document.getElementById('memberForm');
            form.reset();
            document.getElementById('memberId').value = id;
            document.getElementById('m_password').value = "";
            
            const deleteBtn = document.getElementById('btnDeleteMember');

            if(id !== 'NEW') {
                const m = membersData.find(x => x.id.toString() === id.toString());
                if(m) {
                    document.getElementById('m_nis').value = m.nis || '';
                    document.getElementById('m_nama').value = m.nama || '';
                    document.getElementById('m_role').value = (m.role || 'anggota').toLowerCase();
                    document.getElementById('m_jenjang').value = m.jenjang || 'SLTP';
                    document.getElementById('m_kamar').value = m.kamar || '';
                    deleteBtn.classList.remove('hidden');
                }
            } else {
                deleteBtn.classList.add('hidden');
            }
            document.getElementById('memberModal').classList.add('active');
        }

        function closeMemberModal() { document.getElementById('memberModal').classList.remove('active'); }

        document.getElementById('memberForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('memberId').value;
            const nis = document.getElementById('m_nis').value.trim();
            const pass = document.getElementById('m_password').value.trim();

            const payload = {
                nis: nis,
                nama: document.getElementById('m_nama').value.trim(),
                role: document.getElementById('m_role').value,
                jenjang: document.getElementById('m_jenjang').value,
                kamar: document.getElementById('m_kamar').value.trim()
            };

            if (pass !== "") payload.password = pass;
            else if (id === 'NEW') payload.password = nis; // Default password = NIS

            notify('Menyimpan...');
            
            let res;
            if (id === 'NEW') {
                res = await client.from('anggota').insert([payload]);
            } else {
                res = await client.from('anggota').update(payload).eq('id', id);
            }

            if (!res.error) {
                closeMemberModal();
                loadMembers();
                notify('Berhasil Disimpan', true);
            } else {
                alert("Gagal menyimpan: " + res.error.message);
                notify('Gagal menyimpan');
            }
        };

        async function askDelete() {
            if(!confirm("Hapus anggota ini secara permanen?")) return;
            const id = document.getElementById('memberId').value;
            
            notify('Menghapus...');
            const { error } = await client.from('anggota').delete().eq('id', id);
            
            if(!error) {
                closeMemberModal(); 
                loadMembers(); 
                notify('Terhapus', true);
            } else {
                alert("Gagal menghapus: " + error.message);
            }
        }

        function changePage(s) { 
            currentPage += s; 
            loadMembers(); 
            window.scrollTo(0,0); 
        }

        window.onload = loadMembers;
    </script>
</body>
</html>
